<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Board — Copilot Workshop</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1f3f'/><polygon points='16,8 28,13 16,18 4,13' fill='%23c5973e'/><path d='M9 15 V20 Q16 23 23 20 V15' fill='none' stroke='%23c5973e' stroke-width='1.5'/><line x1='28' y1='13' x2='28' y2='21' stroke='%23c5973e' stroke-width='1.2'/><circle cx='28' cy='22' r='1.2' fill='%23c5973e'/></svg>">
<script src="/tenant-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: #faf9f6;
    color: #1a1a2e;
    line-height: 1.6;
    opacity: 0;
    animation: fadeIn 400ms ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* GLOBAL TOP NAV */
  .global-nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 1000; background: #0c1f3f; border-bottom: 2px solid #c5973e; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
  .global-nav-brand { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.04em; }
  .global-nav-brand:hover { opacity: 0.85; }
  .global-nav-courses { display: flex; gap: 2px; margin-left: auto; margin-right: auto; background: rgba(255,255,255,0.08); padding: 4px; border-radius: 22px; }
  .course-pill { padding: 6px 16px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
  .course-pill:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .course-pill.active { background: #c5973e; color: #0c1f3f; }
  .global-nav-links { display: flex; gap: 4px; align-items: center; }
  .global-nav-link { padding: 6px 14px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
  .global-nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .global-nav-link.active { color: #fff; background: rgba(255,255,255,0.12); }
  @media (max-width: 768px) {
    .global-nav { padding: 0 10px; gap: 6px; }
    .course-pill { padding: 5px 10px; font-size: 12px; }
    .global-nav-link { padding: 5px 10px; font-size: 12px; }
  }

  .page { max-width: 960px; margin: 0 auto; padding: 32px 32px 60px; }
  body { padding-top: 60px; }

  .page-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .page-header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 42px; font-weight: 700;
    margin-bottom: 8px;
    color: #1a1a2e;
  }
  .page-header p {
    color: #999; font-size: 15px;
  }

  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #F0FDF4; color: #16A34A;
    border: 1px solid #BBF7D0;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px; font-weight: 600;
    margin-bottom: 16px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #16A34A;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid #ddd8ce;
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
  }
  .stat-number {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 36px; font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, #1a1a2e 0%, #3d3d5a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .stat-label {
    font-size: 13px; color: #999;
    font-weight: 500; margin-top: 4px;
  }

  .participants { display: flex; flex-direction: column; gap: 12px; }

  .participant-card {
    background: #fff;
    border: 1px solid #ddd8ce;
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: box-shadow 0.2s;
  }
  .participant-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .participant-card.is-you { border-color: #c5973e; border-width: 2px; }

  .participant-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #f0ede6;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 17px;
    color: #5a5a6e;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .participant-card.is-you .participant-avatar {
    background: #0c1f3f; color: #c5973e;
  }

  .participant-info { flex: 1; min-width: 0; }
  .participant-name {
    font-weight: 600; font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }
  .you-badge {
    font-size: 10px; font-weight: 700;
    background: #c5973e; color: #0c1f3f;
    padding: 2px 8px; border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .progress-courses {
    display: flex; gap: 12px; margin-top: 8px;
  }
  .course-progress {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #999;
  }
  .course-progress .bar-bg {
    width: 60px; height: 5px;
    background: #e8e4dc;
    border-radius: 3px;
    overflow: hidden;
  }
  .course-progress .bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-chat { background: #0078d4; }
  .bar-apps { background: #217346; }
  .bar-agents { background: #7b5ea7; }

  .participant-points {
    text-align: right;
    flex-shrink: 0;
  }
  .points-number {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px; font-weight: 700;
    color: #1a1a2e;
  }
  .points-label {
    font-size: 11px; color: #bbb;
    font-weight: 500;
  }

  .loading {
    text-align: center; padding: 60px;
    color: #bbb; font-size: 15px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .empty-state h3 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px; margin-bottom: 8px;
    color: #1a1a2e;
  }

  .completion-pill {
    display: inline-block;
    background: #faf9f6;
    border: 1px solid #ddd8ce;
    color: #666;
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 999px;
    margin-top: 4px;
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }
  .participant-card.is-you .completion-pill {
    background: rgba(197,151,62,0.08);
    border-color: rgba(197,151,62,0.35);
    color: #8a6a2b;
  }
  .completion-gem {
    font-size: 0.85em;
    margin-left: 4px;
    display: inline-block;
    animation: gemFloat 2400ms ease-in-out infinite;
  }
  @keyframes gemFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }

  @media (max-width: 640px) {
    .stats-row { grid-template-columns: 1fr; }
    .progress-courses { flex-direction: column; gap: 4px; }
    .participant-card { flex-wrap: wrap; }
    .nav-links { gap: 4px; }
    .nav-link { padding: 6px 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<nav class="global-nav">
  <a href="/" class="global-nav-brand">adva</a>
  <div class="global-nav-courses">
    <a href="/courses/copilot-chat/copilot-chat.html" class="course-pill">Chat</a>
    <a href="/courses/copilot-apps/copilot-apps.html" class="course-pill">Apps</a>
    <a href="/courses/building-agents/building-agents.html" class="course-pill">Agents</a>
  </div>
  <div class="global-nav-links">
    <a href="/progress.html" class="global-nav-link active">Leaderboard</a>
    <a href="/admin.html" class="global-nav-link">Admin</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <h1>Workshop Progress</h1>
    <p id="page-desc">See how everyone is progressing through the Copilot workshop</p>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="stat-participants">—</div>
      <div class="stat-label">Participants</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-steps">—</div>
      <div class="stat-label">Steps Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-points">—</div>
      <div class="stat-label">Total Points Earned</div>
    </div>
  </div>

  <div id="participants-container">
    <div class="loading">Loading progress...</div>
  </div>
</div>

<script>
const currentUser = localStorage.getItem('workshop_user');
// Core (non-bonus) lesson counts per course. Bonus lessons don't count against %.
const CHAT_STEPS = 6, APPS_STEPS = 3, AGENTS_STEPS = 4;

/* Read slug from URL */
const urlParams = new URLSearchParams(window.location.search);
const slug = urlParams.get('slug') || '';

/* slug (if present) is preserved via data fetches; global nav points to bare routes */

async function loadProgress() {
  // When an explicit ?slug= is in the URL, scope to that workshop.
  // Otherwise aggregate across all workshops so admins / visitors see everyone
  // (the default "workshop:" bucket is frequently empty when all participants
  // are in client-specific buckets like client:oda:).
  const query = slug ? '?slug=' + encodeURIComponent(slug) : '?all=1';
  try {
    const res = await fetch('/api/progress' + query);
    if (!res.ok) throw new Error('Failed to load');
    const { participants } = await res.json();
    render(participants);
  } catch (e) {
    document.getElementById('participants-container').innerHTML =
      '<div class="empty-state"><h3>Could not load progress</h3><p>Connection issue — we will retry automatically.</p></div>';
    document.getElementById('stats-row').style.display = 'none';
  }
}

function render(participants) {
  const statsRow = document.getElementById('stats-row');
  const container = document.getElementById('participants-container');

  if (!participants.length) {
    statsRow.style.display = 'none';
    container.innerHTML = '<div class="empty-state"><h3>Nobody has started yet</h3><p>Participants will appear here once they start the workshop. Be the first — <a href="/" style="color:#c5973e;font-weight:600;text-decoration:none;">jump in</a>.</p></div>';
    return;
  }
  statsRow.style.display = '';

  const sorted = participants.slice().sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

  const totalSteps = participants.reduce((s, p) =>
    s + (p.chat?.completed?.length || 0) + (p.apps?.completed?.length || 0) + (p.agents?.completed?.length || 0), 0);
  const totalPts = participants.reduce((s, p) => s + (p.totalPoints || 0), 0);

  document.getElementById('stat-participants').textContent = participants.length;
  document.getElementById('stat-steps').textContent = totalSteps;
  document.getElementById('stat-points').textContent = totalPts;

  container.innerHTML = '<div class="participants">' + sorted.map((p, rank) => {
    const isYou = p.name === currentUser;
    const initials = p.name.split(' ').map(w => w[0]).join('').slice(0, 2);
    const coreDone = (arr, core) => (arr || []).filter(i => i < core).length;
    const chatDone = coreDone(p.chat?.completed, CHAT_STEPS);
    const appsDone = coreDone(p.apps?.completed, APPS_STEPS);
    const agentsDone = coreDone(p.agents?.completed, AGENTS_STEPS);
    const chatPct = Math.min(100, Math.round((chatDone / CHAT_STEPS) * 100));
    const appsPct = Math.min(100, Math.round((appsDone / APPS_STEPS) * 100));
    const agentsPct = Math.min(100, Math.round((agentsDone / AGENTS_STEPS) * 100));
    const lessonLabel = (done, total) => done >= total ? '✓' : `L${done + 1}`;
    const rankMarker = rank === 0 ? '🥇 ' : rank === 1 ? '🥈 ' : rank === 2 ? '🥉 ' : '';

    return `
      <div class="participant-card ${isYou ? 'is-you' : ''}">
        <div class="participant-avatar">${initials}</div>
        <div class="participant-info">
          <div class="participant-name">
            ${rankMarker}${p.name}
            ${isYou ? '<span class="you-badge">You</span>' : ''}
          </div>
          <div class="completion-pill">${chatDone + appsDone + agentsDone} / ${CHAT_STEPS + APPS_STEPS + AGENTS_STEPS} total core steps</div>
          <div class="progress-courses">
            <div class="course-progress">
              <span>Chat · ${lessonLabel(chatDone, CHAT_STEPS)}${chatPct === 100 ? ' <span class="completion-gem">💎</span>' : ''}</span>
              <div class="bar-bg"><div class="bar-fill bar-chat" style="width:${chatPct}%"></div></div>
              <span>${chatPct}%</span>
            </div>
            <div class="course-progress">
              <span>Apps · ${lessonLabel(appsDone, APPS_STEPS)}${appsPct === 100 ? ' <span class="completion-gem">💎</span>' : ''}</span>
              <div class="bar-bg"><div class="bar-fill bar-apps" style="width:${appsPct}%"></div></div>
              <span>${appsPct}%</span>
            </div>
            <div class="course-progress">
              <span>Agents · ${lessonLabel(agentsDone, AGENTS_STEPS)}${agentsPct === 100 ? ' <span class="completion-gem">💎</span>' : ''}</span>
              <div class="bar-bg"><div class="bar-fill bar-agents" style="width:${agentsPct}%"></div></div>
              <span>${agentsPct}%</span>
            </div>
          </div>
        </div>
        <div class="participant-points">
          <div class="points-number">${p.totalPoints || 0}</div>
          <div class="points-label">points</div>
        </div>
      </div>`;
  }).join('') + '</div>';
}

/* Auth gate — bounce to login if not authenticated */
fetch('/api/me').then(r => {
  if (r.status === 401) {
    const s = new URLSearchParams(location.search).get('slug');
    window.location.href = s ? '/login.html?slug=' + encodeURIComponent(s) : '/login.html';
  }
}).catch(() => { /* offline — leave the page alone */ });

loadProgress();
setInterval(loadProgress, 10000);
</script>
</body>
</html>
