<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Copilot Workshop</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1f3f'/><polygon points='16,8 28,13 16,18 4,13' fill='%23c5973e'/><path d='M9 15 V20 Q16 23 23 20 V15' fill='none' stroke='%23c5973e' stroke-width='1.5'/><line x1='28' y1='13' x2='28' y2='21' stroke='%23c5973e' stroke-width='1.2'/><circle cx='28' cy='22' r='1.2' fill='%23c5973e'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #0c1f3f;
  --accent: #c5973e;
  --accent-light: rgba(197,151,62,.12);
  --bg: #faf9f6;
  --bg-warm: #f0ede6;
  --text: #1a1a2e;
  --text-secondary: #5a5a6e;
  --text-light: #999;
  --border: #ddd8ce;
  --border-light: #e8e4dc;
  --white: #fff;
  --green: #3a7a5c;
  --red: #c0392b;
  --red-light: rgba(192,57,43,.08);
  --radius: 10px;
  --shadow: 0 2px 12px rgba(12,31,63,.07);
  --shadow-lg: 0 8px 32px rgba(12,31,63,.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 400ms ease forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
h1, h2, h3 { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--dark); }
h1 { font-size: 32px; font-weight: 700; }
h2 { font-size: 26px; font-weight: 600; }
h3 { font-size: 20px; font-weight: 600; }

/* GLOBAL TOP NAV */
.global-nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 1000; background: var(--dark); border-bottom: 2px solid var(--accent); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
.global-nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: 0.04em; }
.global-nav-brand:hover { opacity: 0.85; }
.global-nav-courses { display: flex; gap: 2px; margin-left: auto; margin-right: auto; background: rgba(255,255,255,0.08); padding: 4px; border-radius: 22px; }
.course-pill { padding: 6px 16px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
.course-pill:hover { color: var(--white); background: rgba(255,255,255,0.08); }
.course-pill.active { background: var(--accent); color: var(--dark); }
.global-nav-links { display: flex; gap: 4px; align-items: center; }
.global-nav-link { padding: 6px 14px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; cursor: pointer; background: none; border: none; font-family: inherit; }
.global-nav-link:hover { color: var(--white); background: rgba(255,255,255,0.08); }
.global-nav-link.active { color: var(--white); background: rgba(255,255,255,0.12); }
body { padding-top: 60px; }
/* Login view — hide all nav chrome so admin password screen is clean */
body[data-admin-view="login"] { padding-top: 0; }
body[data-admin-view="login"] .global-nav,
body[data-admin-view="login"] .admin-subnav { display: none; }

/* ADMIN SUBNAV (appears below global nav) */
.admin-subnav { background: #fff; border-bottom: 1px solid var(--border-light); padding: 12px 24px; display: flex; gap: 6px; position: sticky; top: 60px; z-index: 50; }
.admin-subnav a, .admin-subnav button { padding: 6px 14px; border-radius: 16px; font-size: 13px; font-weight: 600; color: var(--text-secondary); text-decoration: none; cursor: pointer; background: none; border: none; font-family: inherit; transition: all 0.15s; }
.admin-subnav a:hover, .admin-subnav button:hover { color: var(--dark); background: var(--bg); }
.admin-subnav a.active { color: var(--dark); background: var(--accent-light); }
@media (max-width: 768px) {
  .global-nav { padding: 0 10px; gap: 6px; }
  .course-pill { padding: 5px 10px; font-size: 12px; }
  .global-nav-link { padding: 5px 10px; font-size: 12px; }
}

/* MAIN */
.main { max-width: 1040px; margin: 0 auto; padding: 40px 24px 80px; }

/* CARDS */
.card {
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
}
.card + .card { margin-top: 16px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; border-radius: 8px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; border: none;
  transition: all 0.15s; text-decoration: none;
  font-family: inherit;
}
.btn-primary { background: var(--dark); color: var(--white); }
.btn-primary:hover { background: #162d52; }
.btn-accent { background: var(--accent); color: var(--white); }
.btn-accent:hover { background: #b3862f; }
.btn-outline {
  background: transparent; color: var(--dark);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--dark); background: var(--bg); }
.btn-danger { background: var(--red); color: var(--white); }
.btn-danger:hover { background: #a93226; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* FORM */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 15px;
  font-family: inherit; background: var(--white);
  transition: border-color 0.15s;
  color: var(--text);
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--accent);
}
.form-group textarea { min-height: 100px; resize: vertical; }
.form-group .hint { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* INLINE GROUP */
.input-with-btn { display: flex; gap: 8px; }
.input-with-btn input { flex: 1; }

/* LOGO UPLOADER */
.logo-uploader {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 18px;
  text-align: center;
  transition: border-color 120ms, background 120ms;
  background: var(--bg);
}
.logo-uploader.empty { cursor: pointer; }
.logo-uploader.empty:hover { border-color: var(--accent); }
.logo-uploader.dragover { border-color: var(--accent); background: var(--accent-light); }
.logo-uploader.has-logo {
  border-style: solid;
  display: flex; align-items: center; gap: 16px; justify-content: space-between;
  text-align: left;
}
.logo-uploader.has-logo img {
  max-height: 64px; max-width: 240px;
  object-fit: contain;
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 6px;
}
.logo-uploader .logo-uploader-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.logo-uploader .logo-uploader-hint {
  font-size: 12px; color: var(--text-light);
  margin-top: 6px;
}

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-light); padding: 10px 14px;
  border-bottom: 2px solid var(--border-light);
}
td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); }
tr:hover td { background: var(--accent-light); }
.link-cell { color: var(--accent); cursor: pointer; font-weight: 600; }
.link-cell:hover { text-decoration: underline; }

/* BADGE */
.badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 12px; font-size: 12px; font-weight: 600;
}
.badge-active { background: rgba(58,122,92,.1); color: var(--green); }
.badge-inactive { background: var(--red-light); color: var(--red); }
.badge-draft { background: var(--accent-light); color: var(--accent); }

/* STEPPER */
.stepper { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 2px solid var(--border-light); }
.step-item {
  flex: 1; text-align: center; padding: 14px 8px;
  font-size: 13px; font-weight: 600; color: var(--text-light);
  position: relative; cursor: default;
}
.step-item.active { color: var(--dark); }
.step-item.active::after {
  content: ''; position: absolute;
  bottom: -2px; left: 20%; right: 20%; height: 2px;
  background: var(--accent);
}
.step-item.completed { color: var(--green); }
.step-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--border-light); color: var(--text-light);
  font-size: 13px; margin-right: 6px;
}
.step-item.active .step-number { background: var(--accent); color: var(--white); }
.step-item.completed .step-number { background: var(--green); color: var(--white); }

/* JSON EDITOR */
.json-editor {
  width: 100%; min-height: 260px; padding: 16px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px; line-height: 1.6;
  background: #1e1e2e; color: #cdd6f4;
  border: 1px solid var(--border); border-radius: 8px;
  resize: vertical; tab-size: 2;
}

/* STUDY CARDS */
.study-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.study-card {
  background: var(--white); border: 1.5px solid var(--border-light);
  border-radius: var(--radius); padding: 20px;
  cursor: pointer; transition: all 0.15s;
}
.study-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.study-card.selected { border-color: var(--accent); background: var(--accent-light); }
.study-card h4 { font-family: 'Cormorant Garamond', serif; font-size: 18px; margin-bottom: 8px; }
.study-card .meta { font-size: 13px; color: var(--text-light); }

/* PARTICIPANT SUMMARY */
.participant-summary {
  background: var(--bg); border-radius: 8px;
  padding: 20px; margin-top: 16px;
}
.participant-summary h4 { font-size: 16px; margin-bottom: 12px; font-family: 'Cormorant Garamond', serif; }
.participant-summary .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.tag {
  display: inline-block; padding: 3px 10px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 14px; font-size: 12px; color: var(--text-secondary);
}

/* CONFIRMATION MODAL */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(12,31,63,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; animation: fadeIn 200ms ease;
}
.modal {
  background: var(--white); border-radius: var(--radius);
  padding: 32px; max-width: 420px; width: 90%;
  box-shadow: var(--shadow-lg);
}
.modal h3 { margin-bottom: 12px; }
.modal p { margin-bottom: 20px; color: var(--text-secondary); font-size: 15px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* HEADER BAR */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.page-header-actions { display: flex; gap: 10px; }

/* LOADING */
.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2.5px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-light); font-size: 15px;
}

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-light);
}
.empty-state h3 { color: var(--text-secondary); margin-bottom: 8px; }

/* SUCCESS BANNER */
.success-box {
  background: rgba(58,122,92,.08); border: 1px solid rgba(58,122,92,.25);
  border-radius: 8px; padding: 20px; text-align: center;
}
.success-box h3 { color: var(--green); margin-bottom: 8px; }
.success-box code {
  display: inline-block; background: var(--white);
  padding: 8px 16px; border-radius: 6px;
  font-size: 14px; margin-top: 8px;
  border: 1px solid var(--border);
}

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--dark); color: var(--white);
  padding: 12px 24px; border-radius: 8px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 300;
  animation: slideUp 300ms ease;
}
.toast.error { background: var(--red); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* RESPONSIVE */
@media (max-width: 640px) {
  .top-nav { padding: 0 16px; }
  .main { padding: 24px 16px 60px; }
  .form-row { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
}

/* Opportunity Map */
.opp-section { margin-top: 24px; padding: 24px; background: var(--white, #fff); border: 1px solid #ddd8ce; border-radius: 12px; }
.opp-section h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.opp-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; margin-bottom: 16px; }
.opp-status .dot { width: 10px; height: 10px; border-radius: 50%; }
.opp-status .dot.green { background: #217346; }
.opp-status .dot.grey { background: #ccc; }
.opp-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.opp-log { background: #1e1e1e; color: #a0a0a0; font-family: 'Consolas', monospace; font-size: 12px; padding: 16px; border-radius: 8px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; display: none; }
.opp-log.visible { display: block; }
.granola-textarea { width: 100%; min-height: 120px; padding: 12px; border: 1px solid #ddd8ce; border-radius: 8px; font-family: 'Source Sans 3', sans-serif; font-size: 14px; resize: vertical; margin-bottom: 12px; }
.granola-textarea::placeholder { color: #999; }
</style>

<script>
/* Start in login view — auth-gated nav stays hidden until route() confirms auth */
document.body.setAttribute('data-admin-view', 'login');
</script>

<!-- MODAL CONTAINER -->
<div id="modal-root"></div>

<!-- TOAST CONTAINER -->
<div id="toast-root"></div>

<script>
/* ============================
   STATE & CONFIG
   ============================ */
const API = {
  auth:       '/api/admin/auth',
  clients:    '/api/admin/clients',
  client:     '/api/admin/client',
  listenLabs: '/api/admin/listen-labs',
  personalize:'/api/admin/personalize',
  template:   '/api/admin/template',
  reset:      '/api/admin/reset',
  clearUsers: '/api/admin/clear-users',
  user:       '/api/admin/user',
  uploadLogo: '/api/admin/upload-logo',
  sampleFiles: '/api/admin/sample-files',
};

let state = {
  authenticated: false,
  workshops: [],
  wizardStep: 1,
  wizardData: {},
  wizardStudies: [],
  wizardSelectedStudy: null,
  wizardResponses: null,
  wizardPersonalization: null,
};

/* ============================
   UTILS
   ============================ */
function $(sel, ctx) { return (ctx || document).querySelector(sel); }
function $$(sel, ctx) { return [...(ctx || document).querySelectorAll(sel)]; }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function formatDate(d) {
  if (!d) return '--';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function generatePassword(len = 10) {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let pw = '';
  for (let i = 0; i < len; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  return pw;
}

/* ============================
   TOAST
   ============================ */
function toast(msg, isError = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ============================
   MODAL
   ============================ */
function showModal(title, message, onConfirm, confirmLabel = 'Confirm', danger = false) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal">
        <h3>${esc(title)}</h3>
        <p>${esc(message)}</p>
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" id="modal-cancel">Cancel</button>
          <button class="btn ${danger ? 'btn-danger' : 'btn-primary'} btn-sm" id="modal-confirm">${esc(confirmLabel)}</button>
        </div>
      </div>
    </div>`;
  $('#modal-cancel').onclick = () => root.innerHTML = '';
  $('#modal-backdrop').onclick = (e) => { if (e.target === e.currentTarget) root.innerHTML = ''; };
  $('#modal-confirm').onclick = () => { root.innerHTML = ''; onConfirm(); };
}

/* ============================
   LOGO UPLOADER
   ============================ */
// Hydrates a <div id=containerId> into a drag-and-drop logo uploader.
// onChange(url | null) fires whenever the user picks a new file or removes
// the logo. We store the file as a data URL client-side (FileReader) and
// pass it straight into the client record — /api/admin/upload-logo exists
// but does nothing but base64→data-URL concatenation, so we skip the round
// trip and trust the admin-gated create/PUT endpoints to persist it.
function renderLogoUpload(containerId, currentUrl, onChange) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const MAX_BYTES = 200 * 1024;

  const pickFile = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/png,image/jpeg,image/jpg,image/svg+xml,image/gif,image/webp';
    input.onchange = () => handleFile(input.files && input.files[0]);
    input.click();
  };

  const handleFile = async (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) { toast('Please choose an image file', true); return; }
    if (file.size > MAX_BYTES) { toast('Logo must be under 200 KB', true); return; }
    try {
      const url = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      onChange(url);
      paint(url);
    } catch {
      toast('Could not read file', true);
    }
  };

  const paint = (url) => {
    if (url) {
      el.innerHTML = `
        <div class="logo-uploader has-logo">
          <img src="${esc(url)}" alt="Logo preview">
          <div class="logo-uploader-actions">
            <button type="button" class="btn btn-outline btn-sm" data-action="change">Change</button>
            <button type="button" class="btn btn-outline btn-sm" data-action="remove">Remove</button>
          </div>
        </div>`;
      el.querySelector('[data-action="change"]').onclick = pickFile;
      el.querySelector('[data-action="remove"]').onclick = () => { onChange(null); paint(null); };
    } else {
      el.innerHTML = `
        <div class="logo-uploader empty" data-role="drop-zone">
          <p>Drop a logo here, or <a href="#" data-action="pick" style="color:var(--accent);font-weight:600;text-decoration:none;">choose a file</a></p>
          <p class="logo-uploader-hint">PNG, JPG, SVG · up to 200 KB</p>
        </div>`;
      const dz = el.querySelector('[data-role="drop-zone"]');
      dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('dragover'); };
      dz.ondragleave = () => dz.classList.remove('dragover');
      dz.ondrop = (e) => {
        e.preventDefault();
        dz.classList.remove('dragover');
        handleFile(e.dataTransfer.files && e.dataTransfer.files[0]);
      };
      dz.onclick = (e) => {
        if (e.target && e.target.getAttribute('data-action') === 'pick') { e.preventDefault(); pickFile(); return; }
        if (e.target.closest('[data-action="pick"]')) return;
        pickFile();
      };
    }
  };

  paint(currentUrl || null);
}

/* ============================
   API HELPERS
   ============================ */
async function apiFetch(url, opts = {}) {
  const res = await fetch(url, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (res.status === 401) {
    state.authenticated = false;
    const body = await res.json().catch(() => ({}));
    const currentHash = window.location.hash || '#login';
    // Only redirect to login if we're not already there. Setting the hash
    // while on '#login' (including initial-load empty hash) would fire
    // hashchange → route() → renderLogin() and wipe any error message the
    // caller's catch block is about to show.
    if (currentHash !== '#login') {
      window.location.hash = '#login';
    }
    throw new Error(body.error || 'Not authenticated');
  }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `Request failed (${res.status})`);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function checkAuth() {
  try {
    await apiFetch(API.auth);
    state.authenticated = true;
    return true;
  } catch {
    state.authenticated = false;
    return false;
  }
}

/* ============================
   ROUTER
   ============================ */
async function route() {
  const hash = window.location.hash || '#login';
  const app = document.getElementById('app');

  // Auth guard
  if (hash !== '#login') {
    if (!state.authenticated) {
      const ok = await checkAuth();
      if (!ok) { window.location.hash = '#login'; return; }
    }
  }

  // Toggle nav chrome: hidden on login view, shown once authenticated
  document.body.setAttribute('data-admin-view', hash === '#login' ? 'login' : 'app');

  renderNav();

  if (hash === '#login') return renderLogin(app);
  if (hash === '#dashboard') return renderDashboard(app);
  if (hash === '#new-workshop') return renderNewWorkshop(app);
  if (hash === '#template') return renderTemplate(app);
  if (hash === '#sample-files') return renderSampleFiles(app);
  if (hash.startsWith('#workshop/')) {
    const slug = hash.replace('#workshop/', '');
    return renderWorkshopDetail(app, slug);
  }

  // Fallback
  window.location.hash = '#dashboard';
}

window.addEventListener('hashchange', route);

  $('#sf-upload').onclick = async () => {
    const msg = $('#sf-upload-msg');
    msg.style.display = 'none';
    try {
      const name = $('#sf-name').value.trim();
      const category = $('#sf-category').value;
      const file = $('#sf-file').files[0];
      if (!name) { showSfUploadMsg(msg, 'Name required', true); return; }
      if (!file) { showSfUploadMsg(msg, 'File required', true); return; }
      const dataBase64 = await sfReadFileAsBase64(file);
      const meta = await apiFetch(API.sampleFiles, {
        method: 'POST',
        body: JSON.stringify({
          name,
          category,
          mime: file.type || 'application/octet-stream',
          dataBase64,
        }),
      });
      showSfUploadMsg(msg, 'Uploaded: ' + meta.name, false);
      $('#sf-name').value = '';
      $('#sf-file').value = '';
      await refreshSampleFilesList();
    } catch (err) {
      showSfUploadMsg(msg, err.message || 'Upload failed', true);
    }

  await refreshSampleFilesList();

function showSfUploadMsg(el, text, isError) {
  el.textContent = text;
  el.style.color = isError ? 'var(--red)' : 'var(--green, #217346)';
  el.style.display = 'block';
}

function sfReadFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => {
      const s = String(fr.result || '');
      const comma = s.indexOf(',');
      resolve(comma >= 0 ? s.slice(comma + 1) : s);
    };
    fr.onerror = () => reject(new Error('Failed to read file'));
    fr.readAsDataURL(file);
  });
}

async function refreshSampleFilesList() {
  const list = $('#sf-list');
  list.className = '';
  list.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const data = await apiFetch(API.sampleFiles);
    const files = data.files || [];
    if (files.length === 0) {
      list.innerHTML = '<p style="color:var(--text-secondary);">No files uploaded yet.</p>';
      return;
    }
    const rows = files.map(f => `
      <tr>
        <td>${esc(f.name)}</td>
        <td>${esc(f.category)}</td>
        <td>${(f.size / 1024).toFixed(1)} KB</td>
        <td style="font-size:12px;color:var(--text-secondary);">${esc(f.mime)}</td>
        <td style="font-size:12px;color:var(--text-secondary);">${formatDate(f.uploadedAt)}</td>
        <td><button class="btn btn-sm btn-outline" data-copy-id="${esc(f.id)}">Copy ID</button></td>
        <td><button class="btn btn-sm btn-outline" data-delete-id="${esc(f.id)}" data-delete-name="${esc(f.name)}">Delete</button></td>
      </tr>`).join('');
    list.innerHTML = `
      <table class="table">
        <thead><tr><th>Name</th><th>Category</th><th>Size</th><th>Mime</th><th>Uploaded</th><th></th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    list.querySelectorAll('[data-copy-id]').forEach(b => {
      b.onclick = () => { navigator.clipboard.writeText(b.getAttribute('data-copy-id')); };
    });
    list.querySelectorAll('[data-delete-id]').forEach(b => {
      b.onclick = () => {
        const id = b.getAttribute('data-delete-id');
        const name = b.getAttribute('data-delete-name');
        const message = `Delete "${name}"? Workshops that reference this file will show a fallback link.`;
        if (!confirm(message)) return;
        (async () => {
          try {
            await apiFetch(`${API.sampleFiles}?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
            await refreshSampleFilesList();
          } catch (err) {
            alert('Delete failed: ' + (err.message || 'unknown'));
          }
        })();
      };
    });
  } catch (err) {
    list.innerHTML = '<p style="color:var(--red);">Failed to load: ' + esc(err.message) + '</p>';
  }
}

function renderWizardStep(app) {
  const step = state.wizardStep;
  const steps = ['Basic Info', 'Listen Labs', 'Personalization', 'Create'];

  let stepperHTML = '<div class="stepper">';
  steps.forEach((s, i) => {
    const n = i + 1;
    const cls = n === step ? 'active' : n < step ? 'completed' : '';
    stepperHTML += `<div class="step-item ${cls}"><span class="step-number">${n < step ? '&#10003;' : n}</span>${s}</div>`;
  });
  stepperHTML += '</div>';

  app.innerHTML = `<h1 style="margin-bottom:24px;">New Workshop</h1>${stepperHTML}<div id="wizard-content"></div>`;

  const content = $('#wizard-content');
  if (step === 1) renderWizardStep1(content);
  else if (step === 2) renderWizardStep2(content);
  else if (step === 3) renderWizardStep3(content);
  else if (step === 4) renderWizardStep4(content);
}

async function selectStudy(study) {
  const studyId = study.id || study.linkId;
  state.wizardSelectedStudy = studyId;
  // Persist the study ID onto wizardData so it flows through to the POST
  // payload in Step 4 (create-btn handler). The POST handler at
  // api/admin/clients.js accepts `listenLabsStudyId` and stores it on the
  // client record; downstream the opportunity-map generator reads it via
  // the admin workshop-detail page's data-study-id attribute.
  state.wizardData.listenLabsStudyId = studyId;
  renderStudyGrid();

  const detail = $('#study-detail');
  detail.style.display = 'block';
  detail.innerHTML = `<div class="loading-state"><div class="spinner"></div><p style="margin-top:8px;">Loading study data...</p></div>`;

  try {
    const id = study.linkId || study.id;
    const data = await apiFetch(`${API.listenLabs}?action=study&id=${encodeURIComponent(id)}`);
    // /api/admin/listen-labs?action=study returns { participants, rawResponses, ... }.
    // Personalization needs the raw Listen Labs shape (tagline / bullet_summary /
    // answers_array); renderStudyDetail shows the parsed `participants` array.
    state.wizardResponses = data.rawResponses || [];
    state.wizardStudyQuestions = Array.isArray(data.questions) ? data.questions : [];
    renderStudyDetail(detail, data);
    $('#step2-next').disabled = false;
  } catch (err) {
    detail.innerHTML = `<p style="color:var(--red);">Failed to load study: ${esc(err.message)}</p>`;
  }
}

function renderStudyDetail(el, data) {
  // Backend returns { participants: [...], rawResponses: [...], responseCount }.
  // Earlier code read data.responses, which no longer exists — fall through to
  // data itself (an object, not an array) and crashed in .map.
  const responses = Array.isArray(data.participants) ? data.participants : [];
  const names = [...new Set(responses.map(r => r.name || r.respondent).filter(Boolean))];
  const roles = [...new Set(responses.map(r => r.role || r.jobTitle).filter(Boolean))];
  const departments = [...new Set(responses.map(r => r.department).filter(Boolean))];
  const tools = [...new Set(responses.flatMap(r => r.tools || []))];
  const painPoints = [...new Set(responses.flatMap(r => r.painPoints || r.challenges || []))];

  el.innerHTML = `
    <div class="participant-summary">
      <h4>Participant Summary (${responses.length} responses)</h4>
      <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px;"><strong>Names:</strong> ${names.slice(0, 15).map(n => esc(n)).join(', ') || 'N/A'}</p>
      <p style="font-size:14px;color:var(--text-secondary);margin-bottom:8px;"><strong>Roles:</strong></p>
      <div class="tag-list">${roles.map(r => `<span class="tag">${esc(r)}</span>`).join('') || '<span class="tag">N/A</span>'}</div>
      <p style="font-size:14px;color:var(--text-secondary);margin-top:12px;margin-bottom:8px;"><strong>Departments:</strong></p>
      <div class="tag-list">${departments.map(d => `<span class="tag">${esc(d)}</span>`).join('') || '<span class="tag">N/A</span>'}</div>
      <p style="font-size:14px;color:var(--text-secondary);margin-top:12px;margin-bottom:8px;"><strong>Tools Used:</strong></p>
      <div class="tag-list">${tools.map(t => `<span class="tag">${esc(t)}</span>`).join('') || '<span class="tag">N/A</span>'}</div>
      <p style="font-size:14px;color:var(--text-secondary);margin-top:12px;margin-bottom:8px;"><strong>Pain Points:</strong></p>
      <div class="tag-list">${painPoints.map(p => `<span class="tag">${esc(p)}</span>`).join('') || '<span class="tag">N/A</span>'}</div>
    </div>`;
}

/* -- Step 3: AI Personalization -- */
function renderWizardStep3(el) {
  const hasResponses = !!state.wizardResponses;
  el.innerHTML = `
    <div class="card">
      <h3 style="margin-bottom:8px;">AI Personalization</h3>

      <div style="margin-bottom:20px;">
        <button class="btn btn-accent" id="generate-btn">

          <button class="btn btn-primary" id="approve-btn">Approve Personalization</button>

      </div>

      </div>
      <div style="display:flex;justify-content:space-between;margin-top:24px;">
        <button class="btn btn-outline" id="step3-back">Back</button>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-outline" id="step3-skip">Skip</button>
          <button class="btn btn-primary" id="step3-next" ${state.wizardPersonalization ? '' : 'disabled'}>Next: Review & Create</button>
        </div>
      </div>
    </div>`;

  // If already generated, show it
  if (state.wizardPersonalization) {
    $('#personalization-area').style.display = 'block';
    $('#personalization-json').value = typeof state.wizardPersonalization === 'string'
      ? state.wizardPersonalization
      : JSON.stringify(state.wizardPersonalization, null, 2);
  }

  $('#step3-back').onclick = () => { state.wizardStep = 2; renderWizardStep(document.getElementById('app')); };
  $('#step3-skip').onclick = () => { state.wizardStep = 4; renderWizardStep(document.getElementById('app')); };

  $('#generate-btn').onclick = async () => {
    $('#gen-loading').style.display = 'block';
    $('#generate-btn').disabled = true;
    try {
      // /api/admin/personalize expects a flat payload: clientName, departments,
      // studyQuestions, responses. The earlier nested { client: wizardData }
      // shape made the handler 400 with "clientName required".
      const wd = state.wizardData || {};
      const payload = {
        clientName: wd.name || '',
        departments: Array.isArray(wd.departments) ? wd.departments : [],
        studyQuestions: Array.isArray(state.wizardStudyQuestions) ? state.wizardStudyQuestions : [],
        responses: state.wizardResponses || [],
      };
      const data = await apiFetch(API.personalize, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      const personalization = data.personalization || data.overrides || data;
      state.wizardPersonalization = personalization;
      $('#personalization-area').style.display = 'block';
      $('#personalization-json').value = typeof personalization === 'string'
        ? personalization
        : JSON.stringify(personalization, null, 2);
      $('#step3-next').disabled = false;
      toast('Personalization generated');
    } catch (err) {
      toast('Generation failed: ' + err.message, true);
    } finally {
      $('#gen-loading').style.display = 'none';
      $('#generate-btn').disabled = false;
    }
  };

  $('#approve-btn').onclick = () => {
    try {
      const raw = $('#personalization-json').value.trim();
      state.wizardPersonalization = JSON.parse(raw);
      $('#step3-next').disabled = false;
      toast('Personalization approved');
    } catch {
      // Allow non-JSON too
      state.wizardPersonalization = $('#personalization-json').value.trim();
      $('#step3-next').disabled = false;
      toast('Personalization approved (raw text)');
    }
  };

  $('#step3-next').onclick = () => {
    state.wizardStep = 4;
    renderWizardStep(document.getElementById('app'));
  };
}

async function renderWorkshopDetail(app, slug) {
  app.innerHTML = `
    <div class="loading-state"><div class="spinner"></div><p style="margin-top:12px;">Loading workshop...</p></div>`;

  try {
    const data = await apiFetch(`${API.client}?slug=${encodeURIComponent(slug)}`);
    const libData = await apiFetch(API.sampleFiles).catch(() => ({ files: [] }));
    const allSampleFiles = libData.files || [];
    renderWorkshopEditor(app, data, allSampleFiles);
  } catch (err) {
    app.innerHTML = `<div class="card"><p style="color:var(--red);">Failed to load workshop: ${esc(err.message)}</p>
      <a class="btn btn-outline btn-sm" href="#dashboard" style="margin-top:12px;">Back to Dashboard</a></div>`;
  }
}

function renderWorkshopEditor(app, workshop, allSampleFiles = []) {
  const w = workshop.client || workshop;
  const slug = w.slug;
  const participants = w.participants || [];
  const personalization = w.personalization || w.lessonOverrides || null;

  const studyId = w.studyId || w.listenLabsStudyId || '';

  app.innerHTML = `
    <div class="page-header" data-client-name="${esc(w.name)}" data-study-id="${esc(studyId)}">

        <a href="#dashboard" style="font-size:13px;color:var(--text-light);text-decoration:none;">&larr; Back to Workshops</a>

        <button class="btn btn-outline btn-sm" id="reset-btn">Reset Progress</button>

      <h3 style="margin-bottom:16px;">Settings</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="ed-name" value="${esc(w.name)}">
        </div>
        <div class="form-group">
          <label>Slug</label>
          <input type="text" value="${esc(slug)}" disabled>
          <div class="hint">Slug cannot be changed after creation</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="text" id="ed-password" value="${esc(w.password || '')}">
        </div>
        <div class="form-group">
          <label>Industry</label>
          <input type="text" id="ed-industry" value="${esc(w.industry || '')}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Departments</label>
          <input type="text" id="ed-depts" value="${esc((w.departments || []).join(', '))}">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="ed-status">
            <option value="active" ${(w.status || 'active') === 'active' ? 'selected' : ''}>Active</option>
            <option value="draft" ${w.status === 'draft' ? 'selected' : ''}>Draft</option>
            <option value="inactive" ${w.status === 'inactive' ? 'selected' : ''}>Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Listen Labs Study ID</label>
          <input type="text" id="ed-study-id" value="${esc(studyId)}" placeholder="Optional — used by the Opportunity Map generator">
          <div class="hint">Paste the study's <code>linkId</code> or <code>id</code> from Listen Labs. Leave blank to generate from a Granola transcript only.</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label>Client Logo</label>
        <div id="ed-logo-uploader"></div>
        <div class="hint">Shown on the login page and inside every lesson.</div>
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label>Sample files assigned to this workshop</label>
        <select id="wd-sample-files" multiple size="6" style="min-height:140px;">
          ${allSampleFiles.map(f => `
            <option value="${esc(f.id)}" ${(w.sampleFileIds || []).includes(f.id) ? 'selected' : ''}>
              ${esc(f.name)} — ${esc(f.category)} (${(f.size / 1024).toFixed(1)} KB)
            </option>`).join('')}
        </select>
        <div class="hint">Cmd/Ctrl-click to select multiple. Learners see a download button for the first assigned file in matching lesson spots.</div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-primary btn-sm" id="save-settings">Save Changes</button>
      </div>
    </div>

    <!-- Participants -->
    <div class="card" style="margin-bottom:20px;">
      <h3 style="margin-bottom:16px;">Participants (${participants.length})</h3>
      ${participants.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Role</th><th>Department</th><th>Progress</th><th>Last Active</th><th></th></tr></thead>
            <tbody id="participants-tbody"></tbody>
          </table>
        </div>` : '<div class="empty-state"><p>No participants have joined yet.</p></div>'}
    </div>

    <!-- Personalization -->
    <div class="card">
      <h3 style="margin-bottom:16px;">Personalization Overrides</h3>
      <div class="form-group">

      <div style="display:flex;justify-content:flex-end;">
        <button class="btn btn-primary btn-sm" id="save-personalization">Save Personalization</button>

      <div class="opp-status" id="opp-status">
        <span class="dot grey"></span>
        <span>No map generated yet</span>
      </div>

      <h4 style="font-size:14px; margin-bottom:8px;">Granola Meeting Transcript (optional)</h4>
      <textarea class="granola-textarea" id="granola-transcript" placeholder="Paste a Granola meeting transcript here. This is optional — the map can be generated from Listen Labs data alone."></textarea>

      <div class="opp-actions">
        <button class="btn btn-primary" id="opp-generate-btn" onclick="generateOppMap()">Generate Map</button>
        <button class="btn btn-outline" id="opp-preview-btn" onclick="previewOppMap()" style="display:none;">Preview</button>

      const total = p.totalLessons || 12;
      const pct = total > 0 ? Math.round((progress / total) * 100) : 0;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(p.name || p.email || 'Anonymous')}</td>
        <td>${esc(p.role || '--')}</td>
        <td>${esc(p.department || '--')}</td>

          <div style="display:flex;align-items:center;gap:8px;">
            <div style="flex:1;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;">
              <div style="height:100%;width:${pct}%;background:var(--green);border-radius:3px;"></div>
            </div>
            <span style="font-size:12px;color:var(--text-light);white-space:nowrap;">${progress}/${total}</span>
          </div>
        </td>

      tbody.appendChild(tr);

      btn.onclick = () => {
        const key = btn.dataset.removeKey;
        const name = btn.dataset.removeName || 'this participant';
        if (!key) return;
        showModal(
          'Remove Participant',
          `Remove ${name} from this workshop? Their progress record will be deleted. If they still have an active session and complete a lesson, they may re-enroll — for a definitive wipe use "Remove All Participants".`,
          async () => {
            try {
              await apiFetch(`${API.user}?slug=${encodeURIComponent(slug)}&key=${encodeURIComponent(key)}`, { method: 'DELETE' });
              toast('Participant removed');
              renderWorkshopDetail(app, slug);
            } catch (err) {
              toast('Remove failed: ' + err.message, true);
            }
          },
          'Remove',
          true
        );
      };
    });
  }

  // Logo uploader — track the edited value so Save knows whether to include it
  // (undefined = unchanged, null = explicit remove, string = new data URL).
  let editedLogoUrl;
  renderLogoUpload('ed-logo-uploader', w.logoUrl || null, (url) => { editedLogoUrl = url; });

  // Save settings
  $('#save-settings').onclick = async () => {
    try {
      const selectedIds = Array.from(document.getElementById('wd-sample-files').selectedOptions).map(o => o.value);
      const body = {
        name: $('#ed-name').value.trim(),
        password: $('#ed-password').value.trim(),
        industry: $('#ed-industry').value.trim(),
        departments: $('#ed-depts').value.split(',').map(s => s.trim()).filter(Boolean),
        status: $('#ed-status').value,
        listenLabsStudyId: $('#ed-study-id').value.trim() || null,
        sampleFileIds: selectedIds,
      };
      if (editedLogoUrl !== undefined) body.logoUrl = editedLogoUrl;
      await apiFetch(`${API.client}?slug=${encodeURIComponent(slug)}`, {
        method: 'PUT',
        body: JSON.stringify(body),
      });
      toast('Settings saved');
      // Re-render so the data-study-id attribute + Opp Map section pick up the change
      renderWorkshopDetail(app, slug);
    } catch (err) {
      toast('Save failed: ' + err.message, true);
    }
  };

  // Save personalization
  $('#save-personalization').onclick = async () => {
    let pers = $('#ed-personalization').value.trim();
    try { pers = JSON.parse(pers); } catch {}
    try {
      await apiFetch(`${API.client}?slug=${encodeURIComponent(slug)}`, {
        method: 'PUT',
        body: JSON.stringify({ personalization: pers }),
      });
      toast('Personalization saved');
    } catch (err) {
      toast('Save failed: ' + err.message, true);
    }
  };

  // Reset progress
  $('#reset-btn').onclick = () => {
    showModal(
      'Reset Progress',
      'This will reset all participant progress for this workshop. Participants stay enrolled (they appear on the leaderboard with 0 points). This action cannot be undone.',
      async () => {
        try {
          await apiFetch(API.reset, {
            method: 'POST',
            body: JSON.stringify({ slug }),
          });
          toast('Progress reset successfully');
          renderWorkshopDetail(app, slug);
        } catch (err) {
          toast('Reset failed: ' + err.message, true);
        }
      },
      'Reset All Progress',
      true
    );
  };

  // Remove all participants (empties roster — for cleaning test accounts
  // before a real cohort). Bumps resetAt so any active tabs get force-
  // logged-out on their next /api/me poll.
  $('#clear-users-btn').onclick = () => {
    showModal(
      'Remove All Participants',
      'This will remove every enrolled participant from this workshop and delete their progress records. The workshop itself stays. Any participant with an active session is logged out within ~20s. This cannot be undone.',
      async () => {
        try {
          await apiFetch(API.clearUsers, {
            method: 'POST',
            body: JSON.stringify({ slug }),
          });
          toast('All participants removed');
          renderWorkshopDetail(app, slug);
        } catch (err) {
          toast('Remove failed: ' + err.message, true);
        }
      },
      'Remove All',
      true
    );
  };

  // Delete workshop
  $('#delete-btn').onclick = () => {
    showModal(
      'Delete Workshop',
      `Are you sure you want to permanently delete "${w.name}"? This will remove all participant data and cannot be undone.`,
      async () => {
        try {
          await apiFetch(`${API.client}?slug=${encodeURIComponent(slug)}`, { method: 'DELETE' });
          toast('Workshop deleted');
          window.location.hash = '#dashboard';
        } catch (err) {
          toast('Delete failed: ' + err.message, true);
        }
      },
      'Delete Permanently',
      true
    );
  };

  // Initialize Opportunity Map section
  initOppMapSection(slug);
}

      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <h3 style="margin-bottom:16px;">Global Replacements</h3>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px;">
        Key-value pairs applied to all workshops. Use <code>{{key}}</code> syntax in lesson content.
      </p>
      <div class="form-group">
        <textarea class="json-editor" id="tpl-replacements">${esc(JSON.stringify(replacements, null, 2))}</textarea>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:16px;">Lesson Overrides</h3>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px;">
        Override specific lesson content globally. Keyed by lesson ID.
      </p>
      <div class="form-group">
        <textarea class="json-editor" id="tpl-overrides" style="min-height:340px;">${esc(JSON.stringify(overrides, null, 2))}</textarea>
      </div>
    </div>`;

  $('#save-template').onclick = async () => {
    let replacementsVal, overridesVal;
    try {
      replacementsVal = JSON.parse($('#tpl-replacements').value);
    } catch {
      toast('Invalid JSON in replacements', true);
      return;
    }
    try {
      overridesVal = JSON.parse($('#tpl-overrides').value);
    } catch {
      toast('Invalid JSON in lesson overrides', true);
      return;
    }
    try {
      await apiFetch(API.template, {
        method: 'PUT',
        body: JSON.stringify({
          replacements: replacementsVal,
          lessonOverrides: overridesVal,
        }),
      });
      toast('Template saved');
    } catch (err) {
      toast('Save failed: ' + err.message, true);
    }
  };
}

/* ============================
   OPPORTUNITY MAP
   ============================ */

function initOppMapSection(slug) {
  const section = document.getElementById('opp-map-section');
  if (!section) return;
  section.style.display = 'block';
  section.dataset.slug = slug;

  // Load existing Granola transcript from Redis if stored
  refreshOppMapStatus(slug);
}

async function refreshOppMapStatus(slug) {
  try {
    const data = await apiFetch(`/api/admin/opportunity-map?slug=${slug}`);
    const status = document.getElementById('opp-status');
    const previewBtn = document.getElementById('opp-preview-btn');
    const copyBtn = document.getElementById('opp-copy-btn');
    const downloadBtn = document.getElementById('opp-download-btn');

    if (data.map) {
      const oppCount = data.map.opportunities?.length || 0;
      const date = new Date(data.map.generatedAt).toLocaleDateString();
      status.innerHTML = `<span class="dot green"></span><span>${oppCount} opportunities \u00b7 Generated ${date}</span>`;
      previewBtn.style.display = '';
      copyBtn.style.display = '';
      downloadBtn.style.display = '';
    } else {
      status.innerHTML = '<span class="dot grey"></span><span>No map generated yet</span>';
      previewBtn.style.display = 'none';
      copyBtn.style.display = 'none';
      downloadBtn.style.display = 'none';
    }
  } catch (e) {
    console.error('Failed to check map status:', e);
  }
}

async function generateOppMap() {
  const section = document.getElementById('opp-map-section');
  const slug = section?.dataset.slug;
  if (!slug) return;

  const log = document.getElementById('opp-log');
  const btn = document.getElementById('opp-generate-btn');
  log.classList.add('visible');
  log.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Generating...';

  const appendLog = (msg) => { log.textContent += msg + '\n'; log.scrollTop = log.scrollHeight; };

  appendLog('Starting opportunity map generation...');

  // Get the current workshop's studyId and client name
  // These should be available from the workshop detail context
  const clientName = document.querySelector('[data-client-name]')?.dataset.clientName || slug;
  const studyId = document.querySelector('[data-study-id]')?.dataset.studyId;
  const granolaTranscript = document.getElementById('granola-transcript')?.value?.trim() || null;

  const body = { clientName, studyIds: studyId ? [studyId] : [], granolaTranscript };

  appendLog(`Client: ${clientName}`);
  if (studyId) appendLog(`Listen Labs study: ${studyId}`);
  if (granolaTranscript) appendLog(`Granola transcript: ${granolaTranscript.length} chars`);
  if (!studyId && !granolaTranscript) {
    appendLog('ERROR: Need at least a Listen Labs study or a Granola transcript.');
    btn.disabled = false;
    btn.textContent = 'Generate Map';
    return;
  }

  appendLog('Calling generator (this may take 30-60 seconds)...');

  try {
    const res = await fetch(`/api/admin/opportunity-map?slug=${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(body),
    });

    const data = await res.json();

    if (!res.ok) {
      appendLog(`ERROR ${res.status}: ${data.error || 'Generation failed'}`);
      if (data.drops) appendLog(`Drops: ${JSON.stringify(data.drops, null, 2)}`);
      btn.disabled = false;
      btn.textContent = 'Generate Map';
      return;
    }

    const oppCount = data.map?.opportunities?.length || 0;
    appendLog(`\u2713 Generated ${oppCount} opportunities`);
    if (data.drops?.length) appendLog(`Validator drops: ${data.drops.length} items cleaned`);
    if (data.searchOut) {
      const { toolSearches = 0, benchmarkSearches = 0, totalSources = 0 } = data.searchOut;
      appendLog(`Tavily: ${toolSearches} tool queries, ${benchmarkSearches} benchmark queries, ${totalSources} sources`);
    }
    appendLog('Map saved to Redis. Refreshing status...');

    await refreshOppMapStatus(slug);

  } catch (e) {
    appendLog(`ERROR: ${e.message}`);
  }

  btn.disabled = false;
  btn.textContent = 'Generate Map';
}

function previewOppMap() {
  const slug = document.getElementById('opp-map-section')?.dataset.slug;
  if (slug) window.open(`/map/${slug}`, '_blank');
}

function copyOppMapLink() {
  const slug = document.getElementById('opp-map-section')?.dataset.slug;
  if (!slug) return;
  const url = `${window.location.origin}/map/${slug}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('opp-copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy Link'; }, 2000);
  });
}

async function downloadOppMap() {
  const slug = document.getElementById('opp-map-section')?.dataset.slug;
  if (!slug) return;
  try {
    const data = await apiFetch(`/api/admin/opportunity-map?slug=${slug}`);
    if (data.map) {
      const blob = new Blob([JSON.stringify(data.map, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${slug}-opportunity-map.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  } catch (e) {
    console.error('Download failed:', e);
  }
}

/* ============================
   INIT
   ============================ */
(async function init() {
  // Clean up wizard flag when navigating away
  window.addEventListener('hashchange', () => {
    if (!window.location.hash.startsWith('#new-workshop')) {
      window._wizardActive = false;
    }
  });
  await route();
})();
</script>
