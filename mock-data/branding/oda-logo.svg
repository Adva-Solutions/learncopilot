<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90" role="img" aria-label="ODA">
  <!-- ODA wordmark — navy on transparent, letter-spaced, architectural weight -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" fill="#0C1F3F">
    <text x="110" y="58" font-size="56" text-anchor="middle" letter-spacing="10">ODA</text>
  </g>
  <!-- Thin gold underline spanning the width of the letters -->
  <line x1="55" y1="72" x2="165" y2="72" stroke="#C5973E" stroke-width="2"/>
</svg>
