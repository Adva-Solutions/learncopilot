<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Copilot Workshop</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1f3f'/><polygon points='16,8 28,13 16,18 4,13' fill='%23c5973e'/><path d='M9 15 V20 Q16 23 23 20 V15' fill='none' stroke='%23c5973e' stroke-width='1.5'/><line x1='28' y1='13' x2='28' y2='21' stroke='%23c5973e' stroke-width='1.2'/><circle cx='28' cy='22' r='1.2' fill='%23c5973e'/></svg>">
<script src="/tenant-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: #faf9f6;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 500ms ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .login-card {
    background: #fff;
    border: 1px solid #ddd8ce;
    border-radius: 16px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }

  .client-logo {
    text-align: center;
    margin-bottom: 16px;
    display: none;
  }
  .client-logo img {
    max-height: 64px;
    max-width: 200px;
    object-fit: contain;
  }

  .brand { text-align: center; margin-bottom: 6px; }
  .brand-name {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 26px; font-weight: 700;
    color: #1a1a2e; text-decoration: none;
    letter-spacing: 0.04em;
  }
  .brand-name:hover { opacity: 0.7; }

  .subtitle {
    text-align: center; font-size: 14px;
    color: #999; margin-bottom: 36px;
  }

  .heading {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px; font-weight: 600;
    text-align: center; margin-bottom: 28px;
    color: #1a1a2e;
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600;
    color: #5a5a6e; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .field input {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid #ddd8ce; border-radius: 10px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px; color: #1a1a2e;
    background: #faf9f6; transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .field input:focus {
    border-color: #c5973e;
    box-shadow: 0 0 0 3px rgba(197,151,62,0.1);
    background: #fff;
  }
  .field input::placeholder { color: #bbb; }

  .submit-btn {
    width: 100%; padding: 13px;
    background: #0c1f3f; color: #fff;
    border: none; border-radius: 10px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
  }
  .submit-btn:hover { background: #1a3260; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(12,31,63,0.2); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-msg {
    background: #FEF2F2; color: #DC2626;
    border: 1px solid #FECACA; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; font-weight: 500;
    margin-bottom: 16px; display: none; text-align: center;
  }
  .error-msg.visible { display: block; }

  .footer {
    text-align: center; margin-top: 24px;
    font-size: 13px; color: #bbb;
  }
  .footer a { color: #c5973e; text-decoration: none; font-weight: 600; }
  .footer a:hover { color: #a87d2e; }

</style>
</head>
<body>

<div class="login-card">
  <div class="client-logo" id="client-logo"><img id="client-logo-img" alt=""></div>
  <div class="brand"><a class="brand-name" href="/">adva</a></div>
  <div class="subtitle" id="subtitle">Copilot Workshop</div>
  <h1 class="heading">Welcome</h1>

  <div class="error-msg" id="error"></div>

  <form id="login-form" onsubmit="return handleLogin(event)">
    <div class="field">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required autocomplete="name" autofocus>
    </div>
    <div class="field">
      <label for="password">Workshop Password</label>
      <input type="password" id="password" name="password" placeholder="Enter workshop password" required>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Enter Workshop</button>
  </form>

  <div class="footer">
    Powered by <a href="https://adva-solutions.com" target="_blank">Adva Solutions</a>
  </div>
</div>

<script>
/* Read slug from URL */
const urlParams = new URLSearchParams(window.location.search);
const slug = urlParams.get('slug') || '';

/* Apply tenant config if available */
if (typeof TENANT !== 'undefined') {
  document.getElementById('subtitle').textContent = TENANT.workshopTitle || 'Copilot Workshop';
  document.title = 'Sign In — ' + (TENANT.workshopTitle || 'Copilot Workshop');
}

/* If slug is present, fetch client info for branded login */
if (slug) {
  fetch('/api/client-info?slug=' + encodeURIComponent(slug))
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      if (data.name) {
        document.getElementById('subtitle').textContent = data.name;
        document.title = 'Sign In — ' + data.name;
      }
      // Accept either `logoUrl` (the canonical field from /api/client-info)
      // or a legacy `logo` field. The API currently returns `logoUrl`; we
      // read both so this block keeps working if the field is ever renamed.
      const logoSrc = data.logoUrl || data.logo;
      if (logoSrc) {
        const logoEl = document.getElementById('client-logo');
        const logoImg = document.getElementById('client-logo-img');
        logoImg.src = logoSrc;
        logoImg.alt = data.name || 'Client Logo';
        logoEl.style.display = 'block';
        // When the client logo is present it fully represents the workshop
        // owner's brand; the small "adva" platform word below it becomes
        // redundant, so hide it. (The Adva footer link is still present
        // under the form, which is where platform attribution belongs.)
        const brand = document.querySelector('.brand');
        if (brand) brand.style.display = 'none';
      }
    })
    .catch(() => {});
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('error');
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value;

  if (!name || !password) return;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.classList.remove('visible');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      // Same-origin already sends cookies by default, but explicitly opting
      // in avoids edge cases where a strict Chrome policy or extension
      // treats the Set-Cookie response as third-party and silently drops it.
      credentials: 'same-origin',
      body: JSON.stringify({ name, password, slug })
    });
    let data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok) {
      // Surface the HTTP status so a participant can copy/paste it when
      // reporting trouble. 403 → Origin/CSRF mismatch (often a Chrome
      // extension stripping the Origin header); 429 → rate limited;
      // 401 → wrong password; 404 → slug not found.
      err.textContent = (data.error || 'Login failed') + ' (HTTP ' + res.status + ')';
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Enter Workshop';
      return;
    }
    localStorage.setItem('workshop_user', name);
    if (slug) localStorage.setItem('workshop_slug', slug);
    window.location.href = slug ? '/?slug=' + encodeURIComponent(slug) : '/';
  } catch (e) {
    // Reachable when the browser refuses the request entirely (extension
    // blocking, offline, DNS). Hint at the most common Chrome cause so the
    // participant can self-recover without filing a ticket.
    err.textContent = 'Connection error. If you are on Chrome with an ad-blocker or strict privacy extension, try an incognito window or Microsoft Edge.';
    err.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Enter Workshop';
  }
}

// If already logged in, redirect
fetch('/api/me').then(r => r.json()).then(data => {
  if (data.name) window.location.href = data.slug ? '/?slug=' + data.slug : '/';
}).catch(() => {});
</script>
</body>
</html>
