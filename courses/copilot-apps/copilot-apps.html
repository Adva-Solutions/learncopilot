.nav-section-label { padding: 16px 24px 6px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #999; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; cursor: pointer; font-size: 0.92rem; border-left: 3px solid transparent; transition: all 0.2s; }

.points { margin-left: auto; font-size: 0.75rem; color: #999; white-space: nowrap; }
.label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.main { margin-left: 300px; flex: 1; padding: 40px 48px; max-width: 900px; }

.tab:hover { color: #1a1a2e; }

.content { line-height: 1.75; }
.content h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 700; margin: 28px 0 12px; }
.content h4 { font-size: 1.05rem; font-weight: 600; margin: 20px 0 8px; }
.content p { margin-bottom: 14px; }
.content ul, .content ol { margin: 0 0 14px 24px; }
.content li { margin-bottom: 6px; }
.content strong { font-weight: 600; }

/* Code */
.code-block { background: #1e1e1e; color: #d4d4d4; padding: 16px 20px; border-radius: 8px; margin: 14px 0; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.88rem; line-height: 1.6; position: relative; white-space: pre-wrap; word-break: break-word; }
.copy-btn { position: absolute; top: 10px; right: 10px; background: #333; color: #ccc; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
.copy-btn:hover { background: #555; color: #fff; }
.inline-code { background: #f0ede6; padding: 2px 7px; border-radius: 4px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.88em; }

/* Boxes */
.tip-box { background: #e8f5e9; border-left: 4px solid #217346; padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 18px 0; }
.tip-title { font-weight: 700; color: #217346; margin-bottom: 4px; }

  learn: `
<h3>Two Ways AI Works with Your Files</h3>
<p>Before we dive into the apps, understand this key distinction — it changes how you approach every exercise in this module:</p>
<table style="width:100%;border-collapse:collapse;margin:14px 0;font-size:14px;">
  <thead><tr style="border-bottom:2px solid var(--border);">
    <th style="text-align:left;padding:8px 12px;"></th>
    <th style="text-align:left;padding:8px 12px;">Upload to Copilot Chat</th>
    <th style="text-align:left;padding:8px 12px;">Copilot Inside the App</th>
  </tr></thead>
  <tbody>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">How it works</td><td style="padding:8px 12px;">Attach a file to Chat. It reads a snapshot, answers questions, generates summaries.</td><td style="padding:8px 12px;">Copilot runs inside Excel, Word, or PowerPoint. It sees every cell, paragraph, and slide in real time.</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">What changes</td><td style="padding:8px 12px;">Nothing — the original file stays untouched.</td><td style="padding:8px 12px;">The file itself — formulas go into cells, text into paragraphs, slides get created.</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">Best for</td><td style="padding:8px 12px;">Quick answers, one-off analysis, summaries</td><td style="padding:8px 12px;">Building, editing, iterating on a live document</td></tr>
  </tbody>
</table>
<p><strong>Rule of thumb:</strong> Want an answer <em>about</em> a file? Upload to Chat. Want to change <em>inside</em> a file? Use the in-app Copilot. This module teaches the second approach — Copilot working directly inside your apps.</p>

<h3>Copilot in Outlook</h3>
<p>Let's start with Outlook, where most of your day begins.</p>
<p>Think of Copilot in Outlook as having a smart assistant who reads your email before you do and hands you a summary. You walk in, and your briefing is ready.</p>
<p>Here are the three features you will use most:</p>

<h4>Summarize Threads</h4>
<p>Open any long email thread and look for the <strong>"Summary by Copilot"</strong> banner at the top. Click it, and Copilot condenses the entire conversation into key decisions, requests, and open questions. No more re-reading 20 replies to find the one action item buried at the bottom.</p>

<h4>Draft Replies</h4>
<p>In any compose window, click the <strong>Copilot icon</strong>. Tell it what you want to say&mdash;for example, "Accept the meeting but suggest Thursday instead"&mdash;and Copilot writes a full reply you can review and send.</p>

<h4>Inbox Triage</h4>
<p>Open Copilot Chat in the Outlook sidebar and ask: <span class="inline-code">What needs my attention?</span> Copilot surfaces time-sensitive messages, action items assigned to you, and emails from key stakeholders.</p>

<h4>What's New</h4>
<p><strong>Voice triage on mobile:</strong> The Outlook mobile app now reads your unread emails aloud and lets you reply, archive, or flag by voice&mdash;great for commutes. <strong>Email actions via Chat:</strong> You can now say things like <span class="inline-code">Flag emails from my manager I haven't replied to</span> and Copilot executes the action.</p>

<div class="tip-box">
  <div class="tip-title">Building on the Chat Module</div>
  <p>You learned prompting techniques and the "You Ask Me" approach in the Chat module. Those same skills apply here — but now Copilot can see your actual emails, documents, and calendar. Specific prompts with context still beat vague requests.</p>
</div>

  learn: `
<h3>Copilot in Word</h3>
<p>In the last step, you summarized emails and drafted replies. Now take that same AI power and apply it to documents — where your real deliverables live.</p>
<p>Think of Copilot in Word as a co-author who never gets writer's block. You describe the document you need, and it writes the first draft — your job is to shape it, not start from scratch.</p>
<p>Open any Word document and look for the <strong>Copilot icon in the Home ribbon</strong>. That button is about to change how you write.</p>

<h4>Generate</h4>
<p>On a blank page, click the Copilot icon and describe what you need. Copilot creates a structured document with headings, sections, and formatting. Type "/" in the prompt to pull content from files on OneDrive or SharePoint.</p>

<h4>Rewrite</h4>
<p>Select any text, right-click, and choose <strong>Rewrite with Copilot</strong>. Pick a tone&mdash;more formal, more concise, more enthusiastic&mdash;and Copilot rewrites the selection. Works on a sentence, a paragraph, or the whole document.</p>

<h4>Reference</h4>
<p>Type "/" in any Copilot prompt to reference other files. For example: <span class="inline-code">Draft a project summary based on /Q4 Sales Report.xlsx</span>. Copilot synthesizes content from multiple sources into one coherent document.</p>

<h4>Agent Mode (NEW)</h4>
<p>Copilot doesn't just insert text anymore&mdash;it actively edits across your document while explaining its reasoning. Ask it to restructure sections, add an executive summary, and adjust tone for a board audience, and it works through each step sequentially. This is the biggest upgrade to Word Copilot since launch.</p>

<h4>Auto-Citations (NEW)</h4>
<p>When Copilot pulls from web sources or your organization's data, it now automatically inserts footnotes with citations. No more guessing where the information came from.</p>

<h4>Document Comparison</h4>
<p>One of Word Copilot's most practical uses for teams that review many document versions: open two versions of a specification or report, and ask Copilot to compare them. It highlights what changed, what was added, and what was removed — faster than reading both documents side by side. Especially useful for reviewing consultant submittals, spec revisions, or contract redlines.</p>

<div class="tip-box">
  <div class="tip-title">Tip</div>
  Use "/" references to ground Copilot in your actual data. Documents built from file references are significantly more accurate than those from prompts alone.
</div>

/* ======= JS ENGINE ======= */

function getCompletedPoints() {
  return completed.reduce((sum, idx) => sum + LESSONS[idx].points, 0);
}

function buildNav() {
  const nav = document.getElementById('navList');
  let html = '<div class="nav-section-label">Core Lessons</div>';
  LESSONS.forEach((l, i) => {
    if (i === CORE_COUNT) html += '<div class="nav-section-label">Bonus Challenges</div>';
    const done = completed.includes(i);
    const active = i === currentLesson;
    html += `<div class="nav-item${active ? ' active' : ''}" onclick="loadLesson(${i})">
      <span class="check${done ? ' done' : ''}">${done ? '&#10003;' : ''}</span>
      <span class="label">${l.title}</span>
      <span class="points">${l.points} pts</span>
    </div>`;
  });
  nav.innerHTML = html;
}

function loadLesson(idx) {
  currentLesson = idx;
  currentTab = 'learn';
  buildNav();
  renderLesson();
}

function renderLesson() {
  const l = LESSONS[currentLesson];
  const done = completed.includes(currentLesson);
  const main = document.getElementById('lessonContent');

  const bonusLabel = l.bonus ? ' <span style="background:#fff3e0;color:#e65100;font-size:0.75rem;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;">BONUS</span>' : '';

  let html = `<div class="step-header">
    <h2>${l.title} <span class="pts">${l.points} pts</span>${bonusLabel}</h2>
  </div>
  <div class="tabs">
    <div class="tab${currentTab === 'learn' ? ' active' : ''}" onclick="switchTab('learn')">Learn</div>
    <div class="tab${currentTab === 'implement' ? ' active' : ''}" onclick="switchTab('implement')">Exercises</div>
    <div class="tab${currentTab === 'advanced' ? ' active' : ''}" onclick="switchTab('advanced')">Advanced</div>
  </div>
  <div class="content">`;

  if (currentTab === 'learn') {
    html += l.learn;
    html += `<button class="continue-btn" onclick="switchTab('implement')">Continue to Exercises &rarr;</button>`;
  } else if (currentTab === 'implement') {
    html += l.implement;
    html += `<button class="mark-complete-btn${done ? ' completed' : ''}" onclick="markComplete(${currentLesson})">${done ? '&#10003; Completed' : 'Mark Complete'}</button>`;
  } else {
    html += l.advanced;
  }

  html += '</div>';
  main.innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  renderLesson();
}

function switchOption(lesson, key, btn) {
  if (btn) {
    btn.closest('.option-tabs').querySelectorAll('.option-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
  document.querySelectorAll('.option-content[data-lesson="'+lesson+'"]').forEach(c => {
    c.classList.toggle('active', c.dataset.key === key);
  });
}

function markComplete(idx) {
  if (completed.includes(idx)) return;
  completed.push(idx);
  localStorage.setItem('apps-completed', JSON.stringify(completed));
  updateProgress();
  buildNav();
  renderLesson();
  syncProgress();
}

function copyCode(btn) {
  const block = btn.parentElement;
  const text = block.textContent.replace('Copy', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function updateProgress() {
  const coreCompleted = completed.filter(i => i < CORE_COUNT).length;
  const corePts = completed.filter(i => i < CORE_COUNT).reduce((s, i) => s + LESSONS[i].points, 0);
  const bonusPts = getCompletedPoints() - corePts;
  document.getElementById('progressLabel').textContent = `${coreCompleted} / ${CORE_COUNT} core steps`;
  document.getElementById('progressPts').textContent = bonusPts > 0
    ? `${corePts} / ${CORE_POINTS} pts · +${bonusPts} bonus`
    : `${corePts} / ${CORE_POINTS} pts`;
  const pct = CORE_POINTS > 0 ? Math.min(100, Math.round((corePts / CORE_POINTS) * 100)) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

let _appsSyncTimer = null;
function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  clearTimeout(_appsSyncTimer);
  _appsSyncTimer = setTimeout(() => {
    const body = { apps: { completed, points: getCompletedPoints() } };
    fetch('/api/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).catch(err => console.warn('Progress sync failed:', err));
  }, 250);
}

/* Init */
buildNav();
updateProgress();
loadLesson(0);
</script>
