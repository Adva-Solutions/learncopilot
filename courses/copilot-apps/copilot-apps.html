<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1f3f'/><polygon points='16,8 28,13 16,18 4,13' fill='%23c5973e'/><path d='M9 15 V20 Q16 23 23 20 V15' fill='none' stroke='%23c5973e' stroke-width='1.5'/><line x1='28' y1='13' x2='28' y2='21' stroke='%23c5973e' stroke-width='1.2'/><circle cx='28' cy='22' r='1.2' fill='%23c5973e'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot in Apps - Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Source Sans 3', sans-serif; background: #faf9f6; color: #1a1a2e; padding-top: 60px; }
.app { display: flex; min-height: calc(100vh - 60px); }

/* GLOBAL TOP NAV */
.global-nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 1000; background: #0c1f3f; border-bottom: 2px solid #c5973e; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
.global-nav-brand { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.04em; }
.global-nav-brand:hover { opacity: 0.85; }
.global-nav-courses { display: flex; gap: 2px; margin-left: auto; margin-right: auto; background: rgba(255,255,255,0.08); padding: 4px; border-radius: 22px; }
.course-pill { padding: 6px 16px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
.course-pill:hover { color: #fff; background: rgba(255,255,255,0.08); }
.course-pill.active { background: #c5973e; color: #0c1f3f; }
.global-nav-links { display: flex; gap: 4px; align-items: center; }
.global-nav-link { padding: 6px 14px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
.global-nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }

/* Sidebar */
.sidebar { width: 300px; min-width: 300px; background: #fff; border-right: 1px solid #ddd8ce; padding: 24px 0; display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; bottom: 0; overflow-y: auto; }
.sidebar-header { padding: 0 24px 24px; border-bottom: 1px solid #ddd8ce; }
.sidebar-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.logo { background: #217346; color: #fff; width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.1rem; }
.subtitle { font-size: 0.85rem; color: #888; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

/* Progress */
.progress-bar-container { padding: 20px 24px; border-bottom: 1px solid #ddd8ce; }
.progress-info { display: flex; justify-content: space-between; font-size: 0.82rem; color: #666; margin-bottom: 8px; }
.progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #217346; border-radius: 3px; transition: width 0.4s ease; }

/* Nav */
.nav-section-label { padding: 16px 24px 6px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #999; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; cursor: pointer; font-size: 0.92rem; border-left: 3px solid transparent; transition: all 0.2s; }
.nav-item:hover { background: #f5f5f0; }
.nav-item.active { background: #e8f5e9; border-left-color: #217346; font-weight: 600; }
.check { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
.check.done { background: #217346; border-color: #217346; color: #fff; }
.points { margin-left: auto; font-size: 0.75rem; color: #999; white-space: nowrap; }
.label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Interactive exercise checklists */
.exercise-check { list-style: none; padding: 0; margin: 12px 0 18px; counter-reset: item; }
.exercise-check > li { margin: 8px 0; padding: 10px 14px; background: #fafafa; border: 1px solid #ddd8ce; border-radius: 6px; transition: background 0.15s ease; }
.exercise-check > li:hover { background: #f5f5f0; }
.exercise-check label { display: flex; gap: 10px; align-items: flex-start; cursor: pointer; font-size: 0.95rem; line-height: 1.55; }
.exercise-check input[type="checkbox"] { margin-top: 3px; width: 16px; height: 16px; accent-color: #217346; flex-shrink: 0; cursor: pointer; }
.exercise-check label:has(input:checked) { color: #888; }
.exercise-check label:has(input:checked) strong { color: #888; }

/* Sidebar footer (nav links) */
.sidebar-footer { margin-top: auto; padding: 14px 20px 16px; border-top: 1px solid #ddd8ce; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.sidebar-footer a { color: #217346; text-decoration: none; font-weight: 600; }
.sidebar-footer a:hover { text-decoration: underline; }
.sidebar-footer .logout-link { color: #888; font-weight: 500; cursor: pointer; }
.sidebar-footer .logout-link:hover { color: #1a1a2e; }

/* Main */
.main { margin-left: 300px; flex: 1; padding: 40px 48px; max-width: 900px; }
.step-header { margin-bottom: 28px; }
.step-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; }
.pts { display: inline-block; background: #e8f5e9; color: #217346; font-size: 0.8rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; margin-left: 10px; vertical-align: middle; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid #ddd8ce; margin-bottom: 24px; }
.tab { padding: 10px 24px; cursor: pointer; font-weight: 500; font-size: 0.95rem; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab:hover { color: #1a1a2e; }
.tab.active { color: #217346; border-bottom-color: #217346; font-weight: 600; }

/* Content */
.content { line-height: 1.75; }
.content h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 700; margin: 28px 0 12px; }
.content h4 { font-size: 1.05rem; font-weight: 600; margin: 20px 0 8px; }
.content p { margin-bottom: 14px; }
.content ul, .content ol { margin: 0 0 14px 24px; }
.content li { margin-bottom: 6px; }
.content strong { font-weight: 600; }

/* Code */
.code-block { background: #1e1e1e; color: #d4d4d4; padding: 16px 20px; border-radius: 8px; margin: 14px 0; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.88rem; line-height: 1.6; position: relative; white-space: pre-wrap; word-break: break-word; }
.copy-btn { position: absolute; top: 10px; right: 10px; background: #333; color: #ccc; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
.copy-btn:hover { background: #555; color: #fff; }
.inline-code { background: #f0ede6; padding: 2px 7px; border-radius: 4px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.88em; }

/* Boxes */
.tip-box { background: #e8f5e9; border-left: 4px solid #217346; padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 18px 0; }
.tip-title { font-weight: 700; color: #217346; margin-bottom: 4px; }
.note-box { background: #f0f4ff; border-left: 4px solid #4a7ae8; padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 18px 0; }
.note-title { font-weight: 700; color: #4a7ae8; margin-bottom: 4px; }

/* Buttons */
.mark-complete-btn { display: inline-block; background: #1a1a2e; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; margin-top: 24px; transition: all 0.2s; }
.mark-complete-btn:hover { opacity: 0.9; }
.mark-complete-btn.completed { background: #217346; }
.continue-btn { display: inline-block; background: #217346; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; margin-top: 24px; transition: all 0.2s; }
.continue-btn:hover { opacity: 0.9; }

/* Comparison Table */
.comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.92rem; }
.comparison-table th, .comparison-table td { border: 1px solid #ddd8ce; padding: 10px 14px; text-align: left; }
.comparison-table th { background: #f5f5f0; font-weight: 600; }
.comparison-table tr:nth-child(even) { background: #faf9f6; }
.personalization-note { display: none; }
.option-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.option-tab { padding: 8px 16px; border-radius: 20px; border: 2px solid #e5e7eb; font-size: 13px; font-weight: 500; cursor: pointer; color: #666; transition: all 0.15s; background: #fff; }
.option-tab:hover { border-color: #217346; color: #217346; }
.option-tab.active { background: #217346; border-color: #217346; color: white; }
.option-content { display: none; }
.option-content.active { display: block; }

@media (max-width: 768px) {
  .global-nav { padding: 0 10px; gap: 6px; }
  .course-pill { padding: 5px 10px; font-size: 12px; }
  .global-nav-link { padding: 5px 10px; font-size: 12px; }
}
</style>
</head>
<body>
<nav class="global-nav">
  <a href="/" class="global-nav-brand">adva</a>
  <div class="global-nav-courses">
    <a href="/courses/copilot-chat/copilot-chat.html" class="course-pill">Chat</a>
    <a href="/courses/copilot-apps/copilot-apps.html" class="course-pill active">Apps</a>
    <a href="/courses/building-agents/building-agents.html" class="course-pill">Agents</a>
  </div>
  <div class="global-nav-links">
    <a href="/progress.html" class="global-nav-link">Leaderboard</a>
    <a href="/admin.html" class="global-nav-link">Admin</a>
  </div>
</nav>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-header">
    <h1><span class="logo">A</span> Copilot in Apps</h1>
    <div class="subtitle">Workshop</div>
  </div>
  <div class="progress-bar-container">
    <div class="progress-info">
      <span id="progressLabel">0 / 5 core steps</span>
      <span id="progressPts">0 pts</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="lesson-nav"></div>
  <div class="sidebar-footer">
    <a href="/">&#8592; All Courses</a>
    <a class="logout-link" onclick="logout()">Sign out</a>
  </div>
</aside>

<main class="main" id="lesson-content"></main>
</div>

<script>
// Lessons array moved to ./lessons.js (loaded before this script).
const CORE_COUNT = 5;
const CORE_POINTS = 105;

// (LESSONS array is in lessons.js)
function switchOption(lesson, key, btn) {
  if (btn) {
    btn.closest('.option-tabs').querySelectorAll('.option-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
  document.querySelectorAll('.option-content[data-lesson="'+lesson+'"]').forEach(c => {
    c.classList.toggle('active', c.dataset.key === key);
  });
}

function copyCode(btn) {
  const block = btn.parentElement;
  const text = block.textContent.replace('Copy', '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function logout() {
  fetch('/api/logout').then(() => {
    localStorage.removeItem('workshop_user');
    window.location.href = '/login.html';
  });
}

/* Auth gate — bounce to login if not authenticated */
fetch('/api/me').then(r => {
  if (r.status === 401) window.location.href = '/login.html';
}).catch(() => { /* offline — leave the page alone */ });

/* ── Opportunity Map callouts ── */
const MAP_FEATURE_TAGS = {
  'apps:0': ['Outlook'],
  'apps:1': ['Word'],
  'apps:2': ['Excel'],
  'apps:3': ['PowerPoint'],
  'apps:4': ['Teams'],
};
let _mapCache = null;
async function loadMapDoc() {
  if (_mapCache !== null) return _mapCache;
  try {
    const meRes = await fetch('/api/me', { credentials: 'include' });
    if (!meRes.ok) { _mapCache = false; return false; }
    const me = await meRes.json();
    const slug = me?.slug || me?.clientId;
    if (!slug) { _mapCache = false; return false; }
    const mapRes = await fetch(`/api/map?slug=${slug}`, { credentials: 'include' });
    if (!mapRes.ok) { _mapCache = false; return false; }
    const data = await mapRes.json();
    _mapCache = data.map || false;
    return _mapCache;
  } catch { _mapCache = false; return false; }
}
async function renderMapCallout(courseId, lessonIdx) {
  const key = `${courseId}:${lessonIdx}`;
  const tags = MAP_FEATURE_TAGS[key];
  if (!tags) return;
  const map = await loadMapDoc();
  if (!map || !map.opportunities) return;
  const matches = map.opportunities.filter(o =>
    (o.copilotFeatures || []).some(f => tags.includes(f))
  ).slice(0, 3);
  if (!matches.length) return;
  const links = matches.map(o => `<a href="/map/${map.clientId}" target="_blank">${o.title}</a>`).join(' &middot; ');
  const callout = document.createElement('div');
  callout.className = 'map-callout';
  callout.innerHTML = `<strong>Relevant to your opportunity map:</strong> ${links}`;
  const content = document.querySelector('#lesson-content .content') || document.getElementById('lesson-content');
  if (content) content.prepend(callout);
}
</script>
<style>.map-callout{background:#fffaea;border:1px solid #e8c46a;padding:8px 12px;margin-bottom:12px;font-size:13px;border-radius:4px}.map-callout a{text-decoration:none;border-bottom:1px dashed #1a2230;color:#1a2230}.map-callout a:hover{border-bottom-style:solid}</style>
<script src="lessons.js"></script>
<script src="../lesson-runtime.js"></script>
<script>
  window.LessonRuntime.initCourse({
    courseId: 'copilot-apps',
    progressCategory: 'apps',
    lessons: window.LESSONS,
  });
</script>
</body>
