    learn: `
<p><em>You've been talking to AI. Now AI is going to work for you.</em></p>

<h3>From Chat to Action</h3>
<p>Think about planning a trip. A chatbot helps you research nice places and compare flights. An agent actually books the trip, coordinates the hotels, checks museum availability, and sends you a confirmation. The difference is not intelligence &mdash; it is <strong>action</strong>.</p>
<p>A chatbot answers questions. An agent completes tasks.</p>

<h3>The Agent Equation</h3>
<p style="font-size:1.15em; text-align:center; padding:18px 0; letter-spacing:0.3px;"><strong>Model + Instructions + Tools + Knowledge + Memory = Agent</strong></p>
<ul>
  <li><strong>Model = Brain</strong> &mdash; the LLM that reasons about what to do next (GPT, Claude &mdash; you can now pick Claude inside Copilot)</li>
  <li><strong>Instructions = Training</strong> &mdash; the system prompt that defines the agent's role, tone, and constraints</li>
  <li><strong>Tools = Hands</strong> &mdash; what the agent can actually do: search the web, access Outlook, write files, query databases</li>
  <li><strong>Knowledge = Library</strong> &mdash; uploaded documents and connected sources like SharePoint, OneDrive, and Dataverse</li>
  <li><strong>Memory = Experience</strong> &mdash; context retention across sessions, allowing the agent to remember past interactions (still improving)</li>
</ul>

<h3>Why This Matters</h3>
<p>Without tools, an agent is just a chatbot. Without instructions, it has no focus. Without knowledge, it hallucinates. Without memory, it starts over every conversation. Each piece of the equation is essential &mdash; and by the end of this module, you will have built agents that combine all five.</p>

<div class="tip-box">
  <div class="tip-title">Tip</div>
  <p>Before building any agent, try the same task in plain Copilot Chat first. Screenshot the result. That is your benchmark &mdash; the baseline you are trying to beat.</p>
</div>
<p class="personalization-note">[PERSONALIZED: Think about the tasks you do every week that involve multiple tools or steps. Those are your best agent candidates.]</p>

<h3>The Agent Spectrum</h3>
<p>Not everything needs to be an agent. There is a spectrum of complexity:</p>
<ul>
  <li><strong>Simple prompt</strong> &mdash; a one-off question in Copilot Chat. Quick and disposable.</li>
  <li><strong>Custom instructions</strong> &mdash; a reusable prompt with persona and constraints saved for repeated use.</li>
  <li><strong>Agent</strong> &mdash; a persistent tool with instructions, knowledge, and tools that anyone on your team can use.</li>
  <li><strong>Multi-agent system</strong> &mdash; multiple agents working together, handing off tasks to each other in a workflow.</li>
</ul>
<p>Most people jump to building agents too soon. Start with a prompt. If you find yourself reusing it, upgrade to custom instructions. If others need it, build an agent. If the task spans multiple domains, chain agents together.</p>

<h3>Why Agents Matter for Organizations</h3>
<p>The real power of agents is not personal productivity &mdash; it is <strong>organizational consistency</strong>. An agent that writes status reports the same way every time, cites the same sources, and follows the same format means your entire team produces uniform output. That is repeatable, shareable, and scalable.</p>

<h3>What's Ahead</h3>
<p>By the end of this module, you will have explored pre-built agents, put the Researcher and Analyst to work, built custom agents in Copilot Studio, and connected agents into multi-step workflows. Each lesson builds on the last.</p>

<h3>Templates: When to Use Them</h3>
<p>Use a template when it matches your use case closely &mdash; you will spend 10 minutes customizing instead of 30 minutes building from scratch. Build from scratch when your task is highly specific to your organization or when no template comes close.</p>
<p>The best approach: start from a template, test it, and then heavily customize the instructions and knowledge sources until it fits your exact needs.</p>

<p><em>You've used pre-built agents like Researcher and Analyst. Now you'll build your first custom agent &mdash; one that writes emails in your exact voice.</em></p>

<h3>Why Generic AI Emails Sound Wrong</h3>
<p>You have probably seen it: you ask AI to draft an email and the result sounds like it was written by a corporate manual. The greeting is wrong. The sign-off is wrong. The sentence rhythm is off. It uses phrases you would never say. The problem is not the AI &mdash; it is that the AI has no idea how <strong>you</strong> write.</p>
<p>Generic AI output lacks your voice, your patterns, your vocabulary, and your sign-offs. A colleague who has read your emails for years would spot the difference immediately. That is the gap we are closing today.</p>

<h3>The Process</h3>
<p>The idea is simple: extract your writing voice from your real emails, feed that voice profile as instructions to an agent, and the agent learns to mimic you. The result is a first draft that already sounds like something you wrote &mdash; not something you need to rewrite.</p>
<ol>
  <li><strong>Extract your writing voice</strong> &mdash; Copilot reads your sent emails and produces a detailed voice profile</li>
  <li><strong>Feed it as instructions</strong> &mdash; paste that profile into a custom agent's system prompt</li>
  <li><strong>The agent learns to mimic you</strong> &mdash; every draft it produces now matches your style</li>

  title: "Workflow Agents",
  points: 25,
  bonus: false,
  learn: `
<p><em>You've built agents that work on their own. Now you'll connect them into workflows &mdash; automated chains where the output of one step becomes the input of the next.</em></p>

<h3>From Specialists to Processes</h3>
<p>Building one agent is like hiring a specialist. Building a workflow is like designing a process where specialists hand off work to each other &mdash; automatically. The Write Like Me agent drafts emails. The Report Writer generates documents. A workflow connects them so that when raw data arrives, a report is generated, formatted, and delivered without you orchestrating each step manually.</p>

<h3>Two Composition Patterns</h3>

<h4>Pattern 1: Workflows Calling Agents (Agent Nodes)</h4>
<p>A deterministic workflow includes an "agent node" step. The workflow stays in control of the sequence; the agent handles interpretation and reasoning at a specific point in the chain. The workflow decides <em>when</em> things happen. The agent decides <em>what</em> to do at its step.</p>
<p><strong>Example:</strong> A form response arrives &rarr; data is routed to the right department &rarr; an agent summarizes and categorizes the response &rarr; an email is sent to the assigned reviewer. The workflow controls the routing; the agent handles the summarization.</p>

<h4>Pattern 2: Agents Calling Workflows (Workflows as Tools)</h4>
<p>An agent uses workflows as tools. The AI decides when and whether to invoke each workflow based on its reasoning. The agent is in control; workflows are capabilities it can trigger.</p>
<p><strong>Example:</strong> You say "Handle this expense report." The agent reads it, decides it needs manager approval, triggers the approval workflow, waits for the response, then routes based on the outcome. The agent chose to invoke the workflow &mdash; it was not a fixed sequence.</p>

<h3>Available Triggers and Actions</h3>
<p><strong>Triggers</strong> (what starts a workflow):</p>
<ul>
  <li>File uploaded to SharePoint</li>
  <li>New email received</li>
  <li>Form submitted</li>
  <li>Planner task completed</li>
  <li>Scheduled time (daily, weekly, monthly)</li>
  <li>Manual run</li>
</ul>
<p><strong>Actions</strong> (what a workflow can do):</p>
<ul>
  <li>Send email</li>
  <li>Create a document</li>
  <li>Update a SharePoint list</li>
  <li>Post to Teams</li>
  <li>Call another agent</li>
</ul>

<h3>Human-in-the-Loop</h3>
<p>Agents can pause mid-workflow. They send a structured approval request via Outlook, wait for the human response, then resume with the submitted values. This is critical for workflows that involve decisions, sign-offs, or sensitive actions where full automation would be inappropriate.</p>

<div class="tip-box">
  <div class="tip-title">Tip</div>

<p><em>You've built agents, used pre-built ones, and connected them into workflows. Before you deploy them widely, let's make sure they're production-ready.</em></p>

<h3>Three Principles for Production Agents</h3>

<h4>1. Test with Real Scenarios</h4>
<p>Use 5-10 real inputs from your actual work. Screenshot the results. Compare them to your benchmarks from Lesson 4 and Lesson 5. If the agent does not beat the baseline &mdash; the generic Copilot output you captured in Step 0 &mdash; something needs adjusting. Do not deploy an agent that performs worse than plain Copilot.</p>

<h4>2. Iterate from Simple to Complex</h4>
<p>Start with Instructions only. Get the core behavior right. Then add Knowledge sources. Then add capabilities and tools. Then add workflow integrations. Each layer introduces new failure modes, so validate at every step before adding the next.</p>
<ol>
  <li>Instructions only &rarr; test</li>
  <li>Add Knowledge &rarr; test</li>
  <li>Add capabilities/tools &rarr; test</li>
  <li>Add workflows &rarr; test</li>
</ol>

<h4>3. Deploy in Phases</h4>
<p>Never go from "it works on my machine" to "everyone in the company uses it." Deploy in stages:</p>
<ul>
  <li><strong>Personal</strong> &mdash; just you, for at least a week</li>
  <li><strong>Alpha</strong> &mdash; 2-3 trusted testers who will give honest feedback</li>
  <li><strong>Beta</strong> &mdash; your full team</li>
  <li><strong>Pilot</strong> &mdash; one department</li>
  <li><strong>Org-wide</strong> &mdash; after proven success in the pilot</li>
</ul>

<h3>The Iteration Cycle</h3>
<p>Every good agent goes through this loop: <strong>Build &rarr; Test &rarr; Add a rule &rarr; Test again &rarr; Repeat.</strong> The best agents are not built in one session. They are refined over 3-5 rounds of real-world testing and rule-adding.</p>

<h3>When to Update vs. When to Start Fresh</h3>
<p>Rule of thumb: if you are changing more than 30% of the Instructions, create a new agent instead of modifying the existing one. Small tweaks to tone, formatting, or edge-case handling belong in the existing agent. Fundamental changes to scope, audience, or output format deserve a fresh start.</p>

<h3>Sharing and Permissions</h3>
<p>Every agent has three sharing levels:</p>
<ul>
  <li><strong>Only you</strong> &mdash; personal tool, no one else can see or use it</li>
  <li><strong>Specific users</strong> &mdash; shared with selected colleagues by email</li>
  <li><strong>Anyone in your organization</strong> &mdash; available to all org members</li>
</ul>
<p>Start at "Only you" and expand as you validate the agent's quality.</p>

<p class="personalization-note">[PERSONALIZED: Think about who on your team would benefit most from your agents. Those are your ideal alpha testers.]</p>

<p><em>You've built individual agents. Now think bigger &mdash; how do multiple agents work together as a system?</em></p>

<h3>Three Multi-Agent Patterns</h3>
<p>When a single agent cannot handle the full scope of a workflow, you connect multiple agents into a system. There are three fundamental patterns:</p>

<h4>1. Router Agent</h4>
<p>A single entry point receives all requests and decides which specialist agent to delegate to. The router reads the user's question, classifies the intent, and forwards it to the right agent.</p>
<p><strong>Example:</strong> A "Department Help Desk" router receives all employee questions. It routes billing questions to the FAQ Agent, new hire questions to the Onboarding Agent, and technical issues to the IT Support Agent &mdash; all transparently, so the user only interacts with one front door.</p>

<h4>2. Pipeline</h4>
<p>Data flows through a sequence of agents, each one transforming the output before passing it to the next. The output of Agent 1 becomes the input for Agent 2, and so on.</p>
<p><strong>Example:</strong> Raw data &rarr; <strong>Analyst Agent</strong> (cleans and summarizes) &rarr; <strong>Report Writer Agent</strong> (formats into a structured report) &rarr; <strong>Newsletter Generator Agent</strong> (adapts into a distribution-ready newsletter).</p>

<p>Agents built on different platforms &mdash; Copilot Studio, custom SDK, third-party services &mdash; communicate using the <strong>Agent-to-Agent (A2A) protocol</strong>. This is Microsoft's standard for cross-platform agent communication. Each agent publishes an "agent card" describing its capabilities, so other agents can discover what it does and how to call it.</p>

  <pre>I want to design a 3-agent pipeline for my team. Here are the agents:
- Agent 1: [name] &mdash; [what it does]
- Agent 2: [name] &mdash; [what it does]
- Agent 3: [name] &mdash; [what it does]

Design the data flow between them. For each handoff, specify: what data passes, what format it should be in, and what happens if the previous agent's output is incomplete or low quality. Present this as a table.</pre>
</div>

<h4>Step 5: Test One Handoff Manually</h4>
<p>Pick the first handoff in your pipeline (Agent 1 &rarr; Agent 2). Run Agent 1 with a real input. Copy its output. Paste it into Agent 2 as input. Evaluate:</p>
<ul>
  <li>Did Agent 2 understand the output from Agent 1?</li>
  <li>Was any information lost or mangled in the copy-paste?</li>
  <li>What would you need to change in Agent 1's output format to make the handoff smoother?</li>
</ul>

<h4>Step 6: Reflect</h4>
<p>Ask yourself: "What would it take to automate this handoff &mdash; so I do not have to copy and paste?" That is exactly what Copilot Studio's agent flows and the A2A protocol are designed to do. The manual test you just ran is the prototype for an automated pipeline.</p>

<h4>Reflective Check</h4>
<p>Did the pipeline produce a better final result than any single agent could have produced alone? Where did the handoffs create friction? What would you change in the design?</p>
    `,
    advanced: `
<h3>Enterprise Agent Ecosystems</h3>

<h4>Governance for Multi-Agent Systems</h4>
<p>When your organization runs more than a handful of agents, you need governance. Establish these foundations:</p>
<ul>
  <li><strong>Agent registry</strong> &mdash; a central catalog listing every agent, its owner, its purpose, and what data it accesses. Without this, you get shadow agents that nobody maintains.</li>
  <li><strong>Data access documentation</strong> &mdash; for each agent, document exactly which knowledge sources and APIs it connects to. This is critical for security reviews and compliance.</li>
  <li><strong>Standardized testing requirements</strong> &mdash; every agent must pass a defined set of tests before being deployed to production. Include accuracy checks, edge case handling, and output format validation.</li>
  <li><strong>Ownership model</strong> &mdash; every agent has a named owner responsible for maintaining its Instructions, updating its knowledge, and reviewing its performance.</li>
</ul>

<h4>The A2A Protocol in Depth</h4>
<p>The Agent-to-Agent protocol enables agents from Copilot Studio, Microsoft Foundry, and third-party platforms to discover and communicate with each other. Key concepts:</p>
<ul>
  <li><strong>Agent cards</strong> &mdash; each agent publishes a machine-readable description of its capabilities, input requirements, and output formats</li>
  <li><strong>Discovery</strong> &mdash; agents can find other agents by capability ("I need an agent that can review contracts") rather than by name</li>
  <li><strong>Context passing</strong> &mdash; agents exchange structured data and conversation context during handoffs, preserving the full history of the interaction</li>
  <li><strong>Cross-platform</strong> &mdash; a Copilot Studio agent can delegate to a custom-built agent running on a completely different platform, and the user experience remains seamless</li>
</ul>

<h4>Quarterly Review Cycle</h4>
<p>Run a quarterly ecosystem review:</p>
<ul>
  <li><strong>Retire</strong> agents that have not been used in 90 days</li>
  <li><strong>Update</strong> active agents with fresh knowledge and refined Instructions</li>
  <li><strong>Identify gaps</strong> &mdash; are there recurring manual tasks that no agent covers yet?</li>
  <li><strong>Audit handoffs</strong> &mdash; are the pipeline connections between agents still working correctly?</li>
</ul>

<h4>The Future: Self-Coordinating Agent Ecosystems</h4>
<p>The trajectory is clear: from individual agents, to manually connected pipelines, to fully orchestrated ecosystems where agents discover each other, negotiate handoffs, and self-coordinate based on organizational goals. Today you design the connections manually. Tomorrow, a router agent with access to the full agent registry will assemble the right pipeline dynamically based on the task at hand. Building well-documented, well-governed agents now is how you prepare for that future.</p>
    `
  }
];

/* ================================================================
   ENGINE
   ================================================================ */
const CORE_COUNT = 8;
const CORE_POINTS = 155;
let completed = JSON.parse(localStorage.getItem('agents-completed') || '[]');
let currentLesson = 0;
let currentTab = 'learn';

/* ── Points ── */
function getCompletedPoints() {
  return completed.reduce((sum, i) => sum + LESSONS[i].points, 0);
}

function getCoreCompleted() {
  return completed.filter(i => i < CORE_COUNT).length;
}

/* ── Sync progress to server ── */
function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  const agentsData = { completed, points: getCompletedPoints() };
  const body = { agents: agentsData };
  try {
    const chatCompleted = JSON.parse(localStorage.getItem('chat-completed') || '[]');
    const appsCompleted = JSON.parse(localStorage.getItem('apps-completed') || '[]');
    body.chat = { completed: chatCompleted, points: 0 };
    body.apps = { completed: appsCompleted, points: 0 };
  } catch(e) {}
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).catch(() => {});
}

/* ── Render sidebar ── */
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = LESSONS.map((l, i) => {
    const done = completed.includes(i);
    const active = i === currentLesson;
    let cls = 'nav-item';
    if (active) cls += ' active';
    if (done) cls += ' completed';
    return `
      <div class="${cls}" onclick="goToLesson(${i})">
        <div class="nav-icon">${done ? '&#10003;' : i + 1}</div>
        <span class="nav-label">${l.title}</span>
        ${l.bonus ? '<span class="nav-badge">Bonus</span>' : ''}
        <span class="nav-pts">${l.points} pts</span>
      </div>`;
  }).join('');

  const core = getCoreCompleted();
  const pct = Math.round((core / CORE_COUNT) * 100);
  document.getElementById('progress-text').textContent = `${core} / ${CORE_COUNT} core lessons`;
  document.getElementById('points-text').textContent = `${getCompletedPoints()} pts`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

/* ── Render lesson ── */
function renderLesson() {
  const l = LESSONS[currentLesson];
  const done = completed.includes(currentLesson);
  const main = document.getElementById('main-content');

  main.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-number">${l.bonus ? 'Bonus' : 'Lesson ' + currentLesson}</div>
      <h2>${l.title}</h2>
      <div class="lesson-meta">
        <span>${l.points} points</span>
        ${done ? '<span style="color:#7b5ea7;font-weight:600;">&#10003; Completed</span>' : ''}
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${currentTab === 'learn' ? 'active' : ''}" onclick="switchTab('learn')">Learn</div>
      <div class="tab ${currentTab === 'implement' ? 'active' : ''}" onclick="switchTab('implement')">Exercises</div>
      <div class="tab ${currentTab === 'advanced' ? 'active' : ''}" onclick="switchTab('advanced')">Advanced</div>
    </div>

    <div class="tab-content content ${currentTab === 'learn' ? 'active' : ''}" id="tab-learn">
      ${l.learn}
      <button class="continue-btn" onclick="switchTab('implement')">Continue to Exercises &#8594;</button>
    </div>

    <div class="tab-content content ${currentTab === 'implement' ? 'active' : ''}" id="tab-implement">
      ${l.implement}
      <button class="mark-complete-btn" onclick="markComplete(${currentLesson})" ${done ? 'disabled' : ''}>
        ${done ? '&#10003; Completed' : '&#10003; Mark Complete'}
      </button>
    </div>

    <div class="tab-content content ${currentTab === 'advanced' ? 'active' : ''}" id="tab-advanced">
      ${l.advanced}
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Navigation ── */
function goToLesson(i) {
  currentLesson = i;
  currentTab = 'learn';
  renderSidebar();
  renderLesson();
}

function switchTab(tab) {
  currentTab = tab;
  renderLesson();
}

/* ── Mark complete ── */
function markComplete(i) {
  if (!completed.includes(i)) {
    completed.push(i);
    localStorage.setItem('agents-completed', JSON.stringify(completed));
    syncProgress();
  }
  renderSidebar();
  renderLesson();

  // auto-advance to next lesson
  if (i < LESSONS.length - 1) {
    setTimeout(() => goToLesson(i + 1), 600);
  }
}

/* ── Copy code ── */
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

/* ── Option tabs (for report exercise) ── */
function switchOption(lesson, key, btn) {
  // Support both old index-based and new key-based calls
  if (typeof key === 'number') {
    // Legacy index-based call
    const group = lesson;
    const idx = key;
    document.querySelectorAll(`#${group}-options .option-tab`).forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
    document.querySelectorAll(`[id^="${group}-option-"]`).forEach((c, i) => {
      c.classList.toggle('active', i === idx);
    });
  } else {
    // New key-based call for role tabs
    const container = btn.closest('.option-tabs');
    container.querySelectorAll('.option-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="report-option-"]').forEach(c => c.classList.remove('active'));
    const target = document.getElementById('report-option-' + key);
    if (target) target.classList.add('active');
  }
}

/* ── Init ── */
renderSidebar();
renderLesson();
syncProgress();
</script>
</body>
</html>
