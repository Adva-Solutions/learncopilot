    learn: `
<p><em>You've used Copilot as a chat partner and inside your apps. Now you'll learn what happens when you give it autonomy &mdash; when it doesn't just answer questions, but takes actions on its own.</em></p>

<h3>See the Difference</h3>
<p>When you ask Copilot to summarize an email, it reads and responds. That's a chatbot. When you ask it to research a topic, draft a memo, create slides, AND email them to your team &mdash; all from one instruction &mdash; that's an agent.</p>
<p>The difference is not what it knows. It is what it <strong>does</strong>. A chatbot answers questions. An agent completes tasks.</p>

<h3>The Agent Equation</h3>
<p><strong>Agent = LLM + Tools + Knowledge + Autonomy</strong></p>
<ul>
  <li><strong>LLM</strong> &mdash; the brain that reasons about what to do next (GPT, Claude, etc.)</li>
  <li><strong>Tools</strong> &mdash; the actions it can take (send email, query a database, create a file)</li>
  <li><strong>Knowledge</strong> &mdash; your documents, data, and context it draws on</li>
  <li><strong>Autonomy</strong> &mdash; how much it decides on its own vs. asking you first</li>
</ul>

<h3>Three Real Examples</h3>
<ul>
  <li><strong>Copilot in Outlook</strong> &mdash; reads an email thread, drafts a reply in your voice, and suggests a meeting time based on your calendar. Three tools, one action.</li>
  <li><strong>Copilot in Excel</strong> &mdash; analyzes your sales data, adds trend columns, builds a chart, and highlights anomalies. Multi-step reasoning on your spreadsheet.</li>
  <li><strong>A custom Copilot Studio agent</strong> &mdash; a new-hire onboarding bot that answers policy questions, creates accounts, and schedules orientation meetings without human intervention.</li>
</ul>

<div class="tip-box">
  <div class="tip-title">Tip</div>
  <p>Think about tasks you do repeatedly that follow a pattern. Those are your best agent candidates.</p>
</div>

<h3>Agent Architectures</h3>
<h4>ReAct (Reason + Act)</h4>
<p>The agent alternates between <em>thinking</em> (reasoning about what to do) and <em>acting</em> (calling a tool). This is the most common pattern in modern agents. The loop continues until the task is complete.</p>

<h4>Chain-of-Thought Planning</h4>
<p>Before acting, the agent writes out its full plan, then executes steps in order. This is useful when tasks have dependencies between steps.</p>

<h4>Tool-Use Patterns</h4>
<p>Some agents are given a toolbox and choose tools dynamically. Others follow a fixed pipeline of tools in a predetermined order. The choice depends on how predictable the task is.</p>

<h3>The Spectrum of Autonomy</h3>
<p>Not every task needs full autonomy. Consider this spectrum:</p>
<ul>
  <li><strong>Level 0 &mdash; Copilot:</strong> Suggests actions, human approves every one.</li>
  <li><strong>Level 1 &mdash; Supervised Agent:</strong> Executes a plan, pauses for approval at key checkpoints.</li>
  <li><strong>Level 2 &mdash; Trusted Agent:</strong> Acts independently within guardrails, notifies human of results.</li>
  <li><strong>Level 3 &mdash; Autonomous Agent:</strong> Self-directs with minimal oversight. Use only for low-risk, well-tested tasks.</li>
</ul>
<p class="personalization-note">[PERSONALIZED: Map your own recurring tasks to these autonomy levels. Which tasks could safely be Level 2? Which must stay at Level 0?]</p>

<h3>When NOT to Use an Agent</h3>
<div class="tip-box">
  <div class="tip-title">Avoid agents when:</div>
  <p>The task requires nuanced human judgment (hiring decisions, legal review), the cost of error is very high and irreversible, or the task is so infrequent that building an agent costs more than doing it manually.</p>
</div>
    `

/* ================================================================
   ENGINE
   ================================================================ */
const CORE_COUNT = 6;
const CORE_POINTS = 145;
let completed = JSON.parse(localStorage.getItem('agents-completed') || '[]');
let currentLesson = 0;
let currentTab = 'learn';

/* ── Points ── */
function getCompletedPoints() {
  return completed.reduce((sum, i) => sum + LESSONS[i].points, 0);
}

function getCoreCompleted() {
  return completed.filter(i => i < CORE_COUNT).length;
}

/* ── Sync progress to server ── */
function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  const agentsData = { completed, points: getCompletedPoints() };
  const body = { agents: agentsData };
  try {
    const chatCompleted = JSON.parse(localStorage.getItem('chat-completed') || '[]');
    const appsCompleted = JSON.parse(localStorage.getItem('apps-completed') || '[]');
    body.chat = { completed: chatCompleted, points: 0 };
    body.apps = { completed: appsCompleted, points: 0 };
  } catch(e) {}
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).catch(() => {});
}

/* ── Render sidebar ── */
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = LESSONS.map((l, i) => {
    const done = completed.includes(i);
    const active = i === currentLesson;
    let cls = 'nav-item';
    if (active) cls += ' active';
    if (done) cls += ' completed';
    return `
      <div class="${cls}" onclick="goToLesson(${i})">
        <div class="nav-icon">${done ? '&#10003;' : i + 1}</div>
        <span class="nav-label">${l.title}</span>
        ${l.bonus ? '<span class="nav-badge">Bonus</span>' : ''}
        <span class="nav-pts">${l.points} pts</span>
      </div>`;
  }).join('');

  const core = getCoreCompleted();
  const pct = Math.round((core / CORE_COUNT) * 100);
  document.getElementById('progress-text').textContent = `${core} / ${CORE_COUNT} core lessons`;
  document.getElementById('points-text').textContent = `${getCompletedPoints()} pts`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

/* ── Render lesson ── */
function renderLesson() {
  const l = LESSONS[currentLesson];
  const done = completed.includes(currentLesson);
  const main = document.getElementById('main-content');

  main.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-number">${l.bonus ? 'Bonus' : 'Lesson ' + currentLesson}</div>
      <h2>${l.title}</h2>
      <div class="lesson-meta">
        <span>${l.points} points</span>
        ${done ? '<span style="color:#7b5ea7;font-weight:600;">&#10003; Completed</span>' : ''}
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${currentTab === 'learn' ? 'active' : ''}" onclick="switchTab('learn')">Learn</div>
      <div class="tab ${currentTab === 'implement' ? 'active' : ''}" onclick="switchTab('implement')">Exercises</div>
      <div class="tab ${currentTab === 'advanced' ? 'active' : ''}" onclick="switchTab('advanced')">Advanced</div>
    </div>

    <div class="tab-content content ${currentTab === 'learn' ? 'active' : ''}" id="tab-learn">
      ${l.learn}
      <button class="continue-btn" onclick="switchTab('implement')">Continue to Exercises &#8594;</button>
    </div>

    <div class="tab-content content ${currentTab === 'implement' ? 'active' : ''}" id="tab-implement">
      ${l.implement}
      <button class="mark-complete-btn" onclick="markComplete(${currentLesson})" ${done ? 'disabled' : ''}>
        ${done ? '&#10003; Completed' : '&#10003; Mark Complete'}
      </button>
    </div>

    <div class="tab-content content ${currentTab === 'advanced' ? 'active' : ''}" id="tab-advanced">
      ${l.advanced}
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Navigation ── */
function goToLesson(i) {
  currentLesson = i;
  currentTab = 'learn';
  renderSidebar();
  renderLesson();
}

function switchTab(tab) {
  currentTab = tab;
  renderLesson();
}

/* ── Mark complete ── */
function markComplete(i) {
  if (!completed.includes(i)) {
    completed.push(i);
    localStorage.setItem('agents-completed', JSON.stringify(completed));
    syncProgress();
  }
  renderSidebar();
  renderLesson();

  // auto-advance to next lesson
  if (i < LESSONS.length - 1) {
    setTimeout(() => goToLesson(i + 1), 600);
  }
}

/* ── Copy code ── */
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

/* ── Option tabs (for report exercise) ── */
function switchOption(lesson, key, btn) {
  // Support both old index-based and new key-based calls
  if (typeof key === 'number') {
    // Legacy index-based call
    const group = lesson;
    const idx = key;
    document.querySelectorAll(`#${group}-options .option-tab`).forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
    document.querySelectorAll(`[id^="${group}-option-"]`).forEach((c, i) => {
      c.classList.toggle('active', i === idx);
    });
  } else {
    // New key-based call for role tabs
    const container = btn.closest('.option-tabs');
    container.querySelectorAll('.option-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="report-option-"]').forEach(c => c.classList.remove('active'));
    const target = document.getElementById('report-option-' + key);
    if (target) target.classList.add('active');
  }
}

/* ── Init ── */
renderSidebar();
renderLesson();
syncProgress();
</script>
