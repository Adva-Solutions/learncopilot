    learn: `
<div class="note-box" style="background:#f8f3ff;border-left:3px solid #7b5ea7;padding:12px 16px;margin-bottom:18px;">
  <strong>Building on the first two courses:</strong> Everything you configured in <strong>Copilot Chat</strong> — Custom Instructions, Memory, Notebooks, Pages — is the foundation of every agent you'll build here. An agent is just a <em>reusable, shareable</em> version of that setup: a system prompt (Instructions), a knowledge base (Notebook-style references), and connected tools (the apps you mastered in Module 2).
</div>

<p><em>You've been talking to AI. Now AI is going to work for you.</em></p>

<h3>From Chat to Action</h3>
<p>Think about planning a trip. A chatbot helps you research nice places and compare flights. An agent actually books the trip, coordinates the hotels, checks museum availability, and sends you a confirmation. The difference is not intelligence &mdash; it is <strong>action</strong>.</p>
<p>A chatbot answers questions. An agent completes tasks.</p>

<h3>The Agent Equation</h3>
<p style="font-size:1.15em; text-align:center; padding:18px 0; letter-spacing:0.3px;"><strong>Model + Instructions + Tools + Knowledge + Memory = Agent</strong></p>
<ul>
  <li><strong>Model = Brain</strong> &mdash; the LLM that reasons about what to do next (GPT, Claude &mdash; you can now pick Claude inside Copilot)</li>
  <li><strong>Instructions = Training</strong> &mdash; the system prompt that defines the agent's role, tone, and constraints</li>
  <li><strong>Tools = Hands</strong> &mdash; what the agent can actually do: search the web, access Outlook, write files, query databases</li>
  <li><strong>Knowledge = Library</strong> &mdash; uploaded documents and connected sources like SharePoint, OneDrive, and Dataverse</li>
  <li><strong>Memory = Experience</strong> &mdash; context retention across sessions, allowing the agent to remember past interactions (still improving)</li>
</ul>

<h3>Why This Matters</h3>
<p>Without tools, an agent is just a chatbot. Without instructions, it has no focus. Without knowledge, it hallucinates. Without memory, it starts over every conversation. Each piece of the equation is essential.</p>

<h3>Pre-Built vs. Custom Agents</h3>
<p>You do not need to build every agent from scratch. Microsoft ships a <strong>gallery</strong> of ready-made agents you can add to your sidebar and use immediately. When none of those fit, you build your own. In this course you will do both &mdash; starting today by exploring what is already available.</p>
<p>Alongside the gallery, Microsoft offers templates that accelerate building when you are ready:</p>
<ul>
  <li><strong>Text Translator</strong> &mdash; translates content across languages with context awareness</li>
  <li><strong>Corporate Comms Crafter</strong> &mdash; drafts internal communications in your org's tone</li>
  <li><strong>RFP Generator</strong> &mdash; produces proposal responses from your past submissions</li>
  <li><strong>Customer Insights Assistant</strong> &mdash; synthesizes customer feedback and trends</li>
  <li><strong>Writing Coach</strong> &mdash; improves writing clarity and professionalism</li>
  <li><strong>Prompt Coach</strong> &mdash; helps you write better prompts for AI tools</li>
  <li><strong>Meeting Coach</strong> &mdash; prepares briefings and follow-ups for meetings</li>
</ul>

<h3>Sharing Levels</h3>
<p>Every agent can be shared at three levels: <strong>Only you</strong> (personal), <strong>Specific users</strong> (selected colleagues), or <strong>Anyone in your organization</strong> (full org gallery). You will pick the right level for each agent you build later in the course.</p>

<div class="tip-box">
  <div class="tip-title">Tip</div>
  <p>Before building any agent, try the same task in plain Copilot Chat first. Screenshot the result. That is your benchmark &mdash; the baseline you are trying to beat.</p>
</div>
<p class="personalization-note">[PERSONALIZED: Think about the tasks you do every week that involve multiple tools or steps. Those are your best agent candidates.]</p>
    `,

<h3>Try It: Explore the Agent Gallery</h3>

<h4>Step 1: Open Copilot</h4>
<p>Navigate to <strong>m365.cloud.microsoft</strong> and open <strong>Copilot</strong> from the left sidebar or app launcher.</p>

<h4>Step 2: Find All Agents</h4>
<p>In the left sidebar, look for <strong>"Agents"</strong> (or <strong>"All agents"</strong>). Click it to open the gallery.</p>

<h4>Step 3: Browse the Gallery</h4>
<p>Scroll through the gallery. You will see agents like <strong>Researcher</strong>, <strong>Analyst</strong>, and any organization-specific agents your team has shared. Read the descriptions &mdash; each agent is built for a different type of task.</p>

<h4>Step 4: Add 3 Agents to Your Sidebar</h4>
<p>Pin or add at least 3 agents to your sidebar. Good starting picks:</p>
<ul>
  <li><strong>Researcher</strong> &mdash; for deep web research tasks</li>
  <li><strong>Analyst</strong> &mdash; for data and spreadsheet analysis</li>
  <li>One org-specific or template-based agent relevant to your role</li>
</ul>

<h4>Step 5: Open One and Test It</h4>
<p>Open one of the agents you added and ask it something relevant to your work:</p>
<div class="code-block">
  <div class="code-block-header"><span>Agent Chat</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
  <pre>Give me a quick overview of what you can do. Then help me with a task: summarize the key considerations for [a topic relevant to your role].</pre>
</div>
<p>Evaluate: Was it useful? Did it cite sources? Did it take any actions beyond generating text?</p>

<h4>Step 6: @Mention the Agent Elsewhere</h4>
<p>Open a different M365 app &mdash; for example, <strong>Teams</strong> chat or the <strong>Word</strong> sidebar. Type <strong>@</strong> followed by the agent name to invoke it directly within that app. This is how agents become part of your daily workflow without context-switching.</p>

<h3>The Agent Spectrum</h3>
<p>Not everything needs to be an agent. There is a spectrum of complexity:</p>
<ul>
  <li><strong>Simple prompt</strong> &mdash; a one-off question in Copilot Chat. Quick and disposable.</li>
  <li><strong>Custom instructions</strong> &mdash; a reusable prompt with persona and constraints saved for repeated use.</li>

  <li><strong>Multi-agent system</strong> &mdash; multiple agents working together, handing off tasks to each other in a workflow.</li>
</ul>
<p>Most people jump to building agents too soon. Start with a prompt. If you find yourself reusing it, upgrade to custom instructions. If others need it, build an agent. If the task spans multiple domains, chain agents together.</p>

<h3>Template vs. Build From Scratch</h3>
<p>Use a template when it matches your use case closely &mdash; you will spend 10 minutes customizing instead of 30 minutes building from scratch. Build from scratch when your task is highly specific to your organization or when no template comes close.</p>
<p>The best approach: start from a template, test it, and then heavily customize the instructions and knowledge sources until it fits your exact needs.</p>

<h3>Evaluating Agent Quality</h3>
<p>When testing an agent, evaluate it across four dimensions:</p>
<ul>
  <li><strong>Response accuracy</strong> &mdash; are the facts correct and current?</li>
  <li><strong>Tone match</strong> &mdash; does the output sound appropriate for your context?</li>
  <li><strong>Source citation</strong> &mdash; does it show where information came from?</li>
  <li><strong>Action reliability</strong> &mdash; when it takes actions (sending emails, creating files), does it do so correctly?</li>

<h3>Why Agents Matter for Organizations</h3>

<h3>Pattern 1: Write Like Me</h3>
<p>You have probably seen it: you ask AI to draft an email and the result sounds like it was written by a corporate manual. The greeting is wrong. The sign-off is wrong. The sentence rhythm is off. The problem is that the AI has no idea how <strong>you</strong> write.</p>
<p>The idea is simple: extract your writing voice from your real sent emails, feed that voice profile as instructions to an agent, and the agent learns to mimic you. The result is a first draft that already sounds like something you wrote &mdash; not something you need to rewrite.</p>
<ol>
  <li><strong>Extract your writing voice</strong> &mdash; Copilot reads your sent emails and produces a detailed voice profile</li>
  <li><strong>Feed it as instructions</strong> &mdash; paste that profile into a custom agent's system prompt</li>
  <li><strong>The agent learns to mimic you</strong> &mdash; every draft it produces now matches your style</li>
</ol>

<h3>Pattern 2: Report Writer</h3>
<p>Every report agent follows the same flow: <strong>raw data or notes in &rarr; structured document out.</strong> You give it meeting notes, data exports, or bullet points. It gives you a polished, consistently formatted report.</p>
<p>A good report agent does not start writing immediately. It asks questions first: Who is this report for? What time period does it cover? What is the primary focus? This "interview first, draft second" pattern produces dramatically better output because the agent understands context before it writes.</p>
<p>Instead of writing a template from scratch, feed an <em>existing</em> report you are happy with to AI. Ask it to extract the structure as a system prompt. The AI reverse-engineers your headings, section order, tone, formatting patterns, and level of detail &mdash; then uses that as a blueprint for generating new reports.</p>

<h3>One Agent per Program, Not per Task</h3>
<p>Build your report agent by program or initiative, not by individual report instance. The agent knows the structure and the context. You pass the specifics at runtime &mdash; this month's data, this week's updates, this quarter's numbers. One well-configured agent can generate dozens of different reports as long as they follow the same template.</p>

<p class="personalization-note">[PERSONALIZED: Think about the emails or reports you write most often. Whichever takes the most time is the one to automate first.]</p>

<p><em>You've built agents and used pre-built ones. Before you deploy them widely, let's make sure they're production-ready.</em></p>

<h3>Three Principles for Production Agents</h3>

<h4>1. Test with Real Scenarios</h4>
<p>Use 5-10 real inputs from your actual work. Screenshot the results. Compare them to your benchmarks from Lesson 2 ("Build Your Own Agent"). If the agent does not beat the baseline &mdash; the generic Copilot output you captured in Step 0 &mdash; something needs adjusting. Do not deploy an agent that performs worse than plain Copilot.</p>

<h4>2. Iterate from Simple to Complex</h4>
<p>Start with Instructions only. Get the core behavior right. Then add Knowledge sources. Then add capabilities and tools. Each layer introduces new failure modes, so validate at every step before adding the next.</p>
<ol>
  <li>Instructions only &rarr; test</li>
  <li>Add Knowledge &rarr; test</li>
  <li>Add capabilities/tools &rarr; test</li>
</ol>

<h4>3. Deploy in Phases</h4>
<p>Never go from "it works on my machine" to "everyone in the company uses it." Deploy in stages:</p>
<ul>
  <li><strong>Personal</strong> &mdash; just you, for at least a week</li>
  <li><strong>Alpha</strong> &mdash; 2-3 trusted testers who will give honest feedback</li>
  <li><strong>Beta</strong> &mdash; your full team</li>
  <li><strong>Pilot</strong> &mdash; one department</li>
  <li><strong>Org-wide</strong> &mdash; after proven success in the pilot</li>
</ul>

<h3>The Iteration Cycle</h3>
<p>Every good agent goes through this loop: <strong>Build &rarr; Test &rarr; Add a rule &rarr; Test again &rarr; Repeat.</strong> The best agents are not built in one session. They are refined over 3-5 rounds of real-world testing and rule-adding.</p>

<h3>When to Update vs. When to Start Fresh</h3>
<p>Rule of thumb: if you are changing more than 30% of the Instructions, create a new agent instead of modifying the existing one. Small tweaks to tone, formatting, or edge-case handling belong in the existing agent. Fundamental changes to scope, audience, or output format deserve a fresh start.</p>

  <li><strong>Specific users</strong> &mdash; shared with selected colleagues by email</li>
  <li><strong>Anyone in your organization</strong> &mdash; available to all org members</li>
</ul>
<p>Start at "Only you" and expand as you validate the agent's quality.</p>

<p class="personalization-note">[PERSONALIZED: Think about who on your team would benefit most from your agents. Those are your ideal alpha testers.]</p>

<tr><td>3</td><td>"Decline invitation politely"</td><td>Used "I hope this finds you well"</td><td>"Never use the phrase 'I hope this finds you well'"</td></tr>
<tr><td>4</td><td>"Project update to client"</td><td>Too long</td><td>"Keep emails under 150 words unless asked for detail"</td></tr>
<tr><td>5</td><td>"Request for deadline extension"</td><td>Tone too apologetic</td><td>"Frame delays as schedule adjustments, not apologies"</td></tr>
</table>

<h4>Step 4: Update the Instructions</h4>
<p>For each issue found, add a specific rule to the agent's Instructions. Be concrete. Instead of "be more casual," write "Use contractions. Start with 'Hey' or 'Hi' instead of 'Dear.' Keep sentences under 20 words."</p>

<h4>Step 5: Re-Test</h4>
<p>Run the same 5 inputs again after updating the Instructions. Compare before and after. The improvements should be visible. If an issue persists, the rule was not specific enough &mdash; rewrite it.</p>

<h4>Step 6: Get External Feedback</h4>
<p>Share your agent with one colleague. Ask them to run 3 tests with their own real inputs. Collect their feedback: what worked, what was off, what they would change. External testers always find blind spots you missed.</p>

<h4>Step 7: Final Iteration</h4>
<p>Incorporate your colleague's feedback into the Instructions. Run one final round of tests to confirm the changes improved the output without breaking what was already working.</p>

<h4>Reflective Check</h4>
<p>Compare your agent's current output to the benchmark you captured in Lesson 2, Step 0. The difference should be clear. If it is not, you need more iteration rounds.</p>
    `,
    advanced: `
<h3>Advanced: Production Operations</h3>

<h4>The Agent Lifecycle</h4>
<p>Production agents follow a continuous cycle: <strong>Build &rarr; Test &rarr; Deploy &rarr; Monitor &rarr; Improve &rarr; Repeat.</strong> An agent is never "done." Requirements change, data changes, and user expectations evolve. Plan for ongoing maintenance from the start.</p>

<h4>Enterprise Governance</h4>
<p>For organizations deploying multiple agents, establish:</p>
<ul>
  <li><strong>Agent registry:</strong> Document every agent in production &mdash; its name, purpose, owner, data access, and review schedule</li>
  <li><strong>Ownership:</strong> Every agent must have a named owner responsible for its quality and maintenance</li>
  <li><strong>Data access documentation:</strong> Record which data sources each agent can read and write, and who approved that access</li>
  <li><strong>Quarterly reviews:</strong> Evaluate each agent's usage, accuracy, and relevance on a regular schedule</li>
</ul>

<h4>Copilot Studio Evaluations</h4>
<p>Use Copilot Studio's built-in evaluation framework to formalize your testing:</p>
<ul>
  <li>Define input-output test pairs based on real scenarios</li>
  <li>Run evaluations against new agent versions before deploying</li>
  <li>Compare versions side-by-side to catch regressions</li>
  <li>Set up automated evaluation runs to detect quality drift over time</li>
</ul>

<h4>Retirement Criteria</h4>
<p>Know when to deprecate an agent. Retire an agent when:</p>
<ul>
  <li>Usage drops below a meaningful threshold for 60+ days</li>
  <li>The underlying requirements have fundamentally changed</li>
  <li>A better agent (or a built-in feature) now covers the same need</li>
  <li>The data sources it depends on are being decommissioned</li>
</ul>
<p>Retirement is not failure. It is good governance. A retired agent that served its purpose is better than an abandoned agent that confuses users.</p>
    `
  }
];

/* ================================================================
   ENGINE
   ================================================================ */
const CORE_COUNT = 4;
const CORE_POINTS = 100;
let completed = JSON.parse(localStorage.getItem('agents-completed') || '[]');
let currentLesson = 0;
let currentTab = 'learn';

/* ── Points ── */
function getCompletedPoints() {
  return completed.reduce((sum, i) => sum + LESSONS[i].points, 0);
}

function getCoreCompleted() {
  return completed.filter(i => i < CORE_COUNT).length;
}

/* ── Sync progress to server (debounced, partial update) ── */
let _agentsSyncTimer = null;
function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  clearTimeout(_agentsSyncTimer);
  _agentsSyncTimer = setTimeout(() => {
    const body = { agents: { completed, points: getCompletedPoints() } };
    fetch('/api/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).catch(err => console.warn('Progress sync failed:', err));
  }, 250);
}

/* ── Render sidebar ── */
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = LESSONS.map((l, i) => {
    const done = completed.includes(i);
    const active = i === currentLesson;
    let cls = 'nav-item';
    if (active) cls += ' active';
    if (done) cls += ' completed';
    const numLabel = l.bonus ? 'Bonus' : 'L' + (i + 1);
    return `
      <div class="${cls}" onclick="goToLesson(${i})">
        <div class="nav-icon">${done ? '&#10003;' : i + 1}</div>
        <span class="nav-label"><strong style="color:#7b5ea7;margin-right:6px;font-weight:700;">${numLabel}</strong>${l.title}</span>
        ${l.bonus ? '<span class="nav-badge">Bonus</span>' : ''}
        <span class="nav-pts">${l.points} pts</span>
      </div>`;
  }).join('');

  const core = getCoreCompleted();
  const pct = Math.min(100, Math.round((core / CORE_COUNT) * 100));
  const corePts = completed.filter(i => i < CORE_COUNT).reduce((s, i) => s + LESSONS[i].points, 0);
  const bonusPts = getCompletedPoints() - corePts;
  document.getElementById('progress-text').textContent = `${core} / ${CORE_COUNT} core lessons`;
  document.getElementById('points-text').textContent = bonusPts > 0
    ? `${corePts} / ${CORE_POINTS} pts · +${bonusPts} bonus`
    : `${corePts} / ${CORE_POINTS} pts`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

/* ── Render lesson ── */
function renderLesson() {
  const l = LESSONS[currentLesson];
  const done = completed.includes(currentLesson);
  const main = document.getElementById('main-content');

  main.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-number">${l.bonus ? 'Bonus' : 'Lesson ' + (currentLesson + 1)}</div>
      <h2>${l.title}</h2>
      <div class="lesson-meta">
        <span>${l.points} points</span>
        ${done ? '<span style="color:#7b5ea7;font-weight:600;">&#10003; Completed</span>' : ''}
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${currentTab === 'learn' ? 'active' : ''}" onclick="switchTab('learn')">Learn</div>
      <div class="tab ${currentTab === 'implement' ? 'active' : ''}" onclick="switchTab('implement')">Exercises</div>
      <div class="tab ${currentTab === 'advanced' ? 'active' : ''}" onclick="switchTab('advanced')">Advanced</div>
    </div>

    <div class="tab-content content ${currentTab === 'learn' ? 'active' : ''}" id="tab-learn">
      ${l.learn}
      <button class="continue-btn" onclick="switchTab('implement')">Continue to Exercises &#8594;</button>
    </div>

    <div class="tab-content content ${currentTab === 'implement' ? 'active' : ''}" id="tab-implement">
      ${l.implement}
      <button class="mark-complete-btn" onclick="markComplete(${currentLesson})" ${done ? 'disabled' : ''}>
        ${done ? '&#10003; Completed' : '&#10003; Mark Complete'}
      </button>
    </div>

    <div class="tab-content content ${currentTab === 'advanced' ? 'active' : ''}" id="tab-advanced">
      ${l.advanced}
    </div>
  `;

  transformExerciseLists();
  restoreExerciseChecks();
  renderMapCallout('agents', currentLesson);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Convert <ol> blocks AND <p><strong>Step N:</strong>...</p> paragraphs
   in the Exercises tab into tickable checklist items. Agents lessons
   author steps as paragraphs, not ordered lists, so we decorate those
   in-place rather than restructuring. */
function transformExerciseLists() {
  const scope = document.getElementById('tab-implement');
  if (!scope) return;
  // (a) <ol> → <ul class="exercise-check">
  scope.querySelectorAll('ol').forEach(ol => {
    if (ol.closest('.exercise-check')) return;
    const ul = document.createElement('ul');
    ul.className = 'exercise-check';
    [...ol.children].forEach(li => {
      if (li.tagName !== 'LI') return;
      const newLi = document.createElement('li');
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      label.appendChild(cb);
      const span = document.createElement('span');
      while (li.firstChild) span.appendChild(li.firstChild);
      label.appendChild(span);
      newLi.appendChild(label);
      ul.appendChild(newLi);
    });
    ol.replaceWith(ul);
  });
  // (b) Decorate <p><strong>Step N:</strong>...</p> with a checkbox.
  scope.querySelectorAll('p').forEach(p => {
    if (p.dataset.stepDecorated === '1') return;
    const first = p.firstElementChild;
    if (!first || first.tagName !== 'STRONG') return;
    const txt = (first.textContent || '').trim();
    // Match "Step 1:", "Step 6 — Iterate:", "Step 2a:", etc.
    if (!/^Step\s+[\w.-]+\s*(—|:)/i.test(txt)) return;
    p.dataset.stepDecorated = '1';
    p.classList.add('step-check-row');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'step-check';
    p.insertBefore(cb, p.firstChild);
  });
}

/* Persistence for exercise checkboxes, keyed by lesson index. */
function loadExerciseChecks() {
  try { return JSON.parse(localStorage.getItem('agents-exercise-checks') || '{}'); }
  catch { return {}; }
}
function saveExerciseChecks(all) {
  localStorage.setItem('agents-exercise-checks', JSON.stringify(all));
}
function restoreExerciseChecks() {
  const scope = document.getElementById('tab-implement');
  if (!scope) return;
  const all = loadExerciseChecks();
  const mine = all[currentLesson] || [];
  // Combined ordered list: <ol>-derived boxes first, then step-decorated boxes.
  const boxes = scope.querySelectorAll('.exercise-check input[type="checkbox"], input.step-check');
  boxes.forEach((cb, i) => {
    cb.checked = !!mine[i];
    cb.addEventListener('change', () => {
      const state = loadExerciseChecks();
      const arr = state[currentLesson] || [];
      arr[i] = cb.checked;
      state[currentLesson] = arr;
      saveExerciseChecks(state);
    });
  });
}

/* ── Navigation ── */
function goToLesson(i) {
  currentLesson = i;
  currentTab = 'learn';
  renderSidebar();
  renderLesson();
}

function switchTab(tab) {
  currentTab = tab;
  renderLesson();
}

/* ── Mark complete ── */
function markComplete(i) {
  if (!completed.includes(i)) {
    completed.push(i);
    localStorage.setItem('agents-completed', JSON.stringify(completed));
    syncProgress();
  }
  renderSidebar();
  renderLesson();

  // auto-advance to next lesson
  if (i < LESSONS.length - 1) {
    setTimeout(() => goToLesson(i + 1), 600);
  }
}

/* ── Copy code ── */
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

/* ── Logout ── */
function logout() {
  fetch('/api/logout').then(() => {
    localStorage.removeItem('workshop_user');
    window.location.href = '/login.html';
  });
}

/* ── Option tabs (for report exercise) ── */
function switchOption(lesson, key, btn) {
  // Support both old index-based and new key-based calls
  if (typeof key === 'number') {
    // Legacy index-based call
    const group = lesson;
    const idx = key;
    document.querySelectorAll(`#${group}-options .option-tab`).forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
    document.querySelectorAll(`[id^="${group}-option-"]`).forEach((c, i) => {
      c.classList.toggle('active', i === idx);
    });
  } else {
    // New key-based call for role tabs
    const container = btn.closest('.option-tabs');
    container.querySelectorAll('.option-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="report-option-"]').forEach(c => c.classList.remove('active'));
    const target = document.getElementById('report-option-' + key);
    if (target) target.classList.add('active');
  }
}

/* ── Auth gate ── */
fetch('/api/me').then(r => {
  if (r.status === 401) window.location.href = '/login.html';
}).catch(() => { /* offline — leave the page alone */ });

/* ── Opportunity Map callouts ── */
const MAP_FEATURE_TAGS = {
  'agents:0': ['Agent Builder', 'Chat'],
  'agents:1': ['Researcher', 'Analyst'],
  'agents:2': ['Agent Builder', 'Custom Instructions'],
  'agents:3': ['Agent Builder'],
};
let _mapCache = null;
async function loadMapDoc() {
  if (_mapCache !== null) return _mapCache;
  try {
    const meRes = await fetch('/api/me', { credentials: 'include' });
    if (!meRes.ok) { _mapCache = false; return false; }
    const me = await meRes.json();
    const slug = me?.slug || me?.clientId;
    if (!slug) { _mapCache = false; return false; }
    const mapRes = await fetch(`/api/map?slug=${slug}`, { credentials: 'include' });
    if (!mapRes.ok) { _mapCache = false; return false; }
    const data = await mapRes.json();
    _mapCache = data.map || false;
    return _mapCache;
  } catch { _mapCache = false; return false; }
}
async function renderMapCallout(courseId, lessonIdx) {
  const key = `${courseId}:${lessonIdx}`;
  const tags = MAP_FEATURE_TAGS[key];
  if (!tags) return;
  const map = await loadMapDoc();
  if (!map || !map.opportunities) return;
  const matches = map.opportunities.filter(o =>
    (o.copilotFeatures || []).some(f => tags.includes(f))
  ).slice(0, 3);
  if (!matches.length) return;
  const links = matches.map(o => `<a href="/map/${map.clientId}" target="_blank">${o.title}</a>`).join(' &middot; ');
  const callout = document.createElement('div');
  callout.className = 'map-callout';
  callout.innerHTML = `<strong>Relevant to your opportunity map:</strong> ${links}`;
  const content = document.querySelector('.tab-content.active .content') || document.querySelector('.tab-content.active');
  if (content) content.prepend(callout);
}

/* ── Init ── */
renderSidebar();
renderLesson();
syncProgress();
</script>
<style>.map-callout{background:#fffaea;border:1px solid #e8c46a;padding:8px 12px;margin-bottom:12px;font-size:13px;border-radius:4px}.map-callout a{text-decoration:none;border-bottom:1px dashed #1a2230;color:#1a2230}.map-callout a:hover{border-bottom-style:solid}</style>
</body>
