<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Agents - Learn Copilot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c1f3f'/><polygon points='16,8 28,13 16,18 4,13' fill='%23c5973e'/><path d='M9 15 V20 Q16 23 23 20 V15' fill='none' stroke='%23c5973e' stroke-width='1.5'/><line x1='28' y1='13' x2='28' y2='21' stroke='%23c5973e' stroke-width='1.2'/><circle cx='28' cy='22' r='1.2' fill='%23c5973e'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: #faf9f6;
    color: #1a1a2e;
    line-height: 1.7;
    font-size: 16px;
    padding-top: 60px;
  }

  /* GLOBAL TOP NAV */
  .global-nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 1000; background: #0c1f3f; border-bottom: 2px solid #c5973e; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
  .global-nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.04em; }
  .global-nav-brand:hover { opacity: 0.85; }
  .global-nav-courses { display: flex; gap: 2px; margin-left: auto; margin-right: auto; background: rgba(255,255,255,0.08); padding: 4px; border-radius: 22px; }
  .course-pill { padding: 6px 16px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
  .course-pill:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .course-pill.active { background: #c5973e; color: #0c1f3f; }
  .global-nav-links { display: flex; gap: 4px; align-items: center; }
  .global-nav-link { padding: 6px 14px; border-radius: 18px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; }
  .global-nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }

  .app {
    display: flex;
    min-height: calc(100vh - 60px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: #fff;
    border-right: 1px solid #ddd8ce;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid #ddd8ce;
  }

  .client-logo-slot { display: none; padding-bottom: 14px; }
  .client-logo-slot img { max-height: 48px; max-width: 200px; object-fit: contain; }

  .sidebar-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    background: #7b5ea7;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 18px;
  }

  .sidebar-progress {
    padding: 16px 20px;
    border-bottom: 1px solid #ddd8ce;
    font-size: 14px;
  }

  .sidebar-progress .progress-bar {
    height: 6px;
    background: #eee8df;
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
  }

  .sidebar-progress .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7b5ea7 0%, #9376be 100%);
    border-radius: 3px;
    box-shadow: 0 0 6px rgba(123,94,167,0.35);
    transition: width 450ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sidebar-nav {
    flex: 1;
    padding: 12px 0;
    overflow-y: auto;
  }

  .nav-item {
    padding: 10px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #555;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover {
    background: #f5f3ef;
  }

  .nav-item.active {
    background: #f5f0fa;
    color: #7b5ea7;
    border-left-color: #7b5ea7;
    font-weight: 600;
  }

  .nav-item.completed {
    color: #7b5ea7;
  }

  .nav-item .nav-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }

  .nav-item.completed .nav-icon {
    background: #7b5ea7;
    border-color: #7b5ea7;
    color: #fff;
  }

  .nav-item.active .nav-icon {
    border-color: #7b5ea7;
  }

  .nav-item .nav-label { flex: 1; }

  .nav-item .nav-pts {
    font-size: 11px;
    color: #999;
    font-weight: 500;
  }

  .nav-item .nav-badge {
    font-size: 9px;
    background: #f0ecff;
    color: #7b5ea7;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid #ddd8ce;
    font-size: 13px;
    color: #888;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sidebar-footer a {
    color: #7b5ea7;
    text-decoration: none;
    font-weight: 600;
  }

  .sidebar-footer a:hover {
    text-decoration: underline;
  }

  .sidebar-footer .logout-link {
    color: #888;
    font-weight: 500;
    cursor: pointer;
  }

  .sidebar-footer .logout-link:hover {
    color: #1a1a2e;
  }

  /* Interactive exercise checklists */
  .exercise-check { list-style: none; padding: 0; margin: 12px 0 18px; }
  .exercise-check > li { margin: 8px 0; padding: 10px 14px; background: #faf9f6; border: 1px solid #ddd8ce; border-radius: 6px; transition: background 0.15s ease; }
  .exercise-check > li:hover { background: #f5f4f1; }
  .exercise-check label { display: flex; gap: 10px; align-items: flex-start; cursor: pointer; font-size: 0.95rem; line-height: 1.55; }
  .exercise-check input[type="checkbox"] { margin-top: 3px; width: 16px; height: 16px; accent-color: #7b5ea7; flex-shrink: 0; cursor: pointer; }
  .exercise-check label:has(input:checked) { color: #888; }
  .exercise-check label:has(input:checked) strong { color: #888; }

  /* Step-paragraph decorator checkbox */
  .step-check-row { position: relative; padding-left: 26px; }
  .step-check { position: absolute; left: 0; top: 6px; width: 16px; height: 16px; accent-color: #7b5ea7; cursor: pointer; }
  .step-check-row:has(.step-check:checked) { color: #888; }
  .step-check-row:has(.step-check:checked) strong { color: #888; }

  /* ── Main Content ── */
  .main {
    flex: 1;
    padding: 40px 56px 80px;
    max-width: 880px;
  }

  .lesson-header {
    margin-bottom: 32px;
  }

  .lesson-header .lesson-number {
    font-size: 13px;
    font-weight: 600;
    color: #7b5ea7;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }

  .lesson-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 1.2;
  }

  .lesson-header .lesson-meta {
    margin-top: 8px;
    font-size: 14px;
    color: #888;
  }

  .lesson-header .lesson-meta span {
    margin-right: 16px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #ddd8ce;
    margin-bottom: 32px;
  }

  .tab {
    padding: 12px 28px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #888;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 250ms cubic-bezier(0.4, 0, 0.2, 1),
                border-bottom-color 250ms cubic-bezier(0.4, 0, 0.2, 1),
                transform 200ms cubic-bezier(0.4, 0, 0.2, 1),
                font-weight 150ms ease;
  }

  .tab:hover {
    color: #555;
    transform: translateY(-1px);
  }

  .tab.active {
    color: #7b5ea7;
    border-bottom-color: #7b5ea7;
    font-weight: 600;
    transform: translateY(0);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeIn 300ms ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Typography ── */
  .content h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: #1a1a2e;
    margin: 32px 0 12px;
  }

  .content h3:first-child {
    margin-top: 0;
  }

  .content h4 {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a2e;
    margin: 24px 0 8px;
  }

  .content p {
    margin-bottom: 16px;
    color: #444;
  }

  .content ul, .content ol {
    margin: 0 0 16px 24px;
    color: #444;
  }

  .content li {
    margin-bottom: 6px;
  }

  .content strong {
    color: #1a1a2e;
  }

  /* ── Code/Prompt Blocks ── */
  .code-block {
    background: #1e1e1e;
    color: #d4d4d4;
    border-radius: 8px;
    margin: 16px 0;
    overflow: hidden;
  }

  .code-block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: #2d2d2d;
    font-size: 12px;
    color: #888;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: #444;
    color: #fff;
  }

  .code-block pre {
    padding: 16px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* ── Tip Box ── */
  .tip-box {
    background: #f5f0fa;
    border-left: 4px solid #7b5ea7;
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin: 20px 0;
  }

  .tip-box .tip-title {
    font-weight: 600;
    color: #7b5ea7;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .tip-box p {
    color: #555;
    margin-bottom: 0;
    font-size: 14px;
  }

  /* ── Note Box ── */
  .note-box {
    background: #f0f4ff;
    border-left: 4px solid #4a7ae8;
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin: 20px 0;
  }

  .note-box .note-title {
    font-weight: 600;
    color: #4a7ae8;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .note-box p {
    color: #555;
    margin-bottom: 0;
    font-size: 14px;
  }

  /* ── Step progress checkbox (auto-injected by lesson-runtime.decorateSteps) ── */
  .step-check { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; min-width: 18px; border: 2px solid #bbb; border-radius: 4px; margin-right: 10px; cursor: pointer; vertical-align: middle; font-size: 12px; line-height: 1; color: transparent; transition: all 0.15s ease; user-select: none; background: #fff; }
  .step-check:hover { border-color: #7b5ea7; }
  .step-check:focus-visible { outline: 2px solid #7b5ea7; outline-offset: 2px; }
  .step-check[aria-checked="true"] { background: #7b5ea7; border-color: #7b5ea7; color: #fff; }
  .step-check[aria-checked="true"]::before { content: '\2713'; }
  h4.has-step-check, li.has-step-check { display: flex; align-items: flex-start; }
  h4.has-step-check > .step-check { margin-top: 4px; }
  li.has-step-check > .step-check { margin-top: 4px; }
  li.has-step-check { list-style: none; margin-left: -20px; padding-left: 0; }

  /* ── Buttons ── */
  .mark-complete-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #7b5ea7;
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;

    margin-top: 32px;

  }

  .mark-complete-btn:hover {
    background: #6a4f94;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(123,94,167,0.3);
  }

  .mark-complete-btn:active {
    transform: translateY(0);
    box-shadow: 0 1px 3px rgba(123,94,167,0.2);
  }

  .mark-complete-btn:disabled {
    background: #bbb;
    cursor: default;
    transform: none;
  }

  .continue-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: #7b5ea7;
    border: 2px solid #7b5ea7;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    box-shadow: 0 2px 6px rgba(123,94,167,0.15);
    transition: transform 200ms cubic-bezier(0.4,0,0.2,1), box-shadow 200ms cubic-bezier(0.4,0,0.2,1), background 200ms ease, opacity 200ms ease;
  }

  .continue-btn:hover {
    background: #f5f0fa;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(123,94,167,0.25);
  }

  .continue-btn:active {
    transform: translateY(0);
    box-shadow: 0 1px 3px rgba(123,94,167,0.15);
  }

  /* ── Option Tabs ── */
  .option-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .option-tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid #e5e7eb;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #666;
    transition: all 0.15s;
    background: #fff;
  }

  .option-tab:hover {
    border-color: #7b5ea7;
    color: #7b5ea7;
  }

  .option-tab.active {
    background: #7b5ea7;
    border-color: #7b5ea7;
    color: white;
  }

  .option-content {
    display: none;
  }

  .option-content.active {
    display: block;
  }

  /* ── Personalization Notes ── */
  .personalization-note {
    display: none;
  }

  /* ── Comparison Table ── */
  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  .comparison-table th {
    background: #f5f0fa;
    color: #7b5ea7;
    font-weight: 600;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 2px solid #ddd8ce;
  }

  .comparison-table td {
    padding: 10px 16px;
    border-bottom: 1px solid #eee8df;
    color: #444;
  }

  .comparison-table tr:hover td {
    background: #faf8f5;
  }

  /* ── Step List ── */
  .step-list {
    counter-reset: step-counter;
    list-style: none;
    margin: 16px 0;
    padding: 0;
  }

  .step-list li {
    counter-increment: step-counter;
    padding: 12px 0 12px 48px;
    position: relative;
    border-bottom: 1px solid #eee8df;
  }

  .step-list li::before {
    content: counter(step-counter);
    position: absolute;
    left: 0;
    top: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #f5f0fa;
    color: #7b5ea7;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-list li:last-child {
    border-bottom: none;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      height: auto;
      position: relative;
    }
    .sidebar-nav { display: flex; overflow-x: auto; padding: 8px; }
    .nav-item { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
    .nav-item.active { border-bottom-color: #7b5ea7; border-left: none; }
    .main { padding: 24px 20px 60px; }
  }
  @media (max-width: 768px) {
    .global-nav { padding: 0 10px; gap: 6px; }
    .course-pill { padding: 5px 10px; font-size: 12px; }
    .global-nav-link { padding: 5px 10px; font-size: 12px; }
  }
</style>
</head>

<nav class="global-nav">
  <a href="/" class="global-nav-brand">adva</a>
  <div class="global-nav-courses">
    <a href="/courses/copilot-chat/copilot-chat.html" class="course-pill">Chat</a>
    <a href="/courses/copilot-apps/copilot-apps.html" class="course-pill">Apps</a>

  </div>

    <a href="/progress.html" class="global-nav-link">Leaderboard</a>
    <a href="/admin.html" class="global-nav-link">Admin</a>
  </div>
</nav>
<div class="app">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="client-logo-slot" id="client-logo-slot"></div>
      <h1><span class="logo">B</span> Building Agents</h1>
    </div>
    <div class="sidebar-progress">
      <div><strong id="progress-text">0 / 4 core lessons</strong> &middot; <span id="points-text">0 pts</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <nav class="sidebar-nav" id="lesson-nav"></nav>
    <div class="sidebar-footer">
      <a href="/">&#8592; All Courses</a>
      <a class="logout-link" href="#" onclick="logout(); return false;">Sign out</a>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main" id="lesson-content"></div>
</div>

<script>
/* ================================================================
   ENGINE
   ================================================================ */
// (LESSONS array is in lessons.js)
const CORE_COUNT = 4;
const CORE_POINTS = 100;

/* ── Update sidebar progress display ── */
function updateProgress(completedIndices, lessons) {
  const core = completedIndices.filter(i => lessons[i] && !lessons[i].bonus).length;
  const corePts = completedIndices.filter(i => lessons[i] && !lessons[i].bonus).reduce((s, i) => s + lessons[i].points, 0);
  const totalPts = completedIndices.reduce((s, i) => s + (lessons[i] ? lessons[i].points : 0), 0);
  const bonusPts = totalPts - corePts;
  const pct = Math.min(100, Math.round((core / CORE_COUNT) * 100));
  const ptEl = document.getElementById('progress-text');
  const ptsEl = document.getElementById('points-text');
  const fillEl = document.getElementById('progress-fill');
  if (ptEl) ptEl.textContent = `${core} / ${CORE_COUNT} core lessons`;
  if (ptsEl) ptsEl.textContent = bonusPts > 0
    ? `${corePts} / ${CORE_POINTS} pts · +${bonusPts} bonus`
    : `${corePts} / ${CORE_POINTS} pts`;
  if (fillEl) fillEl.style.width = pct + '%';
}

/* ── Copy code ── */
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

/* ── Logout ── */
function logout() {
  fetch('/api/logout').then(() => {
    localStorage.removeItem('workshop_user');
    const s = new URLSearchParams(location.search).get('slug');
    window.location.href = s ? '/login.html?slug=' + encodeURIComponent(s) : '/login.html';
  });
}

/* ── Option tabs (for report exercise) ── */
function switchOption(lesson, key, btn) {
  // Support both old index-based and new key-based calls
  if (typeof key === 'number') {
    // Legacy index-based call
    const group = lesson;
    const idx = key;
    document.querySelectorAll(`#${group}-options .option-tab`).forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });
    document.querySelectorAll(`[id^="${group}-option-"]`).forEach((c, i) => {
      c.classList.toggle('active', i === idx);
    });
  } else {
    // New key-based call for role tabs
    const container = btn.closest('.option-tabs');
    container.querySelectorAll('.option-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="report-option-"]').forEach(c => c.classList.remove('active'));
    const target = document.getElementById('report-option-' + key);
    if (target) target.classList.add('active');
  }
}

/* ── Auth gate ──
   Polled so admin Reset Progress (which invalidates pre-reset sessions
   server-side) kicks active tabs within ~20s, not only on manual refresh. */
function redirectToLogin() {
  const s = new URLSearchParams(location.search).get('slug');
  window.location.href = s ? '/login.html?slug=' + encodeURIComponent(s) : '/login.html';
}
function authCheck() {
  fetch('/api/me').then(r => { if (r.status === 401) redirectToLogin(); }).catch(() => {});
}
authCheck();
setInterval(authCheck, 20000);

/* ── Opportunity Map callouts ── */
const MAP_FEATURE_TAGS = {
  'agents:0': ['Agent Builder', 'Chat'],
  'agents:1': ['Researcher', 'Analyst'],
  'agents:2': ['Agent Builder', 'Custom Instructions'],
  'agents:3': ['Agent Builder'],
};
let _mapCache = null;
async function loadMapDoc() {
  if (_mapCache !== null) return _mapCache;
  try {
    const meRes = await fetch('/api/me', { credentials: 'include' });
    if (!meRes.ok) { _mapCache = false; return false; }
    const me = await meRes.json();
    const slug = me?.slug || me?.clientId;
    if (!slug) { _mapCache = false; return false; }
    const mapRes = await fetch(`/api/map?slug=${slug}`, { credentials: 'include' });
    if (!mapRes.ok) { _mapCache = false; return false; }
    const data = await mapRes.json();
    _mapCache = data.map || false;
    return _mapCache;
  } catch { _mapCache = false; return false; }
}
async function renderMapCallout(courseId, lessonIdx) {
  const key = `${courseId}:${lessonIdx}`;
  const tags = MAP_FEATURE_TAGS[key];
  if (!tags) return;
  const map = await loadMapDoc();
  if (!map || !map.opportunities) return;
  const matches = map.opportunities.filter(o =>
    (o.copilotFeatures || []).some(f => tags.includes(f))
  ).slice(0, 3);
  if (!matches.length) return;
  const links = matches.map(o => `<a href="/map/${map.clientId}" target="_blank">${o.title}</a>`).join(' &middot; ');
  const callout = document.createElement('div');
  callout.className = 'map-callout';
  callout.innerHTML = `<strong>Relevant to your opportunity map:</strong> ${links}`;
  const content = document.querySelector('#lesson-content .tab-content.active') || document.getElementById('lesson-content');
  if (content) {
    const existing = content.querySelector('.map-callout');
    if (existing) existing.remove();
    content.prepend(callout);
  }
}

/* Convert <ol> blocks AND <p><strong>Step N:</strong>...</p> paragraphs
   in the Exercises tab into tickable checklist items. Agents lessons
   author steps as paragraphs, not ordered lists, so we decorate those
   in-place rather than restructuring. */
function transformExerciseLists() {
  const scope = document.getElementById('tab-implement');
  if (!scope) return;
  // (a) <ol> → <ul class="exercise-check">
  scope.querySelectorAll('ol').forEach(ol => {
    if (ol.closest('.exercise-check')) return;
    const ul = document.createElement('ul');
    ul.className = 'exercise-check';
    [...ol.children].forEach(li => {
      if (li.tagName !== 'LI') return;
      const newLi = document.createElement('li');
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      label.appendChild(cb);
      const span = document.createElement('span');
      while (li.firstChild) span.appendChild(li.firstChild);
      label.appendChild(span);
      newLi.appendChild(label);
      ul.appendChild(newLi);
    });
    ol.replaceWith(ul);
  });
  // (b) Decorate <p><strong>Step N:</strong>...</p> with a checkbox.
  scope.querySelectorAll('p').forEach(p => {
    if (p.dataset.stepDecorated === '1') return;
    const first = p.firstElementChild;
    if (!first || first.tagName !== 'STRONG') return;
    const txt = (first.textContent || '').trim();
    // Match "Step 1:", "Step 6 — Iterate:", "Step 2a:", etc.
    if (!/^Step\s+[\w.-]+\s*(—|:)/i.test(txt)) return;
    p.dataset.stepDecorated = '1';
    p.classList.add('step-check-row');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'step-check';
    p.insertBefore(cb, p.firstChild);
  });
}

/* Persistence for exercise checkboxes, keyed by lesson index. */
function loadExerciseChecks() {
  try { return JSON.parse(localStorage.getItem('agents-exercise-checks') || '{}'); }
  catch { return {}; }
}
function saveExerciseChecks(all) {
  localStorage.setItem('agents-exercise-checks', JSON.stringify(all));
}
function restoreExerciseChecks(currentLesson, currentTab) {
  if (currentTab !== 'implement') return;
  const scope = document.getElementById('tab-implement');
  if (!scope) return;
  const all = loadExerciseChecks();
  const mine = all[currentLesson] || [];
  // Combined ordered list: <ol>-derived boxes first, then step-decorated boxes.
  const boxes = scope.querySelectorAll('.exercise-check input[type="checkbox"], input.step-check');
  boxes.forEach((cb, i) => {
    cb.checked = !!mine[i];
    if (cb.dataset.wired) return;
    cb.dataset.wired = '1';
    cb.addEventListener('change', () => {
      const state = loadExerciseChecks();
      const arr = state[currentLesson] || [];
      arr[i] = cb.checked;
      state[currentLesson] = arr;
      saveExerciseChecks(state);
    });
  });
}
</script>
<style>.map-callout{background:#fffaea;border:1px solid #e8c46a;padding:8px 12px;margin-bottom:12px;font-size:13px;border-radius:4px}.map-callout a{text-decoration:none;border-bottom:1px dashed #1a2230;color:#1a2230}.map-callout a:hover{border-bottom-style:solid}</style>
<script src="lessons.js"></script>
<script src="../lesson-runtime.js"></script>
<script>
  /* ── Per-course renderers: agents legacy HTML shape ── */

  function getCoreCompleted(lessons, completed, coreCount) {
    return completed.filter(i => lessons[i] && !lessons[i].bonus).length;
  }

  function getCompletedPoints(lessons, completed) {
    return completed.reduce((sum, i) => sum + (lessons[i] ? lessons[i].points : 0), 0);
  }

  function agentsRenderLesson() {
    const s = window.LessonRuntime.getState();
    if (!s) return;
    const LESSONS = s.lessons;
    const currentLesson = s.currentLesson;
    const currentTab = s.currentTab;
    const completed = s.completed;

    const l = LESSONS[currentLesson];
    const done = completed.includes(currentLesson);
    const main = document.getElementById('lesson-content');
    if (!main) return;

    main.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-number">${l.bonus ? 'Bonus' : 'Lesson ' + (currentLesson + 1)}</div>
      <h2>${l.title}</h2>
      <div class="lesson-meta">
        <span>${l.points} points</span>
        ${done ? '<span style="color:#7b5ea7;font-weight:600;">&#10003; Completed</span>' : ''}
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${currentTab === 'learn' ? 'active' : ''}" onclick="switchTab('learn')">Learn</div>
      <div class="tab ${currentTab === 'implement' ? 'active' : ''}" onclick="switchTab('implement')">Exercises</div>
      <div class="tab ${currentTab === 'advanced' ? 'active' : ''}" onclick="switchTab('advanced')">Advanced</div>
    </div>

    <div class="tab-content content ${currentTab === 'learn' ? 'active' : ''}" id="tab-learn">
      ${l.learn}
      <button class="continue-btn" onclick="switchTab('implement')">Continue to Exercises &#8594;</button>
    </div>

    <div class="tab-content content ${currentTab === 'implement' ? 'active' : ''}" id="tab-implement">
      ${l.implement}
      <button class="mark-complete-btn" onclick="markComplete(${currentLesson})" ${done ? 'disabled' : ''}>
        ${done ? '&#10003; Completed' : '&#10003; Mark Complete'}
      </button>
    </div>

    <div class="tab-content content ${currentTab === 'advanced' ? 'active' : ''}" id="tab-advanced">
      ${l.advanced}
    </div>
  `;

    transformExerciseLists();
    restoreExerciseChecks(currentLesson, currentTab);
    renderMapCallout('agents', currentLesson);

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function agentsRenderNav() {
    const s = window.LessonRuntime.getState();
    if (!s) return;
    const LESSONS = s.lessons;
    const currentLesson = s.currentLesson;
    const completed = s.completed;
    const coreCount = s.coreCount;

    const nav = document.getElementById('lesson-nav');
    if (!nav) return;
    nav.innerHTML = LESSONS.map((l, i) => {
      const done = completed.includes(i);
      const active = i === currentLesson;
      let cls = 'nav-item';
      if (active) cls += ' active';
      if (done) cls += ' completed';
      const numLabel = l.bonus ? 'Bonus' : 'L' + (i + 1);
      return `
      <div class="${cls}" onclick="goToLesson(${i})">
        <div class="nav-icon">${done ? '&#10003;' : i + 1}</div>
        <span class="nav-label"><strong style="color:#7b5ea7;margin-right:6px;font-weight:700;">${numLabel}</strong>${l.title}</span>
        ${l.bonus ? '<span class="nav-badge">Bonus</span>' : ''}
        <span class="nav-pts">${l.points} pts</span>
      </div>`;
    }).join('');

    const core = getCoreCompleted(LESSONS, completed, coreCount);
    const pct = Math.min(100, Math.round((core / coreCount) * 100));
    const corePts = completed.filter(i => LESSONS[i] && !LESSONS[i].bonus).reduce((s2, i) => s2 + LESSONS[i].points, 0);
    const bonusPts = getCompletedPoints(LESSONS, completed) - corePts;
    const ptEl = document.getElementById('progress-text');
    const ptsEl = document.getElementById('points-text');
    const fillEl = document.getElementById('progress-fill');
    if (ptEl) ptEl.textContent = `${core} / ${coreCount} core lessons`;
    if (ptsEl) ptsEl.textContent = bonusPts > 0
      ? `${corePts} / ${CORE_POINTS} pts · +${bonusPts} bonus`
      : `${corePts} / ${CORE_POINTS} pts`;
    if (fillEl) fillEl.style.width = pct + '%';
  }

  window.addEventListener('lessonruntime:change', (e) => {
    const d = e.detail;
    if (typeof updateProgress === 'function') updateProgress(d.completed, d.lessons);
    if (typeof renderMapCallout === 'function') renderMapCallout(d.courseId, d.currentLesson);
    if (d.currentTab === 'implement') {
      if (typeof transformExerciseLists === 'function') transformExerciseLists();
      if (typeof restoreExerciseChecks === 'function') restoreExerciseChecks(d.currentLesson, d.currentTab);
    }
  });
  window.LessonRuntime.initCourse({
    courseId: 'building-agents',
    progressCategory: 'agents',
    lessons: window.LESSONS,
    coreCount: CORE_COUNT,
    renderLesson: agentsRenderLesson,
    renderNav: agentsRenderNav,
  });

  // Hydrate the client logo (ODA, etc.) into the sidebar header if the user
  // is signed in to a client workshop that has a logo uploaded.
  (async () => {
    try {
      const r = await fetch('/api/workshop-config', { credentials: 'include' });
      if (!r.ok) return;
      const cfg = await r.json();
      const slot = document.getElementById('client-logo-slot');
      if (slot && cfg && cfg.logoUrl) {
        slot.innerHTML = '<img src="' + cfg.logoUrl + '" alt="' + (cfg.clientName || '') + '">';
        slot.style.display = 'block';
      }
    } catch (_) {}
  })();
</script>
</body>
