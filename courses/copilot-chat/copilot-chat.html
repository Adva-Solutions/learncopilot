<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot Chat — Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --accent: #0078d4;
  --accent-light: #e8f4fd;
  --accent-hover: #106ebe;
  --bg: #faf9f6;
  --sidebar-bg: #fff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #ddd8ce;
  --code-bg: #1e1e1e;
  --note-bg: #f0f4ff;
  --note-border: #4a7ae8;
  --tip-bg: var(--accent-light);
  --tip-border: var(--accent);
  --radius: 10px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  opacity:0;
  animation: fadeIn 500ms ease forwards;
}
@keyframes fadeIn { to { opacity:1; } }

/* ── Sidebar ── */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
}
.sidebar-header {
  padding: 28px 24px 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 700;
}
.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
  padding-left: 44px;
}

/* Progress */
.progress-bar-container {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.progress-bar {
  height: 6px;
  background: #e5e7eb;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Nav */
.nav-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 16px 24px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #f5f4f1; }
.nav-item.active {
  background: var(--accent-light);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item .check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  color: transparent;
  transition: all 0.2s ease;
}
.nav-item .check.done {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.nav-item .pts {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  background: #f0eeeb;
  padding: 2px 8px;
  border-radius: 10px;
}

/* ── Main ── */
.main {
  flex: 1;
  padding: 48px 56px 80px;
  max-width: 860px;
  overflow-y: auto;
}
.step-header {
  margin-bottom: 28px;
}
.step-header h2 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
}
.step-header .pts-badge {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
}
.tab-btn {
  padding: 10px 22px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s ease;
  font-family: var(--font-body);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* Content */
.tab-content { animation: fadeIn 300ms ease; }
.tab-content h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  margin: 28px 0 12px;
}
.tab-content h3:first-child { margin-top: 0; }
.tab-content p { line-height: 1.7; margin-bottom: 14px; font-size: 15px; }
.tab-content ul, .tab-content ol {
  margin: 0 0 16px 20px;
  line-height: 1.7;
  font-size: 15px;
}
.tab-content li { margin-bottom: 6px; }
.tab-content strong { font-weight: 600; }

/* Tip / Note boxes */
.tip-box {
  background: var(--tip-bg);
  border-left: 4px solid var(--tip-border);
  padding: 16px 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.6;
}
.tip-box strong { color: var(--accent); }
.note-box {
  background: var(--note-bg);
  border-left: 4px solid var(--note-border);
  padding: 16px 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.6;
}
.note-box strong { color: var(--note-border); }

/* Exercise checkbox list */
.exercise-check {
  list-style: none;
  padding: 0;
  margin: 12px 0 18px;
}
.exercise-check > li {
  margin: 8px 0;
  padding: 10px 14px;
  background: #fafafa;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: background 0.15s ease;
}
.exercise-check > li:hover { background: #f5f4f1; }
.exercise-check label {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.55;
}
.exercise-check input[type="checkbox"] {
  margin-top: 3px;
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  flex-shrink: 0;
  cursor: pointer;
}
.exercise-check input[type="checkbox"]:checked + * ,
.exercise-check label:has(input:checked) {
  color: var(--text-muted);
}
.exercise-check label:has(input:checked) strong { color: var(--text-muted); }

/* Code */
.code-block {
  position: relative;
  background: var(--code-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin: 14px 0 18px;
  overflow-x: auto;
}
.code-block code {
  color: #d4d4d4;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.copy-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: #aaa;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s ease;
}
.copy-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Visual Equation */
.equation {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 20px 0;
}
.eq-block {
  background: var(--code-bg);
  color: #d4d4d4;
  padding: 14px 20px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 15px;
  text-align: center;
  min-width: 100px;
}
.eq-op { font-size: 22px; font-weight: 700; color: var(--text-muted); }

/* Options switcher */
.option-tabs {
  display: flex;
  gap: 8px;
  margin: 18px 0;
  flex-wrap: wrap;
}
.option-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  transition: all 0.15s ease;
}
.option-btn:hover { border-color: var(--accent); color: var(--accent); }
.option-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.option-content { animation: fadeIn 250ms ease; }

/* Checklist */
.checklist { list-style: none; margin: 16px 0; padding: 0; }
.checklist li {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.checklist li::before {
  content: '';
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Buttons */
.mark-complete-btn {
  display: inline-block;
  margin-top: 24px;
  padding: 12px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s ease;
}
.mark-complete-btn:hover { background: var(--accent-hover); }
.mark-complete-btn.completed {
  background: #16a34a;
  cursor: default;
}
.continue-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s ease;
}
.continue-btn:hover { background: var(--accent-hover); }

/* Personalization & Quiz */
.personalization-note { display: none; }
.quiz-question { background: #f0ede6; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.quiz-question h4 { margin-bottom: 12px; }
.quiz-question label { display: block; padding: 6px 0; cursor: pointer; }
.quiz-question input[type="radio"] { margin-right: 8px; }

/* Sidebar footer (nav links) */
.sidebar-footer {
  margin-top: auto;
  padding: 14px 20px 16px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px;
}
.sidebar-footer a {
  color: var(--accent); text-decoration: none; font-weight: 600;
}
.sidebar-footer a:hover { text-decoration: underline; }
.sidebar-footer .logout-link {
  color: var(--text-muted, #888); font-weight: 500; cursor: pointer;
}
.sidebar-footer .logout-link:hover { color: var(--text, #1a1a2e); }

/* Responsive */
@media (max-width: 900px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 28px 20px 60px; }
}
</style>
</head>

<aside class="sidebar">
  <div class="sidebar-header">

  learn: `
<h3>The 10% Problem</h3>
<p>Most people use AI the same way: open a chat, type a question, read the answer. That is 10% of what Copilot can do. This course teaches the other 90%.</p>

<div class="tip-box">
  <div class="tip-title">New to AI?</div>
  <p>If you have never used an AI tool beyond a quick Google-style search, you are in the right place. This course starts from zero. Every step tells you exactly where to click and what to type. By the end of today, you will have used AI for real work — not just experiments.</p>
</div>

<div class="note-box">
  <strong>No install required:</strong> Copilot is already part of your Microsoft 365 subscription. Open m365.cloud.microsoft in your browser — no IT tickets, no downloads, no waiting. If you can access Outlook and Teams, you can access Copilot.
</div>

<p>Let us walk through every part of the interface so you know where everything lives.</p>

<h4>Top Bar</h4>
<ul>
  <li><strong>Work / Web toggle (top center):</strong> One of several scope controls. <strong>Work</strong> grounds responses in your organization's data — emails, files, Teams chats, SharePoint. <strong>Web</strong> searches the public internet. Useful to know, but not something you will touch constantly. We will return to this in Lesson 4 when we talk about search scope.</li>
  <li><strong>Auto (model selector, top right):</strong> Click this dropdown to choose how Copilot thinks:
    <ul>
      <li><strong>Auto</strong> — Copilot decides how long to think. Best default for most tasks.</li>
      <li><strong>Quick Response</strong> — Answers right away. Use for simple questions, lookups, and reformatting.</li>
      <li><strong>Think Deeper</strong> — Takes more time for better answers. Use for complex analysis, strategy, multi-step reasoning, or when you need Copilot to really think through a problem.</li>
      <li><strong>Sonnet (Claude)</strong> — Anthropic's Claude model. Try it for writing, editing, and nuanced communication.</li>
      <li><strong>GPT (OpenAI)</strong> — OpenAI's GPT model. The default behind Auto for most tasks.</li>
    </ul>
  </li>
  <li><strong>Edit icon (top right):</strong> Opens an inline canvas where you can also start a <strong>temporary chat</strong> — a disposable conversation that does not save to history or feed memory. Handy for quick one-offs and sensitive drafts. There is no pencil glyph on this button in the current UI.</li>
  <li><strong>Three-dot menu (far right):</strong> Opens a dropdown with: <strong>Recent pages</strong>, <strong>Scheduled prompts</strong> (set up recurring AI tasks), <strong>Send feedback</strong>, <strong>Settings</strong> (Custom Instructions, Memory, Sources, preferences — we go deep in Lesson 1), <strong>Quick Help</strong>, and a <strong>Web search</strong> toggle that controls whether Copilot includes web results.</li>
</ul>

<h4>Left Sidebar</h4>
<ul>
  <li><strong>New chat:</strong> Start a fresh conversation. Each chat has its own context — Copilot does not carry over information between chats unless you set up Custom Instructions or Memory.</li>
  <li><strong>Search:</strong> Searches <strong>your files</strong> — documents, emails, meeting content across Microsoft 365. This is not the place to search past conversations. We go deep on this in Lesson 4.</li>
  <li><strong>Library:</strong> Where your <strong>artifacts</strong> are stored — pages, generated images, created documents, and other outputs Copilot produces. It becomes your asset collection over time. We cover it throughout L3 and L5.</li>
  <li><strong>Create:</strong> Opens the creation workspace for images, PowerPoint, Word, Excel, video, infographics, and more. We cover this in Lesson 5.</li>
  <li><strong>Agents:</strong> Built-in agents like <strong>Researcher</strong> (deep web research with citations) and <strong>Analyst</strong> (data analysis). You can also create custom agents. We cover agents in the Building Agents module.</li>
  <li><strong>Notebooks:</strong> Persistent, project-scoped workspaces that combine references, notebook instructions, and chat side by side. We cover this in Lesson 2.</li>
  <li><strong>Chats:</strong> Your conversation history. Click any chat to pick up where you left off.</li>
  <li><strong>Apps:</strong> Links to Copilot inside Outlook, Word, Excel, PowerPoint, Teams. Covered in the Copilot in Apps module.</li>
  <li><strong>Your profile (bottom left):</strong> Shows your name and license tier (e.g., "M365 Copilot Premium"). Click for account settings.</li>
</ul>

<h4>Chat Area</h4>
<ul>
  <li><strong>Message box (center):</strong> Where you type prompts. "Message Copilot" placeholder text.</li>
  <li><strong>+ button (left of message box):</strong> Attach files, images, or paste content for Copilot to analyze. Supports Word, Excel, PowerPoint, PDF, images, and more.</li>
  <li><strong>Microphone icon:</strong> Click to dictate instead of typing. We cover voice input in the bonus lesson.</li>
  <li><strong>Voice mode icon (sound waves):</strong> Opens a full voice conversation mode where you can talk with Copilot like a phone call.</li>
  <li><strong>Quick action pills:</strong> Below the message box — <strong>Summarize</strong>, <strong>Rewrite</strong>, <strong>Create</strong>, <strong>Learn</strong>, and <strong>…</strong>. Each pill is actually a <strong>dropdown</strong> — click it and you get a menu of suggested prompts for that action, so you can pick a starting point instead of typing from scratch.</li>
  <li><strong>Three-dots (…) pill:</strong> Opens the full <strong>Copilot prompt gallery</strong> — both Microsoft's <strong>suggested prompts</strong> and your own <strong>saved prompts</strong>, organized by category.</li>
  <li><strong>Suggestion cards:</strong> Below the pills, Copilot shows contextual suggestions based on your recent activity — documents you opened, close collaborators, emails that need attention.</li>
</ul>

<div class="note-box">
  <strong>Chat Settings worth a quick peek:</strong> The Settings panel (three-dot menu → Settings) now has a <strong>Sources</strong> tab in addition to General, Data controls, Personalization, Notifications, and Agents. We go deep on all of these in Lesson 1 — and since this surface keeps evolving, it is worth revisiting every few weeks.
</div>

<p>Think of this like the first time you got a new phone. You spend 10 minutes poking around — wallpaper, notifications, accounts — and then it works the way you want. Same here.</p>

  </li>
  <li><label><input type="checkbox"> Read the response — it should be more thorough and structured than a Quick Response would be.</label></li>

</ul>

<div class="note-box">

  advanced: `
<h3>Model Selection Deep Dive</h3>
<p>Copilot now gives you direct control over which model runs. <strong>Auto</strong> is the smart default — it picks the right model and thinking time per task. But when you need specific behavior:</p>
<ul>
  <li><strong>Quick Response:</strong> Fastest. Use for simple rewrites, lookups, and formatting. Does not think deeply.</li>
  <li><strong>Think Deeper:</strong> Slower but significantly better for complex reasoning, analysis, strategy, and multi-step problems. Use when the answer matters and you have 30 seconds to wait.</li>
  <li><strong>Sonnet (Claude):</strong> Anthropic's model. Often produces more natural, nuanced writing. Try it for emails, memos, and communications where tone matters.</li>
  <li><strong>GPT (OpenAI):</strong> The default behind Auto. Strong all-rounder. Expandable — click the arrow to see specific GPT versions.</li>

<h3>Privacy Controls</h3>

<h3>Mobile App Setup</h3>

<h3>From Scratchpad to Shared Artifact</h3>
<p>You just built a Notebook grounded in your project documents. Now turn the conversations inside it into shareable artifacts.</p>

<h3>What Are Copilot Pages?</h3>
<p>Every time Copilot gives you a great response, it lives in that chat — and only that chat. Pages change that. A Page is a <strong>shareable, editable document</strong> you can create from any Copilot response and collaborate on live.</p>

<h3>Where Pages Come From</h3>
<p>Pages can be created from three places — but the one we will use in this course is <strong>inside the notebook you just built</strong>, so the Page stays grounded in the same references. The other entry points exist and are useful to know about:</p>

<h3>Find Anything in Your Organization</h3>
<p><em>You built a notebook and shared a Page. Now find anything across your entire organization — files, emails, meetings, people.</em></p>

<h4>1. The <span style="font-family:monospace;">/</span> (Slash) Reference in Chat — Exact Match Only</h4>
<p>Typing <strong>/</strong> in the message box opens a picker for <strong>pulling a specific file, person, or email into your prompt as context</strong>. It is <strong>not</strong> natural language. You need to type the actual filename, the person's name, or the exact subject line — just like @-mentioning someone in Outlook.</p>

  <li><span class="inline-code">/Shore Club Spec v3.docx</span> — pulls that exact file into your prompt as a reference.</li>
  <li><span class="inline-code">/Sarah Chen</span> — pulls that person's profile into context.</li>
  <li><span class="inline-code">/Re: Permit submission timeline</span> — pulls that email thread.</li>
</ul>
<p>If you do not know the exact name, the slash picker will not help you. Use the Search tab or a natural-language Work-mode prompt instead.</p>

<h4>2. The Search tab in the sidebar — for files, not conversations</h4>
<p>Click <strong>Search</strong> in the left sidebar. This searches <strong>your Microsoft 365 content</strong> — documents, emails, meeting content — across OneDrive, SharePoint, Outlook, and Teams. It is not a search over your past Copilot conversations; it is a search over your work.</p>

<h4>3. Natural-language search from the chat</h4>
<p>Within a regular chat (Work mode on), you can just ask. Copilot Search understands what you <strong>mean</strong>:</p>

<h3>Pick the Right Artifact for the Job</h3>
<p>Create is deceptively broad — people default to images because they are fun, but the other artifact types are where the real time savings are. Quick mental model:</p>
<table style="width:100%;border-collapse:collapse;margin:14px 0;font-size:14px;">
  <thead><tr style="border-bottom:2px solid var(--border);">
    <th style="text-align:left;padding:8px 12px;">Artifact</th>
    <th style="text-align:left;padding:8px 12px;">Best for</th>
    <th style="text-align:left;padding:8px 12px;">Avoid when</th>
  </tr></thead>

    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">PowerPoint</td><td style="padding:8px 12px;">Client pitches, internal reviews, any linear narrative</td><td style="padding:8px 12px;">You just want a quick summary (use a Page)</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">Word</td><td style="padding:8px 12px;">Formal docs, contracts, onboarding packets, anything signable/printable</td><td style="padding:8px 12px;">The team lives in Pages and will actively edit</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">Excel</td><td style="padding:8px 12px;">Models, trackers, anything with formulas or pivots</td><td style="padding:8px 12px;">You want a static read — a table inside a Page is lighter</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">Image</td><td style="padding:8px 12px;">Social posts, deck covers, concept visuals, material studies</td><td style="padding:8px 12px;">The content is data — infographic is better</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">Infographic</td><td style="padding:8px 12px;">Board summaries, executive dashboards, single-page synthesis</td><td style="padding:8px 12px;">The audience needs to drill in — give them Excel</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;font-weight:600;">Video (Frontier)</td><td style="padding:8px 12px;">Training snippets, announcements, deck-to-video</td><td style="padding:8px 12px;">Still in Frontier — may fail; always have a backup</td></tr>
    <tr><td style="padding:8px 12px;font-weight:600;">Poster / Banner / Form</td><td style="padding:8px 12px;">Events, intake flows, single-purpose assets</td><td style="padding:8px 12px;">Production marketing — use the full tool for final polish</td></tr>
  </tbody>
</table>

<h3>Chaining Artifacts Together</h3>
<p>The real unlock is chaining output formats against one source:</p>
<ul>
  <li><strong>Page &rarr; PowerPoint:</strong> from a Page, ask Create to generate a deck that uses the Page as source. The deck inherits the structure.</li>
  <li><strong>Excel &rarr; Infographic:</strong> build the model, then ask Create for an infographic summarizing the key numbers — board-ready in minutes.</li>
  <li><strong>Image &rarr; deck / Page:</strong> any image you edit via the Image Editing toolkit can be dropped straight into a PowerPoint slide or pinned into a Page.</li>
  <li><strong>Word &rarr; Page:</strong> paste a Word doc's content into a Page to kick off collaborative editing, then export back to Word when it is final.</li>
</ul>

<h3>Image Editing — Power Moves</h3>
<p>The Image Editing toolkit covered in Learn is more capable than it looks. A few combinations that earn their keep:</p>
<ul>
  <li><strong>Cutout + Background color</strong> — isolate a subject and drop a flat brand-color backdrop. Instant marketing asset.</li>
  <li><strong>Upscale + Crop &amp; rotate</strong> — generate once at default resolution, then upscale + crop for print.</li>
  <li><strong>Color pop + Erase</strong> — desaturate the scene, erase clutter, and you have a clean hero image with a single color focal point.</li>
  <li><strong>Create sticker</strong> — generate a transparent-background element (a logo treatment, an icon) for use in Pages or decks.</li>
</ul>

<h3>Brand Kits</h3>
<p>If your admin configured a <strong>Brand Kit</strong> (<em>More… &rarr; Brand kits</em>), Copilot applies your org's palette, fonts, and logo across Create outputs automatically. It is worth asking IT about — it is the single biggest lever for making Create outputs look "on brand" without manual rework.</p>

<h3>Templates and Reuse</h3>
<p><strong>More… &rarr; Start from a template</strong> / <strong>Brand templates</strong> / <strong>All templates</strong> pulls from org-approved starting points. If your team has a shared deck template or Word template, this is where it surfaces. Reuse beats re-create.</p>

<h3>The Library Discipline</h3>
<p>Everything from Create lands in the <strong>Library</strong>. Over a few weeks this becomes your personal studio — saved prompts, generated images, created decks. A small habit that pays off: rename artifacts with a <strong>[Project] — [Type] — [Date]</strong> prefix so the Library stays scannable. The Library is also where you re-share artifacts with different access scopes without opening them.</p>
`

<p>Voice input is not just convenience — it is accessibility. Users with mobility limitations, repetitive strain injuries, or visual impairments can interact with Copilot entirely through voice. The combination of voice input + AI processing + voice output creates a fully accessible AI workflow.</p>

<h3>Continuous Learning Resources</h3>
<ul>
  <li>Microsoft Copilot Lab (copilot.cloud.microsoft/prompts) — a library of prompt templates</li>
  <li>Microsoft Learn (learn.microsoft.com) — official training modules for Copilot</li>
  <li>Your organization's IT team — for questions about permissions, licensing, and data access</li>
</ul>
`
}
];

/* ═══════════════════════════════════════════════════════════
   ENGINE
   ═══════════════════════════════════════════════════════════ */
const CORE_COUNT = 6;
const CORE_POINTS = 90;
let completed = JSON.parse(localStorage.getItem('chat-completed-v2') || '[]');
let currentLesson = 0;
let currentTab = 'learn';

function getCompletedPoints() {
  return completed.reduce((sum, i) => sum + (LESSONS[i]?.points || 0), 0);
}

function updateProgress() {
  const coreCompleted = completed.filter(i => i < CORE_COUNT).length;
  const corePoints = completed.filter(i => i < CORE_COUNT).reduce((s, i) => s + (LESSONS[i]?.points || 0), 0);
  const bonusPoints = getCompletedPoints() - corePoints;
  document.getElementById('progress-label').textContent = coreCompleted + ' of ' + CORE_COUNT + ' core steps';
  document.getElementById('progress-pts').textContent = bonusPoints > 0
    ? corePoints + ' / ' + CORE_POINTS + ' pts · +' + bonusPoints + ' bonus'
    : corePoints + ' / ' + CORE_POINTS + ' pts';
  document.getElementById('progress-fill').style.width = (coreCompleted / CORE_COUNT * 100) + '%';
  syncProgress();
}

let _chatSyncTimer = null;
function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  clearTimeout(_chatSyncTimer);
  _chatSyncTimer = setTimeout(function() {
    const body = { chat: { completed: completed, points: getCompletedPoints() } };
    fetch('/api/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).catch(function(err) { console.warn('Progress sync failed:', err); });
  }, 250);
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  let html = '';
  LESSONS.forEach(function(lesson, i) {
    if (i === CORE_COUNT) {
      html += '<div class="nav-section-label" style="margin-top:8px">Bonus</div>';
    }
    const isDone = completed.includes(i);
    const isActive = i === currentLesson;
    html += '<div class="nav-item' + (isActive ? ' active' : '') + '" onclick="loadLesson(' + i + ')">';
    html += '<div class="check' + (isDone ? ' done' : '') + '">' + (isDone ? '&#10003;' : '') + '</div>';
    html += '<span>' + lesson.title + '</span>';
    if (lesson.points > 0) {
      html += '<span class="pts">' + lesson.points + ' pts</span>';
    }
    html += '</div>';
  });
  nav.innerHTML = html;
}

function loadLesson(idx) {
  currentLesson = idx;
  currentTab = 'learn';
  buildNav();
  renderLesson();
  document.getElementById('main-content').scrollTo(0, 0);
}

function renderLesson() {
  var lesson = LESSONS[currentLesson];
  var isDone = completed.includes(currentLesson);
  var html = '';

  // Step header
  html += '<div class="step-header">';
  html += '<h2>' + lesson.title + '</h2>';
  if (lesson.points > 0) {
    html += '<span class="pts-badge">' + lesson.points + ' points</span>';
  }
  html += '</div>';

  // Tabs
  html += '<div class="tabs">';
  html += '<button class="tab-btn' + (currentTab === 'learn' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'learn\')">Learn</button>';
  html += '<button class="tab-btn' + (currentTab === 'implement' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'implement\')">Exercises</button>';
  html += '<button class="tab-btn' + (currentTab === 'advanced' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'advanced\')">Advanced</button>';
  html += '</div>';

  // Content
  html += '<div class="tab-content">';
  html += lesson[currentTab] || '<p>No content available for this tab.</p>';
  html += '</div>';

  document.getElementById('lesson-content').innerHTML = html;

  // Auto-activate first option-content if present
  var firstOpt = document.querySelector('.option-content');
  if (firstOpt && !document.querySelector('.option-content.active')) {
    firstOpt.classList.add('active');
  }

  // Update complete button state
  if (currentTab === 'implement') {
    var btn = document.getElementById('complete-btn-' + currentLesson);
    if (btn && isDone) {
      btn.textContent = 'Completed \u2713';
      btn.classList.add('completed');
      btn.disabled = true;
    }
  }
}

function switchTab(lessonIdx, tab) {
  currentLesson = lessonIdx;
  currentTab = tab;
  renderLesson();
}

function switchOption(lessonIdx, option, btn) {
  // Deactivate sibling buttons
  var container = document.getElementById('options-' + lessonIdx);
  if (container) {
    var buttons = container.querySelectorAll('.option-btn');
    buttons.forEach(function(b) { b.classList.remove('active'); });
  }
  if (btn) btn.classList.add('active');

  // Hide all option contents for this lesson, show selected
  var allOptions = document.querySelectorAll('[id^="option-' + lessonIdx + '-"]');
  allOptions.forEach(function(el) { el.style.display = 'none'; });
  var target = document.getElementById('option-' + lessonIdx + '-' + option);
  if (target) target.style.display = 'block';
}

function markComplete(idx) {
  if (completed.includes(idx)) return;
  completed.push(idx);
  localStorage.setItem('chat-completed-v2', JSON.stringify(completed));

  var btn = document.getElementById('complete-btn-' + idx);
  if (btn) {
    btn.textContent = 'Completed \u2713';
    btn.classList.add('completed');
    btn.disabled = true;
  }

  buildNav();
  updateProgress();

  // Auto-advance after 600ms
  setTimeout(function() {
    if (idx + 1 < LESSONS.length) {
      loadLesson(idx + 1);
    }
  }, 600);
}

function copyCode(btn) {
  var block = btn.parentElement.querySelector('code');
  if (!block) return;
  navigator.clipboard.writeText(block.textContent).then(function() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  }).catch(function() {
    btn.textContent = 'Failed';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  });
}

function logout() {
  fetch('/api/logout').then(function() {
    localStorage.removeItem('workshop_user');
    window.location.href = '/login.html';
  });
}

// Initialize
buildNav();
loadLesson(0);
updateProgress();
</script>
</body>
</html>
