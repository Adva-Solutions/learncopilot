<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot Chat — Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --accent: #0078d4;
  --accent-light: #e8f4fd;
  --accent-hover: #106ebe;
  --bg: #faf9f6;
  --sidebar-bg: #fff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #ddd8ce;
  --code-bg: #1e1e1e;
  --note-bg: #f0f4ff;
  --note-border: #4a7ae8;
  --tip-bg: var(--accent-light);
  --tip-border: var(--accent);
  --radius: 10px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  opacity:0;
  animation: fadeIn 500ms ease forwards;
}
@keyframes fadeIn { to { opacity:1; } }

/* ── Sidebar ── */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
}
.sidebar-header {
  padding: 28px 24px 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 700;
}
.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
  padding-left: 44px;
}

/* Progress */
.progress-bar-container {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.progress-bar {
  height: 6px;
  background: #e5e7eb;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Nav */
.nav-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 16px 24px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #f5f4f1; }
.nav-item.active {
  background: var(--accent-light);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item .check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  color: transparent;
  transition: all 0.2s ease;
}
.nav-item .check.done {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.nav-item .pts {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  background: #f0eeeb;
  padding: 2px 8px;
  border-radius: 10px;
}

/* ── Main ── */
.main {
  flex: 1;
  padding: 48px 56px 80px;
  max-width: 860px;
  overflow-y: auto;
}
.step-header {
  margin-bottom: 28px;
}
.step-header h2 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
}
.step-header .pts-badge {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
}
.tab-btn {
  padding: 10px 22px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s ease;
  font-family: var(--font-body);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* Content */
.tab-content { animation: fadeIn 300ms ease; }
.tab-content h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  margin: 28px 0 12px;
}
.tab-content h3:first-child { margin-top: 0; }
.tab-content p { line-height: 1.7; margin-bottom: 14px; font-size: 15px; }
.tab-content ul, .tab-content ol {
  margin: 0 0 16px 20px;
  line-height: 1.7;
  font-size: 15px;
}
.tab-content li { margin-bottom: 6px; }
.tab-content strong { font-weight: 600; }

/* Tip / Note boxes */
.tip-box {
  background: var(--tip-bg);
  border-left: 4px solid var(--tip-border);
  padding: 16px 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.6;
}
.tip-box strong { color: var(--accent); }
.note-box {
  background: var(--note-bg);
  border-left: 4px solid var(--note-border);
  padding: 16px 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.6;
}
.note-box strong { color: var(--note-border); }

/* Code */
.code-block {
  position: relative;
  background: var(--code-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin: 14px 0 18px;
  overflow-x: auto;
}
.code-block code {
  color: #d4d4d4;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.copy-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: #aaa;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s ease;
}
.copy-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Visual Equation */
.equation {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 20px 0;
}
.eq-block {
  background: var(--code-bg);
  color: #d4d4d4;
  padding: 14px 20px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 15px;
  text-align: center;
  min-width: 100px;
}
.eq-op { font-size: 22px; font-weight: 700; color: var(--text-muted); }

/* Options switcher */
.option-tabs {
  display: flex;
  gap: 8px;
  margin: 18px 0;
  flex-wrap: wrap;
}
.option-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  transition: all 0.15s ease;
}
.option-btn:hover { border-color: var(--accent); color: var(--accent); }
.option-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);

.option-content { animation: fadeIn 250ms ease; }

/* Checklist */
.checklist { list-style: none; margin: 16px 0; padding: 0; }
.checklist li {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.checklist li::before {
  content: '';
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;

/* Buttons */
.mark-complete-btn {
  display: inline-block;
  margin-top: 24px;
  padding: 12px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s ease;
}
.mark-complete-btn:hover { background: var(--accent-hover); }
.mark-complete-btn.completed {
  background: #16a34a;
  cursor: default;
}
.continue-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s ease;

.continue-btn:hover { background: var(--accent-hover); }

/* Responsive */
@media (max-width: 900px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 28px 20px 60px; }
}

  learn: `
<h3>60 Seconds Under the Hood</h3>
<p>You are about to use Microsoft Copilot. Before you dive in, here is what is actually happening when you type a prompt — in 60 seconds flat.</p>

<div class="equation">
  <div class="eq-block">LLM<br><span style="font-size:11px;font-weight:400;color:#888">Frozen model</span></div>
  <div class="eq-op">+</div>
  <div class="eq-block">Context<br><span style="font-size:11px;font-weight:400;color:#888">Your input</span></div>
  <div class="eq-op">+</div>
  <div class="eq-block">Tools<br><span style="font-size:11px;font-weight:400;color:#888">Capabilities</span></div>
  <div class="eq-op">=</div>
  <div class="eq-block" style="background:var(--accent)">Agentic AI<br><span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.7)">Useful output</span></div>
</div>

<p><strong>The model</strong> is a pattern-matching engine trained on enormous amounts of text. It is frozen — it does not learn new things on its own. Think of it as a very well-read assistant who missed the last few months of news.</p>

<p><strong>Context</strong> is everything you give it: your prompt, attached files, conversation history, and your organization's data. This is the ingredient you control. Better context = better answers. That is the whole game.</p>

<p><strong>Tools</strong> let it take action: search your SharePoint, draft an email, build a slide deck, pull your calendar. Without tools, it can only talk. With tools, it can <em>do</em>.</p>

<div class="tip-box">
  <strong>What this means for you:</strong> You cannot change the model. But you control context and tools. The better you brief Copilot, the better it performs. That single skill — giving great context — is what this entire course teaches.
</div>

<button class="continue-btn" onclick="switchTab(0,'implement')">Continue to Exercises &rarr;</button>

  advanced: `
<h3>Under the Hood</h3>

<h3>Tokens</h3>
<p>LLMs don't read words — they read <strong>tokens</strong>, which are word fragments. The word "understanding" might be split into "under" + "standing." Copilot has a context window limit measured in tokens (currently up to 128K tokens for GPT-4o). This is why very long documents may get truncated.</p>

<h3>Temperature</h3>
<p><strong>Temperature</strong> controls how "creative" versus "deterministic" the model's output is. A temperature of 0 produces nearly identical responses each time. Higher temperatures introduce more randomness. When Copilot writes a poem, it uses higher temperature; when it summarizes a document, it uses lower temperature.</p>

<h3>System Prompts</h3>
<p>Every Copilot interaction begins with a hidden <strong>system prompt</strong> that defines the assistant's behavior, safety guidelines, and capabilities. When you set Custom Instructions (covered in Lesson 3), you are effectively adding to this system prompt. You never see it directly, but it shapes every response.</p>

<h3>Training Data vs. Live Context</h3>
<p>The model's training data is historical — it was frozen at a point in time. But Copilot can access <strong>live context</strong> through web search and your organizational data via Microsoft Graph. This is why Copilot can answer questions about current events (via web search) or your specific project files (via Work mode) even though the model's training data may not include that information.</p>
`
},

// ── 1: The Art of Prompting ──
{
  id: 'art-of-prompting',
  title: 'The Art of Prompting',
  points: 15,
  learn: `
<h3>Bad Prompt vs. Good Prompt</h3>
<p>Here is what most people type on day one:</p>
<div class="code-block"><code>Help me with the budget.</code></div>
<p>Here is what gets a actually useful result:</p>
<div class="code-block"><code>You are a finance director at a mid-size nonprofit. Summarize this Q3 data for our board: revenue $2.1M (+12% YoY), program costs $1.4M, fundraising $320K, admin $280K, surplus $100K. 3 paragraphs, under 250 words, professional tone. Highlight the 6.5:1 fundraising ROI.</code></div>
<p>The second prompt works because it gives Copilot a <strong>role</strong>, <strong>real data</strong>, a <strong>specific format</strong>, and <strong>constraints</strong>. The first one forces Copilot to guess everything.</p>

<h3>The Brilliant Intern</h3>
<p>Think of Copilot as a brilliant intern on their first day. Fast, well-read, eager — but knows nothing about your situation. A vague ask gets a vague answer. A specific brief gets excellent work. Your job is to be a good manager: tell it who it is, what it is working with, and exactly what you need back.</p>

<h3>The Formula</h3>
<p><strong>Role + Context + Task + Format + Constraints = Great Output</strong></p>
<ul>
  <li><strong>Role:</strong> "You are a grants coordinator at a mid-size nonprofit..."</li>
  <li><strong>Context:</strong> Background, data, audience, attached files</li>
  <li><strong>Task:</strong> One clear thing to produce</li>
  <li><strong>Format:</strong> Bullet points, table, 3 paragraphs, email with subject line</li>
  <li><strong>Constraints:</strong> Word count, tone, audience, what to avoid</li>
</ul>

<p>And then <strong>iterate</strong>. Your first prompt is a rough draft. Say "make it shorter," "add data," "warmer tone." The conversation is your editing tool.</p>

<div class="tip-box">
  <strong>One rule:</strong> One task per prompt. Do not cram five requests into one message. Copilot handles focused requests far better than sprawling ones.
</div>

<button class="continue-btn" onclick="switchTab(1,'implement')">Continue to Exercises &rarr;</button>
`,

<h3>Advanced Prompting Techniques</h3>

<h3>Chain-of-Thought Prompting</h3>
<p>Adding "think step by step" or "explain your reasoning before giving the final answer" forces the model to show its work. This produces more accurate results, especially for analysis and math. Example: "Analyze our donor retention rate. Think step by step: first calculate the rate, then identify trends, then suggest improvements."</p>

<h3>Few-Shot Examples</h3>
<p>Provide 2-3 examples of the input/output pattern you want. The model will match the pattern with high fidelity. This is particularly powerful for formatting, categorization, and tone matching.</p>

<h3>Temperature and Creativity</h3>
<p>While you cannot directly set temperature in Copilot's chat interface, you can influence it with your prompt. Asking for "creative brainstorming" or "multiple diverse options" encourages higher-temperature behavior. Asking for "precise, factual analysis" encourages lower-temperature behavior.</p>

<h3>Prompt Chaining</h3>
<p>For complex tasks, break them into a chain of prompts within one conversation. Step 1: "Research the topic and outline key points." Step 2: "Now draft a memo based on that outline." Step 3: "Revise the memo to be more concise and add an executive summary." Each step builds on the last, and Copilot retains the full conversation context.</p>
`

/* ═══════════════════════════════════════════════════════════
   ENGINE
   ═══════════════════════════════════════════════════════════ */
const CORE_COUNT = 11;
const CORE_POINTS = 180;
let completed = JSON.parse(localStorage.getItem('chat-completed') || '[]');
let currentLesson = 0;
let currentTab = 'learn';

function getCompletedPoints() {
  return completed.reduce((sum, i) => sum + (LESSONS[i]?.points || 0), 0);
}

function updateProgress() {
  const coreCompleted = completed.filter(i => i < CORE_COUNT).length;
  const pts = getCompletedPoints();
  document.getElementById('progress-label').textContent = coreCompleted + ' of ' + CORE_COUNT + ' core steps';
  document.getElementById('progress-pts').textContent = pts + ' / ' + CORE_POINTS + ' pts';
  document.getElementById('progress-fill').style.width = (coreCompleted / CORE_COUNT * 100) + '%';
  syncProgress();
}

function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  const chatData = { completed: completed, points: getCompletedPoints() };
  const body = { chat: chatData };
  try {
    const appsCompleted = JSON.parse(localStorage.getItem('apps-completed') || '[]');
    const agentsCompleted = JSON.parse(localStorage.getItem('agents-completed') || '[]');
    body.apps = { completed: appsCompleted, points: 0 };
    body.agents = { completed: agentsCompleted, points: 0 };
  } catch(e) {}
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).catch(function() {});
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  let html = '';
  LESSONS.forEach(function(lesson, i) {
    if (i === CORE_COUNT) {
      html += '<div class="nav-section-label" style="margin-top:8px">Bonus</div>';
    }
    const isDone = completed.includes(i);
    const isActive = i === currentLesson;
    html += '<div class="nav-item' + (isActive ? ' active' : '') + '" onclick="loadLesson(' + i + ')">';
    html += '<div class="check' + (isDone ? ' done' : '') + '">' + (isDone ? '&#10003;' : '') + '</div>';
    html += '<span>' + lesson.title + '</span>';
    if (lesson.points > 0) {
      html += '<span class="pts">' + lesson.points + ' pts</span>';
    }
    html += '</div>';
  });
  nav.innerHTML = html;
}

function loadLesson(idx) {
  currentLesson = idx;
  currentTab = 'learn';
  buildNav();
  renderLesson();
  document.getElementById('main-content').scrollTo(0, 0);
}

function renderLesson() {
  var lesson = LESSONS[currentLesson];
  var isDone = completed.includes(currentLesson);
  var html = '';

  // Step header
  html += '<div class="step-header">';
  html += '<h2>' + lesson.title + '</h2>';
  if (lesson.points > 0) {
    html += '<span class="pts-badge">' + lesson.points + ' points</span>';
  }
  html += '</div>';

  // Tabs
  html += '<div class="tabs">';
  html += '<button class="tab-btn' + (currentTab === 'learn' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'learn\')">Learn</button>';
  html += '<button class="tab-btn' + (currentTab === 'implement' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'implement\')">Exercises</button>';
  html += '<button class="tab-btn' + (currentTab === 'advanced' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'advanced\')">Advanced</button>';
  html += '</div>';

  // Content
  html += '<div class="tab-content">';
  html += lesson[currentTab] || '<p>No content available for this tab.</p>';
  html += '</div>';

  document.getElementById('lesson-content').innerHTML = html;

  // Update complete button state
  if (currentTab === 'implement') {
    var btn = document.getElementById('complete-btn-' + currentLesson);
    if (btn && isDone) {
      btn.textContent = 'Completed \u2713';
      btn.classList.add('completed');
      btn.disabled = true;
    }
  }
}

function switchTab(lessonIdx, tab) {
  currentLesson = lessonIdx;
  currentTab = tab;
  renderLesson();
}

function switchOption(lessonIdx, option, btn) {
  // Deactivate sibling buttons
  var container = document.getElementById('options-' + lessonIdx);
  if (container) {
    var buttons = container.querySelectorAll('.option-btn');
    buttons.forEach(function(b) { b.classList.remove('active'); });
  }
  if (btn) btn.classList.add('active');

  // Hide all option contents for this lesson, show selected
  var allOptions = document.querySelectorAll('[id^="option-' + lessonIdx + '-"]');
  allOptions.forEach(function(el) { el.style.display = 'none'; });
  var target = document.getElementById('option-' + lessonIdx + '-' + option);
  if (target) target.style.display = 'block';
}

function markComplete(idx) {
  if (completed.includes(idx)) return;
  completed.push(idx);
  localStorage.setItem('chat-completed', JSON.stringify(completed));

  var btn = document.getElementById('complete-btn-' + idx);
  if (btn) {
    btn.textContent = 'Completed \u2713';
    btn.classList.add('completed');
    btn.disabled = true;
  }

  buildNav();
  updateProgress();

  // Auto-advance after 600ms
  setTimeout(function() {
    if (idx + 1 < LESSONS.length) {
      loadLesson(idx + 1);
    }
  }, 600);
}

function copyCode(btn) {
  var block = btn.parentElement.querySelector('code');
  if (!block) return;
  navigator.clipboard.writeText(block.textContent).then(function() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  }).catch(function() {
    btn.textContent = 'Failed';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  });
}

// Initialize
buildNav();
loadLesson(0);
updateProgress();
</script>
</body>
</html>
