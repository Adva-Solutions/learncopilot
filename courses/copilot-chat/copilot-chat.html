<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot Chat — Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --accent: #0078d4;
  --accent-light: #e8f4fd;
  --accent-hover: #106ebe;
  --bg: #faf9f6;
  --sidebar-bg: #fff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #ddd8ce;
  --code-bg: #1e1e1e;
  --note-bg: #f0f4ff;
  --note-border: #4a7ae8;
  --tip-bg: var(--accent-light);
  --tip-border: var(--accent);
  --radius: 10px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  opacity:0;
  animation: fadeIn 500ms ease forwards;
}
@keyframes fadeIn { to { opacity:1; } }

/* ── Sidebar ── */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
}
.sidebar-header {
  padding: 28px 24px 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 700;
}
.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
  padding-left: 44px;
}

/* Progress */
.progress-bar-container {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.progress-bar {
  height: 6px;
  background: #e5e7eb;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Nav */
.nav-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 16px 24px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #f5f4f1; }
.nav-item.active {
  background: var(--accent-light);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item .check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  color: transparent;
  transition: all 0.2s ease;
}
.nav-item .check.done {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.nav-item .pts {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  background: #f0eeeb;
  padding: 2px 8px;
  border-radius: 10px;
}

/* ── Main ── */
.main {
  flex: 1;
  padding: 48px 56px 80px;
  max-width: 860px;
  overflow-y: auto;
}
.step-header {
  margin-bottom: 28px;
}
.step-header h2 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
}
.step-header .pts-badge {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
}
.tab-btn {
  padding: 10px 22px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s ease;
  font-family: var(--font-body);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* Content */
.tab-content { animation: fadeIn 300ms ease; }
.tab-content h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  margin: 28px 0 12px;
}
.tab-content h3:first-child { margin-top: 0; }
.tab-content p { line-height: 1.7; margin-bottom: 14px; font-size: 15px; }
.tab-content ul, .tab-content ol {
  margin: 0 0 16px 20px;
  line-height: 1.7;
  font-size: 15px;
}
.tab-content li { margin-bottom: 6px; }
.tab-content strong { font-weight: 600; }

/* Tip / Note boxes */
.tip-box {
  background: var(--tip-bg);
  border-left: 4px solid var(--tip-border);
  padding: 16px 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.6;
}
.tip-box strong { color: var(--accent); }
.note-box {
  background: var(--note-bg);
  border-left: 4px solid var(--note-border);
  padding: 16px 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.6;
}
.note-box strong { color: var(--note-border); }

/* Code */
.code-block {
  position: relative;
  background: var(--code-bg);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin: 14px 0 18px;
  overflow-x: auto;
}
.code-block code {
  color: #d4d4d4;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.copy-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: #aaa;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s ease;
}
.copy-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Visual Equation */
.equation {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 20px 0;
}
.eq-block {
  background: var(--code-bg);
  color: #d4d4d4;
  padding: 14px 20px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 15px;
  text-align: center;
  min-width: 100px;
}
.eq-op { font-size: 22px; font-weight: 700; color: var(--text-muted); }

/* Options switcher */
.option-tabs {
  display: flex;
  gap: 8px;
  margin: 18px 0;
  flex-wrap: wrap;
}
.option-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  transition: all 0.15s ease;
}
.option-btn:hover { border-color: var(--accent); color: var(--accent); }
.option-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.option-content { animation: fadeIn 250ms ease; }

/* Checklist */
.checklist { list-style: none; margin: 16px 0; padding: 0; }
.checklist li {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.checklist li::before {
  content: '';
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Buttons */
.mark-complete-btn {
  display: inline-block;
  margin-top: 24px;
  padding: 12px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s ease;
}
.mark-complete-btn:hover { background: var(--accent-hover); }
.mark-complete-btn.completed {
  background: #16a34a;
  cursor: default;
}
.continue-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s ease;
}
.continue-btn:hover { background: var(--accent-hover); }

/* Personalization & Quiz */
.personalization-note { display: none; }
.quiz-question { background: #f0ede6; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.quiz-question h4 { margin-bottom: 12px; }
.quiz-question label { display: block; padding: 6px 0; cursor: pointer; }
.quiz-question input[type="radio"] { margin-right: 8px; }

/* Responsive */
@media (max-width: 900px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 28px 20px 60px; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1><span class="logo">C</span> Copilot Chat</h1>
    <div class="subtitle">Workshop</div>
  </div>
  <div class="progress-bar-container">
    <div class="progress-info">
      <span id="progress-label">0 of 10 core steps</span>
      <span id="progress-pts">0 / 140 pts</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="nav-section-label">Core Steps</div>
  <div id="nav-list"></div>
</aside>

<div class="main" id="main-content">
  <div id="lesson-content"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   LESSONS — Single source of truth
   ═══════════════════════════════════════════════════════════ */
const LESSONS = [
// ── 0: Know Your Way Around ──
{
  id: 'know-your-way-around',
  title: 'Know Your Way Around',
  points: 5,
  learn: `
<h3>The 10% Problem</h3>
<p>Most people use AI the same way: open a chat, type a question, read the answer. That is 10% of what Copilot can do. This course teaches the other 90%.</p>

<p>Let us start by walking through the Copilot interface at <strong>m365.cloud.microsoft</strong> so you know where everything lives:</p>
<ul>
  <li><strong>Chat area (center):</strong> This is where you type prompts and read responses. The big text box at the bottom.</li>
  <li><strong>Work / Web toggle (top of chat):</strong> Controls whether Copilot searches your organization's data or the public internet. This is critical — you will learn more in Lesson 2.</li>
  <li><strong>Attachment button (paperclip icon):</strong> Attach files, images, or paste content for Copilot to analyze.</li>
  <li><strong>Conversation history (left sidebar):</strong> Your recent chats. Click any to pick up where you left off.</li>
  <li><strong>Settings (profile icon, top right):</strong> Click your profile icon, then Settings. This is where Custom Instructions, Memory, and Connected Apps live.</li>
</ul>

<div class="tip-box">
  <strong>The AI Equation:</strong>
  <div class="equation" style="margin:12px 0 4px">
    <div class="eq-block">LLM<br><span style="font-size:11px;font-weight:400;color:#888">Frozen model</span></div>
    <div class="eq-op">+</div>
    <div class="eq-block">Context<br><span style="font-size:11px;font-weight:400;color:#888">Your input</span></div>
    <div class="eq-op">+</div>
    <div class="eq-block">Tools<br><span style="font-size:11px;font-weight:400;color:#888">Capabilities</span></div>
    <div class="eq-op">=</div>
    <div class="eq-block" style="background:var(--accent)">Agentic AI<br><span style="font-size:11px;font-weight:400;color:rgba(255,255,255,0.7)">Useful output</span></div>
  </div>
  You cannot change the model. But you control <strong>context</strong> (what you tell it) and <strong>tools</strong> (what it can access). Better context + more tools = better results. That is the whole game.
</div>

<p>Think of this like the first time you got a new phone. You spend 10 minutes in Settings — wallpaper, notifications, accounts — and then the phone works the way you want. Same here.</p>

<button class="continue-btn" onclick="switchTab(0,'implement')">Continue to Exercises &rarr;</button>
`,
  implement: `
<h3>Explore the Interface</h3>

<ol class="checklist">
  <li><strong>1.</strong> Open <strong>m365.cloud.microsoft</strong> and sign in with your work account.</li>
  <li><strong>2.</strong> Find the <strong>Work / Web toggle</strong> at the top of the chat area. Click it once to switch modes, then click it back.</li>
  <li><strong>3.</strong> Click the <strong>attachment icon</strong> (paperclip). Look at the options available — files, images, etc. Close without attaching anything.</li>
  <li><strong>4.</strong> Click your <strong>profile icon</strong> (top right) and select <strong>Settings</strong>.</li>
  <li><strong>5.</strong> Inside Settings, find <strong>Custom Instructions</strong>. Open it — it should be empty for now. Close it.</li>
  <li><strong>6.</strong> Inside Settings, find <strong>Memory</strong>. Check whether it is turned on or off. Close Settings.</li>
  <li><strong>7.</strong> Send this test message in the chat:</li>
</ol>

<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>What model are you using and what tools do you have access to?</code></div>

<p>Read the response. You now have a map of the interface and know what Copilot can see.</p>

<button class="mark-complete-btn" id="complete-btn-0" onclick="markComplete(0)">Mark Complete</button>
`,
  advanced: `
<h3>Model Selection</h3>
<p>Microsoft Copilot uses different models depending on the task. The primary model is GPT-4o, but Research mode and other features may use different underlying models. You cannot directly choose which model runs, but knowing this helps you understand why different features produce different quality outputs.</p>

<h3>Privacy Controls</h3>
<p>In Settings, review the privacy and data controls. Your organization's admin sets the baseline, but you can often control things like whether Copilot stores conversation history and how Memory data is managed. Enterprise Copilot does not train on your data — your prompts and files stay within your tenant.</p>

<h3>Mobile App Setup</h3>
<p>Install the Microsoft 365 Copilot app on your phone (iOS and Android). It gives you the same chat interface on the go, including voice input. Sign in with the same work account. Your Custom Instructions and Memory carry over automatically.</p>
`
},

// ── 1: Custom Instructions & Memory ──
{
  id: 'custom-instructions-memory',
  title: 'Custom Instructions & Memory',
  points: 15,
  learn: `
<h3>Make Copilot Know You</h3>
<p>You just explored the interface. Now let us configure it so Copilot knows who you are — every time, without you repeating yourself.</p>

<p>It is like setting up a new phone's contacts, preferences, and home screen — you do it once, then it just works.</p>

<h3>Custom Instructions</h3>
<p>Custom Instructions live in Settings. They are sent with every conversation automatically. Think of them as your permanent briefing to Copilot. There are five key sections to fill out:</p>
<ol>
  <li><strong>Identity:</strong> Your name, role, organization, and team</li>
  <li><strong>Communication style:</strong> How you like responses formatted (bullets vs. paragraphs, formal vs. casual)</li>
  <li><strong>Goals:</strong> What you are working on, what projects matter most</li>
  <li><strong>Schedule context:</strong> Your typical work patterns, timezone, recurring meetings</li>
  <li><strong>Avoidances:</strong> What you do NOT want (jargon, emojis, overly long responses)</li>
</ol>

<h3>Copilot Memory</h3>
<p>Memory (GA January 2026) is different from Custom Instructions. Instead of you writing rules, Copilot <strong>learns your preferences automatically</strong> as you chat. You will occasionally see a "memory updated" signal. It remembers things like "this user prefers tables over paragraphs" or "this user works on the Hudson Yards project."</p>
<p>You can view, edit, or delete memories anytime in <strong>Settings &gt; Memory</strong>.</p>

<table style="width:100%;border-collapse:collapse;margin:18px 0;font-size:14px;">
  <thead><tr style="border-bottom:2px solid var(--border);">
    <th style="text-align:left;padding:8px 12px;">Feature</th>
    <th style="text-align:left;padding:8px 12px;">Custom Instructions</th>
    <th style="text-align:left;padding:8px 12px;">Memory</th>
  </tr></thead>
  <tbody>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;">Who writes it?</td><td style="padding:8px 12px;">You</td><td style="padding:8px 12px;">Copilot</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;">How it works</td><td style="padding:8px 12px;">Explicit rules you define</td><td style="padding:8px 12px;">Automatic learning from conversations</td></tr>
    <tr style="border-bottom:1px solid var(--border);"><td style="padding:8px 12px;">When it applies</td><td style="padding:8px 12px;">Every conversation</td><td style="padding:8px 12px;">Every conversation</td></tr>
    <tr><td style="padding:8px 12px;">How to manage</td><td style="padding:8px 12px;">Edit text in Settings</td><td style="padding:8px 12px;">View/delete individual memories in Settings</td></tr>
  </tbody>
</table>

<button class="continue-btn" onclick="switchTab(1,'implement')">Continue to Exercises &rarr;</button>
`,
  implement: `
<h3>Set Up Your Custom Instructions</h3>

<p><strong>1.</strong> Open Copilot Chat. Ask Copilot to interview you:</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>I need to set up my Custom Instructions for work. Interview me — ask about my role, how I like to communicate, what I'm working on, and what I want to avoid. One question at a time.</code></div>

<p><strong>2.</strong> Answer all of Copilot's questions honestly. It will ask about your role, team, preferences, and goals. Take your time — this is the foundation for everything that follows.</p>

<p><strong>3.</strong> When the interview is complete, ask Copilot to generate the output:</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>Based on my answers, generate a Custom Instructions block I can paste into Settings. Organize it into sections: Identity, Communication Style, Goals, Schedule, and Avoidances.</code></div>

<p><strong>4.</strong> Copy the generated text. Go to <strong>Settings &rarr; Custom Instructions</strong>. Paste it in and save.</p>

<p><strong>5.</strong> Open a <strong>NEW conversation</strong> (this is important — Custom Instructions only apply to new conversations). Send this test:</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>What do you know about my role and preferences?</code></div>

<p>Copilot should reference your name, role, and preferences from the instructions you just saved.</p>

<p><strong>Iterate:</strong> If something is missing or wrong, go back and refine. Try this:</p>
<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button><code>Adjust my Custom Instructions to also mention that I prefer bullet points over paragraphs.</code></div>

<p>Copy the updated version back into Settings.</p>

<p class="personalization-note">[PERSONALIZED: swap the Custom Instructions template with organization-specific roles, communication preferences, and workflows from Listen Labs interviews]</p>

<button class="mark-complete-btn" id="complete-btn-1" onclick="markComplete(1)">Mark Complete</button>
`,
  advanced: `
<h3>Memory Management</h3>
<p>Periodically review your memories in Settings. Delete any that are outdated or incorrect. You can explicitly tell Copilot to remember or forget things: "Remember that our fiscal year starts July 1" or "Forget that I work on the downtown project — I transferred off it."</p>

<h3>Importing Preferences from Other Tools</h3>
<p>If you already have a ChatGPT custom instructions block, or a preferences doc you use with other AI tools, paste it directly into Copilot's Custom Instructions. The format does not need to match exactly — Copilot will interpret it.</p>

<h3>Team-Wide Instruction Templates</h3>
<p>Create a shared Custom Instructions template for your team. Start with a base template that includes the organization name, common terminology, and default formatting preferences. Then let each person customize the role-specific parts. Share the template via a Copilot Page or Teams channel.</p>
`
},

// ── 2: Work Mode & Your Organization's Knowledge ──
{
  id: 'work-mode-org-knowledge',
  title: "Work Mode & Your Organization's Knowledge",
  points: 15,
  learn: `
<h3>From HOW to WHAT</h3>
<p><em>You configured Copilot to know who you are. Now let's teach it what your organization knows.</em></p>
<p>Custom Instructions tell Copilot <strong>how</strong> to behave. Work Mode tells it <strong>what</strong> to know.</p>

<p>Think of it this way: <strong>Work mode is like searching your filing cabinet.</strong> Web mode is like searching the library. One has your organization's data. The other has the internet.</p>

<h3>The Toggle</h3>
<p>At the top of every Copilot chat, you see the <strong>Work / Web toggle</strong>. This one button controls where Copilot searches for answers.</p>

<p><strong>Work mode</strong> searches:</p>
<ul>
  <li>Your emails (Outlook)</li>
  <li>Your files (OneDrive, SharePoint)</li>
  <li>Your Teams chats and channels</li>
  <li>Your calendar</li>
  <li>People directory</li>
</ul>

<p><strong>Web mode</strong> searches the public internet — news, research, articles, public data.</p>

<h3>Copilot Notebooks</h3>
<p>Notebooks are persistent workspaces that combine references, Pages content, and chats side-by-side. Think of them as a "project folder" for ongoing work. Click <strong>Notebooks</strong> in the left nav to create one. Add references from your files, and Copilot keeps them available across sessions.</p>

<button class="continue-btn" onclick="switchTab(2,'implement')">Continue to Exercises &rarr;</button>
`,
  implement: `
<h3>Search Your Organization's Data</h3>

<p>Choose your role to see exercises tailored to your work:</p>

<div class="option-tabs" id="options-2">
  <button class="option-btn active" onclick="switchOption(2,'arch',this)">Architecture</button>
  <button class="option-btn" onclick="switchOption(2,'hr',this)">HR</button>
  <button class="option-btn" onclick="switchOption(2,'mktg',this)">Marketing</button>
  <button class="option-btn" onclick="switchOption(2,'exec',this)">Executive</button>

/* ═══════════════════════════════════════════════════════════
   ENGINE
   ═══════════════════════════════════════════════════════════ */
const CORE_COUNT = 10;
const CORE_POINTS = 140;
let completed = JSON.parse(localStorage.getItem('chat-completed-v2') || '[]');
let currentLesson = 0;
let currentTab = 'learn';

function getCompletedPoints() {
  return completed.reduce((sum, i) => sum + (LESSONS[i]?.points || 0), 0);
}

function updateProgress() {
  const coreCompleted = completed.filter(i => i < CORE_COUNT).length;
  const pts = getCompletedPoints();
  document.getElementById('progress-label').textContent = coreCompleted + ' of ' + CORE_COUNT + ' core steps';
  document.getElementById('progress-pts').textContent = pts + ' / ' + CORE_POINTS + ' pts';
  document.getElementById('progress-fill').style.width = (coreCompleted / CORE_COUNT * 100) + '%';
  syncProgress();
}

function syncProgress() {
  const user = localStorage.getItem('workshop_user');
  if (!user) return;
  const chatData = { completed: completed, points: getCompletedPoints() };
  const body = { chat: chatData };
  try {
    const appsCompleted = JSON.parse(localStorage.getItem('apps-completed') || '[]');
    const agentsCompleted = JSON.parse(localStorage.getItem('agents-completed') || '[]');
    body.apps = { completed: appsCompleted, points: 0 };
    body.agents = { completed: agentsCompleted, points: 0 };
  } catch(e) {}
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).catch(function() {});
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  let html = '';
  LESSONS.forEach(function(lesson, i) {
    if (i === CORE_COUNT) {
      html += '<div class="nav-section-label" style="margin-top:8px">Bonus</div>';
    }
    const isDone = completed.includes(i);
    const isActive = i === currentLesson;
    html += '<div class="nav-item' + (isActive ? ' active' : '') + '" onclick="loadLesson(' + i + ')">';
    html += '<div class="check' + (isDone ? ' done' : '') + '">' + (isDone ? '&#10003;' : '') + '</div>';
    html += '<span>' + lesson.title + '</span>';
    if (lesson.points > 0) {
      html += '<span class="pts">' + lesson.points + ' pts</span>';
    }
    html += '</div>';
  });
  nav.innerHTML = html;
}

function loadLesson(idx) {
  currentLesson = idx;
  currentTab = 'learn';
  buildNav();
  renderLesson();
  document.getElementById('main-content').scrollTo(0, 0);
}

function renderLesson() {
  var lesson = LESSONS[currentLesson];
  var isDone = completed.includes(currentLesson);
  var html = '';

  // Step header
  html += '<div class="step-header">';
  html += '<h2>' + lesson.title + '</h2>';
  if (lesson.points > 0) {
    html += '<span class="pts-badge">' + lesson.points + ' points</span>';
  }
  html += '</div>';

  // Tabs
  html += '<div class="tabs">';
  html += '<button class="tab-btn' + (currentTab === 'learn' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'learn\')">Learn</button>';
  html += '<button class="tab-btn' + (currentTab === 'implement' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'implement\')">Exercises</button>';
  html += '<button class="tab-btn' + (currentTab === 'advanced' ? ' active' : '') + '" onclick="switchTab(' + currentLesson + ',\'advanced\')">Advanced</button>';
  html += '</div>';

  // Content
  html += '<div class="tab-content">';
  html += lesson[currentTab] || '<p>No content available for this tab.</p>';
  html += '</div>';

  document.getElementById('lesson-content').innerHTML = html;

  // Auto-activate first option-content if present
  var firstOpt = document.querySelector('.option-content');
  if (firstOpt && !document.querySelector('.option-content.active')) {
    firstOpt.classList.add('active');
  }

  // Update complete button state
  if (currentTab === 'implement') {
    var btn = document.getElementById('complete-btn-' + currentLesson);
    if (btn && isDone) {
      btn.textContent = 'Completed \u2713';
      btn.classList.add('completed');
      btn.disabled = true;
    }
  }
}

function switchTab(lessonIdx, tab) {
  currentLesson = lessonIdx;
  currentTab = tab;
  renderLesson();
}

function switchOption(lessonIdx, option, btn) {
  // Deactivate sibling buttons
  var container = document.getElementById('options-' + lessonIdx);
  if (container) {
    var buttons = container.querySelectorAll('.option-btn');
    buttons.forEach(function(b) { b.classList.remove('active'); });
  }
  if (btn) btn.classList.add('active');

  // Hide all option contents for this lesson, show selected
  var allOptions = document.querySelectorAll('[id^="option-' + lessonIdx + '-"]');
  allOptions.forEach(function(el) { el.style.display = 'none'; });
  var target = document.getElementById('option-' + lessonIdx + '-' + option);
  if (target) target.style.display = 'block';
}

function markComplete(idx) {
  if (completed.includes(idx)) return;
  completed.push(idx);
  localStorage.setItem('chat-completed-v2', JSON.stringify(completed));

  var btn = document.getElementById('complete-btn-' + idx);
  if (btn) {
    btn.textContent = 'Completed \u2713';
    btn.classList.add('completed');
    btn.disabled = true;
  }

  buildNav();
  updateProgress();

  // Auto-advance after 600ms
  setTimeout(function() {
    if (idx + 1 < LESSONS.length) {
      loadLesson(idx + 1);
    }
  }, 600);
}

function copyCode(btn) {
  var block = btn.parentElement.querySelector('code');
  if (!block) return;
  navigator.clipboard.writeText(block.textContent).then(function() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  }).catch(function() {
    btn.textContent = 'Failed';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  });
}

// Initialize
buildNav();
loadLesson(0);
updateProgress();
</script>
</body>
</html>
